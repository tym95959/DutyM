<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli Receipt - EPSON TM-T88vii</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* EPSON TM-T88vii Optimized Receipt */
        .receipt-wrapper {
            width: 80mm;
            max-width: 80mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            padding: 3mm 3mm;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        /* VOID Watermark - ALWAYS VISIBLE when class is applied */
        .void-watermark {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) rotate(-45deg) !important;
            font-size: 48pt !important;
            font-weight: bold !important;
            color: rgba(255, 0, 0, 0.3) !important;
            white-space: nowrap !important;
            pointer-events: none !important;
            z-index: 9999 !important;
            font-family: 'Arial Black', 'Helvetica Bold', sans-serif !important;
            text-transform: uppercase !important;
            border: 5px solid rgba(255, 0, 0, 0.3) !important;
            padding: 10px 30px !important;
            letter-spacing: 10px !important;
            display: block !important;
        }

        /* Print styles for EPSON TM-T88vii */
        @media print {
            @page {
                size: 80mm auto;
                margin: 0;
            }
            
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            
            .no-print {
                display: none !important;
            }
            
            .receipt-wrapper {
                width: 80mm;
                max-width: 80mm;
                margin: 0;
                padding: 2mm 3mm;
                box-shadow: none;
                border-radius: 0;
                background: white;
                position: relative;
            }
            
            .receipt, .receipt * {
                visibility: visible;
            }
            
            .void-watermark {
                color: rgba(255, 0, 0, 0.25) !important;
                border-color: rgba(255, 0, 0, 0.25) !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                display: block !important;
            }
        }

        /* Receipt Content Styles */
        .receipt {
            font-family: 'Courier New', 'Lucida Console', monospace;
            font-size: 10pt;
            line-height: 1.25;
            color: #000000;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Company Header */
        .receipt-header {
            text-align: center;
            margin-bottom: 2mm;
            border-bottom: 2px solid #000;
            padding-bottom: 1.5mm;
        }

        .company-name {
            font-size: 14pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1mm;
        }

        .company-address {
            font-size: 8pt;
            line-height: 1.3;
        }

        .company-details {
            font-size: 8pt;
            margin-top: 0.5mm;
        }

        /* Reprint Mark */
        .reprint-mark {
            text-align: center;
            font-size: 9pt;
            font-weight: bold;
            margin: 1.5mm 0;
            padding: 1mm 0;
            border: 2px solid #000;
            text-transform: uppercase;
        }

        /* Dividers */
        .divider {
            border-top: 2px solid #000;
            margin: 1.5mm 0;
        }

        .divider-light {
            border-top: 1px solid #000;
            margin: 1mm 0;
        }

        .divider-dash {
            border-top: 1px dashed #000;
            margin: 1mm 0;
        }

        /* Row Layout */
        .row {
            display: flex;
            justify-content: space-between;
            margin: 0.5mm 0;
            font-size: 10pt;
        }

        .row .label {
            font-weight: bold;
        }

        .row .value {
            text-align: right;
        }

        /* Passenger Name */
        .passenger-name {
            text-align: center;
            font-size: 12pt;
            font-weight: bold;
            margin: 1.5mm 0;
            padding: 1mm 0;
            border: 2px solid #000;
            text-transform: uppercase;
            background: #fff;
        }

        /* Flight Details */
        .flight-details {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin: 1mm 0;
            padding: 0.5mm 0;
            border-bottom: 1px solid #000;
            border-top: 1px solid #000;
            font-size: 10pt;
        }

        /* Items Table */
        .items-table {
            margin: 1mm 0;
        }

        .item-header {
            display: flex;
            font-weight: bold;
            border-bottom: 1px solid #000;
            padding-bottom: 0.5mm;
            margin-bottom: 0.5mm;
            font-size: 9pt;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin: 0.3mm 0;
            font-size: 10pt;
        }

        .item-desc {
            flex: 3;
        }

        .item-qty {
            flex: 1;
            text-align: center;
        }

        .item-price {
            flex: 2;
            text-align: right;
        }

        .item-total {
            flex: 2;
            text-align: right;
            font-weight: bold;
        }

        /* Totals */
        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 11pt;
            margin: 1mm 0;
            padding: 1mm 0;
            border-top: 2px solid #000;
            border-bottom: 1px solid #000;
        }

        .subtotal-row {
            display: flex;
            justify-content: space-between;
            font-size: 10pt;
            margin: 0.3mm 0;
        }

        /* Payment Method */
        .payment-info {
            display: flex;
            justify-content: space-between;
            margin: 0.5mm 0;
            padding: 0.5mm 0;
            font-weight: bold;
        }

        /* Validity Block */
        .validity-block {
            text-align: center;
            border: 2px solid #000;
            padding: 1.5mm;
            margin: 2mm 0;
            background: #fff;
        }

        .valid-label {
            font-size: 9pt;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .expiry-time {
            font-size: 20pt;
            font-weight: bold;
            line-height: 1.2;
            margin: 0.5mm 0;
        }

        .valid-note {
            font-size: 7pt;
        }

        /* Exchange Rate */
        .exchange-rate {
            font-size: 8pt;
            text-align: right;
            margin: 0.3mm 0;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 1.5mm;
        }

        .thank-you {
            font-size: 10pt;
            font-weight: bold;
            margin: 0.5mm 0;
        }

        .footer-note {
            font-size: 8pt;
            margin: 0.3mm 0;
        }

        /* Barcode area */
        .barcode-area {
            text-align: center;
            margin: 1mm 0;
            font-family: 'Libre Barcode 39', cursive;
            font-size: 14pt;
        }

        /* Loading and Error States */
        .loading, .error-message, .receipt-data {
            text-align: center;
            padding: 15px;
        }

        .error-message {
            color: #c68b5e;
            font-weight: bold;
        }

        .print-controls {
            margin-top: 20px;
            text-align: center;
        }

        .print-btn {
            background: #6b8e23;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #e6b800;
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(107, 142, 35, 0.3);
        }

        .back-btn {
            background: #8b6913;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(230, 184, 0, 0.3);
        }

        /* Debug panel - REMOVE IN PRODUCTION */
        .debug-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: white;
            border: 2px solid #e6b800;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 300px;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <div class="receipt-wrapper" id="receiptWrapper">
        <div class="receipt" id="receipt">
            <!-- Receipt content will be populated by JavaScript -->
            <div class="loading" id="loadingMessage">
                <p>Loading receipt data...</p>
            </div>
            <div class="error-message" id="errorMessage" style="display: none;">
                <p>Error loading receipt. Please try again.</p>
            </div>
            <div class="receipt-data" id="receiptData" style="display: none;"></div>
        </div>
        <!-- VOID Watermark will be inserted here dynamically if needed -->
    </div>

    <div class="print-controls no-print">
        <button class="print-btn" id="printReceiptBtn" onclick="window.print()">🖨️ PRINT RECEIPT</button>
        <a href="#" class="back-btn" id="backBtn">← BACK</a>
    </div>

    <!-- Debug panel - REMOVE IN PRODUCTION -->
    <div class="debug-panel no-print" id="debugPanel">
        <strong>🔍 DEBUG INFO</strong>
        <div id="debugInfo">Loading...</div>
        <button onclick="testAddVoid()" style="margin-top:5px; padding:3px 10px;">TEST ADD VOID</button>
        <button onclick="testRemoveVoid()" style="margin-top:5px; padding:3px 10px;">TEST REMOVE VOID</button>
    </div>

    <script>
        // ========== RECEIPT PAGE FOR EPSON TM-T88vii WITH FORCED VOID WATERMARK ==========
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const receiptDataParam = urlParams.get('data');
        const receiptNoParam = urlParams.get('receiptNo');
        const reprintParam = urlParams.get('reprint') === 'true';
        const voidParam = urlParams.get('void') === 'true';

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyB9vfO9S6BLtOC5b0W7SFoOiAeZ2t7QqaI",
            authDomain: "koveli-6a6ef.firebaseapp.com",
            projectId: "koveli-6a6ef",
            storageBucket: "koveli-6a6ef.appspot.com",
            messagingSenderId: "989181878797",
            appId: "1:989181878797:web:3b0d539c2c9c66be7065e1"
        };

        // Initialize Firebase
        let passengerDb;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            passengerDb = firebase.firestore();
            console.log('Firebase initialized for receipt page');
        } catch (error) {
            console.error('Firebase initialization error:', error);
        }

        // Receipt data object
        let receiptData = null;

        // Update debug panel
        function updateDebugInfo(message) {
            const debugEl = document.getElementById('debugInfo');
            if (debugEl) {
                debugEl.innerHTML = message + '<br>' + (debugEl.innerHTML || '');
            }
            console.log(message);
        }

        // TEST FUNCTION: Manually add void watermark
        function testAddVoid() {
            updateDebugInfo('🧪 TEST: Manually adding void watermark');
            addVoidWatermark();
        }

        // TEST FUNCTION: Manually remove void watermark
        function testRemoveVoid() {
            updateDebugInfo('🧪 TEST: Manually removing void watermark');
            removeVoidWatermark();
        }

        // Remove void watermark
        function removeVoidWatermark() {
            const existingWatermark = document.querySelector('.void-watermark');
            if (existingWatermark) {
                existingWatermark.remove();
                updateDebugInfo('✅ Void watermark removed');
            }
        }

        // Add VOID watermark to receipt - MULTIPLE METHODS to ensure it works
        function addVoidWatermark() {
            updateDebugInfo('🔧 Attempting to add VOID watermark...');
            
            // Method 1: Get wrapper by ID
            const wrapper = document.getElementById('receiptWrapper');
            if (!wrapper) {
                updateDebugInfo('❌ ERROR: receiptWrapper not found by ID');
                return;
            }
            
            // Remove any existing watermark first
            removeVoidWatermark();
            
            // Create watermark with inline styles as backup
            const watermark = document.createElement('div');
            watermark.className = 'void-watermark';
            watermark.textContent = 'VOID';
            
            // Apply inline styles as additional backup
            watermark.style.position = 'absolute';
            watermark.style.top = '50%';
            watermark.style.left = '50%';
            watermark.style.transform = 'translate(-50%, -50%) rotate(-45deg)';
            watermark.style.fontSize = '48pt';
            watermark.style.fontWeight = 'bold';
            watermark.style.color = 'rgba(255, 0, 0, 0.3)';
            watermark.style.whiteSpace = 'nowrap';
            watermark.style.pointerEvents = 'none';
            watermark.style.zIndex = '9999';
            watermark.style.fontFamily = 'Arial Black, Helvetica Bold, sans-serif';
            watermark.style.textTransform = 'uppercase';
            watermark.style.border = '5px solid rgba(255, 0, 0, 0.3)';
            watermark.style.padding = '10px 30px';
            watermark.style.letterSpacing = '10px';
            
            // Append to wrapper
            wrapper.appendChild(watermark);
            
            // Verify it was added
            const checkWatermark = document.querySelector('.void-watermark');
            if (checkWatermark) {
                updateDebugInfo('✅ SUCCESS: Void watermark added and verified!');
                updateDebugInfo('   Element classes: ' + checkWatermark.className);
                updateDebugInfo('   Element content: ' + checkWatermark.textContent);
            } else {
                updateDebugInfo('❌ FAILED: Watermark not found after adding');
                
                // Method 2: Try adding to body as fallback
                try {
                    const bodyWatermark = document.createElement('div');
                    bodyWatermark.className = 'void-watermark';
                    bodyWatermark.textContent = 'VOID';
                    bodyWatermark.style.cssText = `
                        position: fixed !important;
                        top: 50% !important;
                        left: 50% !important;
                        transform: translate(-50%, -50%) rotate(-45deg) !important;
                        font-size: 48pt !important;
                        font-weight: bold !important;
                        color: rgba(255, 0, 0, 0.3) !important;
                        white-space: nowrap !important;
                        pointer-events: none !important;
                        z-index: 99999 !important;
                        font-family: Arial Black, Helvetica Bold, sans-serif !important;
                        text-transform: uppercase !important;
                        border: 5px solid rgba(255, 0, 0, 0.3) !important;
                        padding: 10px 30px !important;
                        letter-spacing: 10px !important;
                        background: transparent !important;
                    `;
                    document.body.appendChild(bodyWatermark);
                    updateDebugInfo('⚠️ Added watermark to body as fallback');
                } catch (e) {
                    updateDebugInfo('❌ Fallback also failed: ' + e.message);
                }
            }
        }

        // Format number to 2 decimals
        function formatAmount(value) {
            return parseFloat(value || 0).toFixed(2);
        }

        // Check if receipt should be voided - SIMPLIFIED
        function shouldShowVoid(data) {
            // Check URL parameter first (most reliable)
            if (voidParam) {
                updateDebugInfo('✅ VOID: URL parameter void=true detected');
                return true;
            }
            
            if (!data) return false;
            
            // Check various fields
            const checks = [
                { field: 'isVoid', value: data.isVoid },
                { field: 'status', value: data.status },
                { field: 'voided', value: data.voided },
                { field: 'void', value: data.void },
                { field: 'receiptStatus', value: data.receiptStatus },
                { field: 'paymentMethod', value: data.paymentMethod }
            ];
            
            for (let check of checks) {
                if (check.value === true || check.value === 'VOID' || check.value === 'void') {
                    updateDebugInfo(`✅ VOID: Field "${check.field}" = ${check.value}`);
                    return true;
                }
            }
            
            updateDebugInfo('❌ No void condition detected');
            return false;
        }

        // Generate receipt HTML
        function generateReceiptHTML(data) {
            const isReprint = data.isReprint || reprintParam;
            
            const reprintMark = isReprint ? 
                '<div class="reprint-mark">*** REPRINT COPY ***</div>' : '';

            // Format date and time
            let dateTimeStr = data.submissionDateTime || data.dateTime || '';
            let dateOnly = data.shiftDate || data.date || '';
            let timeOnly = '';
            
            if (dateTimeStr) {
                const parts = dateTimeStr.split(' ');
                if (parts.length > 1) {
                    dateOnly = parts[0];
                    timeOnly = parts[1];
                } else {
                    timeOnly = dateTimeStr;
                }
            }

            // Format date nicely
            if (dateOnly && dateOnly.includes('-')) {
                const dateParts = dateOnly.split('-');
                if (dateParts.length === 3) {
                    dateOnly = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                }
            }

            const adultPrice = formatAmount(data.adultPrice);
            const childPrice = formatAmount(data.childrenPrice);
            const adultSub = formatAmount(data.adultSubtotal);
            const childSub = formatAmount(data.childrenSubtotal);
            const subtotal = formatAmount(data.subtotal);
            const gst = formatAmount(data.gstAmount);
            const total = formatAmount(data.totalAmount);

            const exchangeRateHTML = data.currency === 'MVR' && data.exchangeRate ?
                `<div class="exchange-rate">1 USD = ${parseFloat(data.exchangeRate).toFixed(2)} MVR</div>` : '';

            // Build passenger count display
            const passengerCount = parseInt(data.adult || 0) + parseInt(data.children || 0);
            const passengerDisplay = passengerCount > 1 ? ` (${passengerCount} PAX)` : '';

            return `
                <div class="receipt-header">
                    <div class="company-name">KOVELI LOUNGE</div>
                    <div class="company-address">
                        VELANA INTERNATIONAL AIRPORT
                    </div>
                    <div class="company-details">
                        TEL: +960 304 6677
                    </div>
                </div>

                ${reprintMark}

                <div class="divider-light"></div>

                <div class="row">
                    <span class="label">Receipt No:</span>
                    <span class="value"><span class="text-bold">${data.receiptNo || 'N/A'}</span></span>
                </div>

                <div class="row">
                    <span class="label">Date:</span>
                    <span class="value">${dateOnly || 'N/A'} ${timeOnly || ''}</span>
                </div>

                <div class="row">
                    <span class="label">Shift:</span>
                    <span class="value">${data.shift || data.shiftName || 'N/A'}</span>
                </div>

                <div class="row">
                    <span class="label">Cashier:</span>
                    <span class="value">${data.cashierName || data.user?.username || 'N/A'}</span>
                </div>

                <div class="row">
                    <span class="label">RC No:</span>
                    <span class="value">${data.userRcno || data.user?.rcno || 'N/A'}</span>
                </div>

                <div class="divider"></div>

                <div class="passenger-name">${(data.passengerName || 'N/A')}${passengerDisplay}</div>

                <div class="flight-details">
                    <span>FLIGHT: ${data.flightNo || '---'}</span>
                    <span>SEAT: ${data.seatNo || '---'}</span>
                </div>

                <div class="divider-light"></div>

                <div class="items-table">
                    <div class="item-header">
                        <span class="item-desc">Description</span>
                        <span class="item-qty">Qty</span>
                        <span class="item-price">Price</span>
                        <span class="item-total">Total</span>
                    </div>
                    
                    <div class="item-row">
                        <span class="item-desc">Adult (Rate ${data.rateType || 'A'})</span>
                        <span class="item-qty">${data.adult || 0}</span>
                        <span class="item-price">${data.currency || 'USD'} ${adultPrice}</span>
                        <span class="item-total">${data.currency || 'USD'} ${adultSub}</span>
                    </div>
                    
                    ${parseInt(data.children || 0) > 0 ? `
                    <div class="item-row">
                        <span class="item-desc">Child (Rate ${data.rateType || 'A'})</span>
                        <span class="item-qty">${data.children || 0}</span>
                        <span class="item-price">${data.currency || 'USD'} ${childPrice}</span>
                        <span class="item-total">${data.currency || 'USD'} ${childSub}</span>
                    </div>
                    ` : ''}
                </div>

                <div class="divider-dash"></div>

                <div class="subtotal-row">
                    <span>Subtotal:</span>
                    <span>${data.currency || 'USD'} ${subtotal}</span>
                </div>

                <div class="subtotal-row">
                    <span>GST ${data.gstRate || 8}%:</span>
                    <span>${data.currency || 'USD'} ${gst}</span>
                </div>

                <div class="total-row">
                    <span>TOTAL:</span>
                    <span>${data.currency || 'USD'} ${total}</span>
                </div>

                <div class="payment-info">
                    <span>Payment Method:</span>
                    <span class="text-bold">${data.paymentMethod || 'CASH'}</span>
                </div>

                ${exchangeRateHTML}

                <div class="validity-block">
                    <div class="valid-label">VALID UNTIL</div>
                    <div class="expiry-time">${data.expiryTime || data.expiryDisplay || '--:--:--'}</div>
                    <div class="valid-note">(3 hours from issue)</div>
                </div>

                <div class="footer">
                    <div class="thank-you">✈️ THANK YOU ✈️</div>
                    <div class="footer-note">Thank you for choosing Koveli Lounge</div>
                    
                </div>

                ${data.receiptNo ? `
                <div class="barcode-area">
                    
                </div>
                ` : ''}
            `;
        }

        // Fetch receipt from Firebase
        async function fetchReceiptFromFirebase(receiptNo) {
            try {
                if (!passengerDb) throw new Error('Firebase not initialized');
                
                updateDebugInfo(`🔍 Fetching receipt from Firebase: ${receiptNo}`);
                
                const kovelipayRef = passengerDb.collection('Kovelipay');
                const snapshot = await kovelipayRef.where('receiptNo', '==', receiptNo).limit(1).get();
                
                if (!snapshot.empty) {
                    const data = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
                    updateDebugInfo(`✅ Receipt found in Firebase`);
                    return data;
                }
                
                // Try direct document access
                const docById = await kovelipayRef.doc(receiptNo).get();
                if (docById.exists) {
                    const data = { id: docById.id, ...docById.data() };
                    updateDebugInfo(`✅ Receipt found by direct ID`);
                    return data;
                }
                
                updateDebugInfo(`❌ Receipt not found in Firebase: ${receiptNo}`);
                return null;
            } catch (error) {
                console.error('Error fetching receipt:', error);
                throw error;
            }
        }

        // Load receipt data
        async function loadReceipt() {
            const loadingEl = document.getElementById('loadingMessage');
            const errorEl = document.getElementById('errorMessage');
            const receiptDataEl = document.getElementById('receiptData');

            // Initial debug info
            updateDebugInfo(`📋 Page loaded at ${new Date().toLocaleTimeString()}`);
            updateDebugInfo(`URL void param: ${voidParam}`);
            updateDebugInfo(`URL reprint param: ${reprintParam}`);
            updateDebugInfo(`URL receiptNo: ${receiptNoParam || 'none'}`);
            updateDebugInfo(`URL data param: ${receiptDataParam ? 'present' : 'none'}`);

            try {
                // Hide error, show loading
                if (loadingEl) loadingEl.style.display = 'block';
                if (errorEl) errorEl.style.display = 'none';
                if (receiptDataEl) receiptDataEl.style.display = 'none';

                let data = null;

                // Case 1: Data passed via URL parameter
                if (receiptDataParam) {
                    try {
                        data = JSON.parse(decodeURIComponent(receiptDataParam));
                        updateDebugInfo(`✅ Data parsed from URL`);
                        updateDebugInfo(`   Receipt: ${data.receiptNo}`);
                    } catch (e) {
                        updateDebugInfo(`❌ Error parsing URL data: ${e.message}`);
                    }
                }
                
                // Case 2: Fetch by receipt number from Firebase
                if (!data && receiptNoParam) {
                    data = await fetchReceiptFromFirebase(receiptNoParam);
                }
                
                // Case 3: Try to get from localStorage (last transaction)
                if (!data) {
                    try {
                        const lastReceipt = localStorage.getItem('lastReceiptData');
                        if (lastReceipt) {
                            data = JSON.parse(lastReceipt);
                            updateDebugInfo(`✅ Data loaded from localStorage`);
                        }
                    } catch (e) {
                        updateDebugInfo(`❌ Error parsing localStorage: ${e.message}`);
                    }
                }

                if (!data) {
                    throw new Error('No receipt data found');
                }

                // Add reprint flag
                data.isReprint = reprintParam;

                // Store receipt data
                receiptData = data;

                // Generate and display receipt HTML
                const html = generateReceiptHTML(data);
                if (receiptDataEl) {
                    receiptDataEl.innerHTML = html;
                    receiptDataEl.style.display = 'block';
                }

                // Hide loading
                if (loadingEl) loadingEl.style.display = 'none';

                // Check if receipt should be voided
                const showVoid = shouldShowVoid(data);
                updateDebugInfo(`🎯 Should show void: ${showVoid}`);
                
                if (showVoid) {
                    // Multiple attempts to ensure watermark appears
                    setTimeout(() => {
                        addVoidWatermark();
                    }, 100);
                    
                    // Second attempt after longer delay
                    setTimeout(() => {
                        if (!document.querySelector('.void-watermark')) {
                            updateDebugInfo('⚠️ First attempt failed, trying again...');
                            addVoidWatermark();
                        }
                    }, 500);
                    
                    // Third attempt after content is fully loaded
                    setTimeout(() => {
                        if (!document.querySelector('.void-watermark')) {
                            updateDebugInfo('⚠️ Second attempt failed, final try...');
                            addVoidWatermark();
                        }
                    }, 1000);
                }

                // Auto-print if requested
                const autoPrint = urlParams.get('autoPrint') === 'true';
                if (autoPrint) {
                    updateDebugInfo(`🖨️ Auto-print enabled`);
                    setTimeout(() => {
                        window.print();
                    }, 500);
                }

            } catch (error) {
                console.error('Error loading receipt:', error);
                updateDebugInfo(`❌ Error: ${error.message}`);
                
                // Show error message
                if (loadingEl) loadingEl.style.display = 'none';
                if (errorEl) {
                    errorEl.style.display = 'block';
                    errorEl.innerHTML = `<p>Error: ${error.message}</p>`;
                }
            }
        }

        // Set back button link
        function setBackLink() {
            const backBtn = document.getElementById('backBtn');
            if (backBtn) {
                const returnTo = urlParams.get('returnTo') || 'pay.html';
                backBtn.href = returnTo;
                updateDebugInfo(`🔙 Back button: ${returnTo}`);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM Content Loaded');
            loadReceipt();
            setBackLink();
        });

        // Also try after window load
        window.addEventListener('load', () => {
            updateDebugInfo('✅ Window fully loaded');
            
            // Final check for void watermark
            if (voidParam && !document.querySelector('.void-watermark')) {
                updateDebugInfo('⚠️ Void watermark missing after load - adding now');
                addVoidWatermark();
            }
        });

        // Listen for print events
        window.addEventListener('beforeprint', () => {
            console.log('Printing to EPSON TM-T88vii...');
        });

        window.addEventListener('afterprint', () => {
            console.log('Print completed');
        });
    </script>
</body>
</html>
