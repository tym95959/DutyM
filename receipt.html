<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli Receipt - EPSON TM-T88vii</title>
    <!-- Firebase SDK - linked like previous code -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- fireshift.js contains Firebase initialization - same as payment page -->
    <script src="fireshift.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* EPSON TM-T88vii Optimized Receipt */
        .receipt-wrapper {
            width: 80mm;
            max-width: 80mm;
            margin: 0 auto;
            background: white;
            box-shadow: none;
            padding: 2mm 3mm;
            border-radius: 0;
            position: relative;
            overflow: hidden;
        }

        /* VOID Watermark - IMPROVED VISIBILITY */
        .void-watermark {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) rotate(-45deg) !important;
            font-size: 48pt !important;
            font-weight: bold !important;
            color: rgba(255, 0, 0, 0.4) !important;
            white-space: nowrap !important;
            pointer-events: none !important;
            z-index: 9999 !important;
            font-family: 'Arial Black', 'Helvetica Bold', sans-serif !important;
            text-transform: uppercase !important;
            border: 5px solid rgba(255, 0, 0, 0.4) !important;
            padding: 10px 30px !important;
            letter-spacing: 10px !important;
            display: block !important;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1) !important;
        }

        /* Print styles for EPSON TM-T88vii */
        @media print {
            @page {
                size: 80mm auto;
                margin: 0;
            }
            
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            
            .no-print {
                display: none !important;
            }
            
            .receipt-wrapper {
                width: 80mm;
                max-width: 80mm;
                margin: 0;
                padding: 2mm 3mm;
                box-shadow: none;
                border-radius: 0;
                background: white;
                position: relative;
            }
            
            .receipt, .receipt * {
                visibility: visible;
            }
            
            .void-watermark {
                color: rgba(255, 0, 0, 0.3) !important;
                border-color: rgba(255, 0, 0, 0.3) !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                display: block !important;
            }
        }

        /* Receipt Content Styles */
        .receipt {
            font-family: 'Courier New', 'Lucida Console', monospace;
            font-size: 10pt;
            line-height: 1.25;
            color: #000000;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Company Header */
        .receipt-header {
            text-align: center;
            margin-bottom: 2mm;
            border-bottom: 1px solid #000;
            padding-bottom: 1.5mm;
        }

        .company-name {
            font-size: 14pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1mm;
        }

        .company-address {
            font-size: 8pt;
            line-height: 1.3;
        }

        .company-details {
            font-size: 8pt;
            margin-top: 0.5mm;
        }

        /* Reprint Mark */
        .reprint-mark {
            text-align: center;
            font-size: 9pt;
            font-weight: bold;
            margin: 1.5mm 0;
            padding: 1mm 0;
            border: 1px solid #000;
            text-transform: uppercase;
        }

        /* Dividers */
        .divider {
            border-top: 1px solid #000;
            margin: 1.5mm 0;
        }

        .divider-light {
            border-top: 1px solid #000;
            margin: 1mm 0;
        }

        .divider-dash {
            border-top: 1px dashed #000;
            margin: 1mm 0;
        }

        /* Row Layout */
        .row {
            display: flex;
            justify-content: space-between;
            margin: 0.5mm 0;
            font-size: 10pt;
        }

        .row .label {
            font-weight: bold;
        }

        .row .value {
            text-align: right;
        }

        /* Passenger Name */
        .passenger-name {
            text-align: center;
            font-size: 12pt;
            font-weight: bold;
            margin: 1.5mm 0;
            padding: 1mm 0;
            border: 1px solid #000;
            text-transform: uppercase;
            background: #fff;
        }

        /* Flight Details */
        .flight-details {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin: 1mm 0;
            padding: 0.5mm 0;
            border-bottom: 1px solid #000;
            border-top: 1px solid #000;
            font-size: 10pt;
        }

        /* Items Table */
        .items-table {
            margin: 1mm 0;
        }

        .item-header {
            display: flex;
            font-weight: bold;
            border-bottom: 1px solid #000;
            padding-bottom: 0.5mm;
            margin-bottom: 0.5mm;
            font-size: 9pt;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin: 0.3mm 0;
            font-size: 10pt;
        }

        .item-desc {
            flex: 3;
        }

        .item-qty {
            flex: 1;
            text-align: center;
        }

        .item-price {
            flex: 2;
            text-align: right;
        }

        .item-total {
            flex: 2;
            text-align: right;
            font-weight: bold;
        }

        /* Totals */
        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 11pt;
            margin: 1mm 0;
            padding: 1mm 0;
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
        }

        .subtotal-row {
            display: flex;
            justify-content: space-between;
            font-size: 10pt;
            margin: 0.3mm 0;
        }

        /* Payment Method */
        .payment-info {
            display: flex;
            justify-content: space-between;
            margin: 0.5mm 0;
            padding: 0.5mm 0;
            font-weight: bold;
        }

        /* Validity Block */
        .validity-block {
            text-align: center;
            border: 1px solid #000;
            padding: 1.5mm;
            margin: 2mm 0;
            background: #fff;
        }

        .valid-label {
            font-size: 9pt;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .expiry-time {
            font-size: 20pt;
            font-weight: bold;
            line-height: 1.2;
            margin: 0.5mm 0;
        }

        .valid-note {
            font-size: 7pt;
        }

        /* Exchange Rate */
        .exchange-rate {
            font-size: 8pt;
            text-align: right;
            margin: 0.3mm 0;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 1.5mm;
        }

        .thank-you {
            font-size: 10pt;
            font-weight: bold;
            margin: 0.5mm 0;
        }

        .footer-note {
            font-size: 8pt;
            margin: 0.3mm 0;
        }

        /* Loading and Error States */
        .loading, .error-message, .receipt-data {
            text-align: center;
            padding: 15px;
        }

        .error-message {
            color: #c68b5e;
            font-weight: bold;
        }

        .print-controls {
            margin-top: 20px;
            text-align: center;
            padding-bottom: 20px;
        }

        .print-btn {
            background: #6b8e23;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #e6b800;
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(107, 142, 35, 0.3);
        }

        .back-btn {
            background: #8b6913;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(230, 184, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="receipt-wrapper" id="receiptWrapper">
        <div class="receipt" id="receipt">
            <!-- Receipt content will be populated by JavaScript -->
            <div class="loading" id="loadingMessage">
                <p>Loading receipt data...</p>
            </div>
            <div class="error-message" id="errorMessage" style="display: none;">
                <p>Error loading receipt. Please try again.</p>
            </div>
            <div class="receipt-data" id="receiptData" style="display: none;"></div>
        </div>
        <!-- VOID Watermark will be inserted here dynamically if needed -->
    </div>

    <div class="print-controls no-print">
        <button class="print-btn" id="printReceiptBtn" onclick="window.print()">🖨️ PRINT RECEIPT</button>
        <a href="#" class="back-btn" id="backBtn">← BACK</a>
    </div>

    <script>
        // ========== RECEIPT PAGE FOR EPSON TM-T88vii WITH FIREBASE LINKED VIA FIRESHIFT.JS ==========
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const receiptDataParam = urlParams.get('data');
        const receiptNoParam = urlParams.get('receiptNo');
        const reprintParam = urlParams.get('reprint') === 'true';
        const voidParam = urlParams.get('void') === 'true';

        // Receipt data object
        let receiptData = null;

        // Debug logging
        function logDebug(message) {
            console.log(`[Receipt] ${message}`);
        }

        // Remove void watermark
        function removeVoidWatermark() {
            const existingWatermark = document.querySelector('.void-watermark');
            if (existingWatermark) {
                existingWatermark.remove();
                logDebug('Void watermark removed');
            }
        }

        // Add VOID watermark
        function addVoidWatermark() {
            logDebug('Attempting to add VOID watermark...');
            
            const wrapper = document.getElementById('receiptWrapper');
            if (!wrapper) {
                logDebug('ERROR: receiptWrapper not found');
                return false;
            }
            
            removeVoidWatermark();
            
            const watermark = document.createElement('div');
            watermark.className = 'void-watermark';
            watermark.textContent = 'VOID';
            
            watermark.style.cssText = `
                position: absolute !important;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) rotate(-45deg) !important;
                font-size: 48pt !important;
                font-weight: bold !important;
                color: rgba(255, 0, 0, 0.4) !important;
                white-space: nowrap !important;
                pointer-events: none !important;
                z-index: 9999 !important;
                font-family: Arial Black, Helvetica Bold, sans-serif !important;
                text-transform: uppercase !important;
                border: 5px solid rgba(255, 0, 0, 0.4) !important;
                padding: 10px 30px !important;
                letter-spacing: 10px !important;
                display: block !important;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.1) !important;
                background: transparent !important;
            `;
            
            wrapper.appendChild(watermark);
            
            const checkWatermark = document.querySelector('.void-watermark');
            if (checkWatermark) {
                logDebug('✅ VOID watermark added successfully');
                return true;
            } else {
                logDebug('❌ Failed to add VOID watermark');
                return false;
            }
        }

        // Format number to 2 decimals
        function formatAmount(value) {
            if (value === undefined || value === null) return '0.00';
            return parseFloat(value).toFixed(2);
        }

        // Check if receipt should be voided
        function shouldShowVoid(data) {
            if (voidParam) {
                logDebug('✓ VOID: URL parameter void=true detected');
                return true;
            }
            
            if (!data) return false;
            
            const voidIndicators = [
                data.isVoid,
                data.status === 'VOID',
                data.voided === true,
                data.void === true,
                data.receiptStatus === 'VOID',
                data.paymentMethod === 'VOID',
                data.transactionStatus === 'VOID'
            ];
            
            for (let indicator of voidIndicators) {
                if (indicator) {
                    logDebug(`✓ VOID detected in data`);
                    return true;
                }
            }
            
            logDebug('✗ No void condition detected');
            return false;
        }

        // Generate receipt HTML
        function generateReceiptHTML(data) {
            const isReprint = data.isReprint || reprintParam;
            
            const reprintMark = isReprint ? 
                '<div class="reprint-mark">*** REPRINT COPY ***</div>' : '';

            // Format date and time
            let dateTimeStr = data.submissionDateTime || data.dateTime || data.createdAt || '';
            let dateOnly = data.shiftDate || data.date || data.transactionDate || '';
            let timeOnly = '';
            
            if (dateTimeStr) {
                const parts = dateTimeStr.split(' ');
                if (parts.length > 1) {
                    dateOnly = parts[0];
                    timeOnly = parts[1];
                } else if (dateTimeStr.includes('T')) {
                    const isoParts = dateTimeStr.split('T');
                    dateOnly = isoParts[0];
                    timeOnly = isoParts[1]?.substring(0, 8) || '';
                } else {
                    timeOnly = dateTimeStr;
                }
            }

            // Format date nicely
            if (dateOnly && dateOnly.includes('-')) {
                const dateParts = dateOnly.split('-');
                if (dateParts.length === 3) {
                    dateOnly = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                }
            }

            const currency = data.currency || 'USD';

            const adultPrice = formatAmount(data.adultPrice);
            const childPrice = formatAmount(data.childrenPrice);
            const adultSub = formatAmount(data.adultSubtotal);
            const childSub = formatAmount(data.childrenSubtotal);
            const subtotal = formatAmount(data.subtotal);
            const gst = formatAmount(data.gstAmount);
            const total = formatAmount(data.totalAmount);

            const exchangeRateHTML = currency === 'MVR' && data.exchangeRate ?
                `<div class="exchange-rate">1 USD = ${parseFloat(data.exchangeRate).toFixed(2)} MVR</div>` : '';

            let cashierName = data.cashierName || data.user?.cashierName || data.user?.username || 'N/A';
            let rcNo = data.userRcno || data.user?.rcno || data.user?.rcNo || data.cashier?.rcno || 'N/A';

            const adultCount = parseInt(data.adult || 0);
            const childCount = parseInt(data.children || 0);
            const passengerCount = adultCount + childCount;
            const passengerDisplay = passengerCount > 1 ? ` (${passengerCount} PAX)` : '';

            return `
                <div class="receipt-header">
                    <div class="company-name">KOVELI LOUNGE</div>
                    <div class="company-address">
                        VELANA INTERNATIONAL AIRPORT
                    </div>
                    <div class="company-details">
                        TEL: +960 304 6677
                    </div>
                </div>

                ${reprintMark}

                <div class="divider-light"></div>

                <div class="row">
                    <span class="label">Receipt No:</span>
                    <span class="value"><span class="text-bold">${data.receiptNo || 'N/A'}</span></span>
                </div>

                <div class="row">
                    <span class="label">Date:</span>
                    <span class="value">${dateOnly || 'N/A'} ${timeOnly || ''}</span>
                </div>

                <div class="row">
                    <span class="label">Shift:</span>
                    <span class="value">${data.shift || data.shiftName || 'N/A'}</span>
                </div>

                <div class="row">
                    <span class="label">Cashier:</span>
                    <span class="value">${cashierName}</span>
                </div>

                <div class="row">
                    <span class="label">RC No:</span>
                    <span class="value">${rcNo}</span>
                </div>

                <div class="divider"></div>

                <div class="passenger-name">${(data.passengerName || 'N/A')}${passengerDisplay}</div>

                <div class="flight-details">
                    <span>FLIGHT: ${data.flightNo || '---'}</span>
                    <span>SEAT: ${data.seatNo || '---'}</span>
                </div>

                <div class="divider-light"></div>

                <div class="items-table">
                    <div class="item-header">
                        <span class="item-desc">Description</span>
                        <span class="item-qty">Qty</span>
                        <span class="item-price">Price</span>
                        <span class="item-total">Total</span>
                    </div>
                    
                    <div class="item-row">
                        <span class="item-desc">Adult </span>
                        <span class="item-qty">${adultCount}</span>
                        <span class="item-price">${currency} ${adultPrice}</span>
                        <span class="item-total">${currency} ${adultSub}</span>
                    </div>
                    
                    ${childCount > 0 ? `
                    <div class="item-row">
                        <span class="item-desc">Child </span>
                        <span class="item-qty">${childCount}</span>
                        <span class="item-price">${currency} ${childPrice}</span>
                        <span class="item-total">${currency} ${childSub}</span>
                    </div>
                    ` : ''}
                </div>

                <div class="divider-dash"></div>

                <div class="subtotal-row">
                    <span>Subtotal:</span>
                    <span>${currency} ${subtotal}</span>
                </div>

                <div class="subtotal-row">
                    <span>GST ${data.gstRate || 8}%:</span>
                    <span>${currency} ${gst}</span>
                </div>

                <div class="total-row">
                    <span>TOTAL:</span>
                    <span>${currency} ${total}</span>
                </div>

                <div class="payment-info">
                    <span>Payment Method:</span>
                    <span class="text-bold">${data.paymentMethod || 'CASH'}</span>
                </div>

                ${exchangeRateHTML}

                <div class="validity-block">
                    <div class="valid-label">VALID UNTIL</div>
                    <div class="expiry-time">${data.expiryTime || data.expiryDisplay || '--:--:--'}</div>
                    <div class="valid-note">(3 hours from issue)</div>
                </div>

                <div class="footer">
                    <div class="thank-you">✈️ THANK YOU ✈️</div>
                    <div class="footer-note">Thank you for choosing Koveli Lounge</div>
                </div>

                ${data.id ? `
                <div class="transaction-id" style="font-size: 6pt; text-align: center; margin-top: 1mm; color: #666;">
                    ID: ${data.id.substring(0, 8)}...
                </div>
                ` : ''}
            `;
        }

        // Fetch receipt from Firebase using passengerDb from fireshift.js
        async function fetchReceiptFromFirebase(receiptNo) {
            try {
                // Check if passengerDb is available from fireshift.js
                if (typeof passengerDb === 'undefined') {
                    logDebug('ERROR: passengerDb not initialized - fireshift.js may not be loaded');
                    throw new Error('Firebase not initialized');
                }
                
                logDebug(`Fetching receipt from Firebase: ${receiptNo}`);
                
                // Query the Kovelipay collection
                const kovelipayRef = passengerDb.collection('Kovelipay');
                
                // Try to find by receiptNo field
                const snapshot = await kovelipayRef.where('receiptNo', '==', receiptNo).limit(1).get();
                
                if (!snapshot.empty) {
                    const doc = snapshot.docs[0];
                    const data = { id: doc.id, ...doc.data() };
                    logDebug(`✅ Receipt found in Firebase with ID: ${doc.id}`);
                    return data;
                }
                
                // Try direct document access
                const docById = await kovelipayRef.doc(receiptNo).get();
                if (docById.exists) {
                    const data = { id: docById.id, ...docById.data() };
                    logDebug(`✅ Receipt found by direct ID: ${receiptNo}`);
                    return data;
                }
                
                logDebug(`❌ Receipt not found in Firebase: ${receiptNo}`);
                return null;
            } catch (error) {
                console.error('Error fetching receipt:', error);
                throw error;
            }
        }

        // Load receipt data
        async function loadReceipt() {
            const loadingEl = document.getElementById('loadingMessage');
            const errorEl = document.getElementById('errorMessage');
            const receiptDataEl = document.getElementById('receiptData');

            logDebug(`Page loaded - void param: ${voidParam}, reprint: ${reprintParam}`);
            logDebug(`Receipt No: ${receiptNoParam || 'none'}, Has data: ${!!receiptDataParam}`);

            try {
                if (loadingEl) loadingEl.style.display = 'block';
                if (errorEl) errorEl.style.display = 'none';
                if (receiptDataEl) receiptDataEl.style.display = 'none';

                let data = null;

                // Case 1: Data passed via URL parameter
                if (receiptDataParam) {
                    try {
                        data = JSON.parse(decodeURIComponent(receiptDataParam));
                        logDebug(`✅ Data parsed from URL: ${data.receiptNo}`);
                    } catch (e) {
                        logDebug(`❌ Error parsing URL data: ${e.message}`);
                    }
                }
                
                // Case 2: Fetch by receipt number from Firebase
                if (!data && receiptNoParam) {
                    data = await fetchReceiptFromFirebase(receiptNoParam);
                }
                
                // Case 3: Try localStorage
                if (!data) {
                    try {
                        const lastReceipt = localStorage.getItem('lastReceiptData');
                        if (lastReceipt) {
                            data = JSON.parse(lastReceipt);
                            logDebug('✅ Data loaded from localStorage');
                        }
                    } catch (e) {
                        logDebug(`❌ Error parsing localStorage: ${e.message}`);
                    }
                }

                if (!data) {
                    throw new Error('No receipt data found');
                }

                data.isReprint = reprintParam;
                receiptData = data;

                const html = generateReceiptHTML(data);
                if (receiptDataEl) {
                    receiptDataEl.innerHTML = html;
                    receiptDataEl.style.display = 'block';
                }

                if (loadingEl) loadingEl.style.display = 'none';

                const showVoid = shouldShowVoid(data);
                
                if (showVoid) {
                    logDebug('🎯 Adding VOID watermark...');
                    setTimeout(() => {
                        const added = addVoidWatermark();
                        if (!added) {
                            setTimeout(addVoidWatermark, 200);
                        }
                    }, 300);
                }

                const autoPrint = urlParams.get('autoPrint') === 'true';
                if (autoPrint) {
                    logDebug('🖨️ Auto-print enabled');
                    setTimeout(() => {
                        window.print();
                    }, 500);
                }

            } catch (error) {
                console.error('Error loading receipt:', error);
                logDebug(`❌ Error: ${error.message}`);
                
                if (loadingEl) loadingEl.style.display = 'none';
                if (errorEl) {
                    errorEl.style.display = 'block';
                    errorEl.innerHTML = `<p>Error: ${error.message}</p>`;
                }
            }
        }

        // Set back button link
        function setBackLink() {
            const backBtn = document.getElementById('backBtn');
            if (backBtn) {
                const returnTo = urlParams.get('returnTo') || 'pay.html';
                backBtn.href = returnTo;
                logDebug(`Back button: ${returnTo}`);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            logDebug('DOM Content Loaded');
            
            // Small delay to ensure fireshift.js has initialized passengerDb
            setTimeout(() => {
                loadReceipt();
            }, 100);
            
            setBackLink();
        });

        window.addEventListener('load', () => {
            logDebug('Window fully loaded');
            
            if (voidParam && !document.querySelector('.void-watermark')) {
                logDebug('⚠️ Adding void watermark after window load');
                addVoidWatermark();
            }
        });

        window.addEventListener('beforeprint', () => {
            console.log('Printing to EPSON TM-T88vii...');
        });

        window.addEventListener('afterprint', () => {
            console.log('Print completed');
        });
    </script>
</body>
</html>
