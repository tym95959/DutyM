<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli Lounge · Apex Shift</title>
    <!-- ===== MODERN GEOMETRIC + WARM MINIMALISM ===== -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8efe2;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(230, 180, 70, 0.12) 0%, transparent 30%),
                radial-gradient(circle at 95% 75%, rgba(200, 150, 40, 0.1) 0%, transparent 40%),
                linear-gradient(125deg, rgba(255, 215, 120, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(160, 120, 60, 0.02) 0px, rgba(160, 120, 60, 0.02) 2px, transparent 2px, transparent 12px);
            pointer-events: none;
        }

        .container {
            width: 1000px;
            max-width: 96vw;
            background: #ffffffd6;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px 45px;
            box-shadow: 
                0 40px 70px -30px #7a5f3a,
                0 0 0 1px rgba(230, 184, 0, 0.25) inset,
                0 10px 30px -15px #0000001a;
            border: 1px solid #ffddbb;
            position: relative;
            z-index: 5;
        }

        /* header with editable date */
        .brand-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-logo span {
            font-size: 32px;
            background: #e6b80020;
            width: 54px; height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: #b37b2e;
            border: 1px solid #e6b80060;
        }
        
        .brand-logo h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #4f3e22;
        }
        
        .brand-logo h1 strong {
            font-weight: 700;
            background: linear-gradient(145deg, #ac8026, #7b5e29);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* editable date chip */
        .date-chip {
            background: #f3e9d9;
            padding: 8px 12px 8px 22px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            color: #7b622e;
            border: 2px solid #e6b800;
            box-shadow: 0 4px 12px #e6b80030;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .date-display {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .date-picker-input {
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #e6b800;
            background: white;
            font-size: 14px;
            font-weight: 500;
            color: #7b622e;
            cursor: pointer;
            width: 140px;
        }
        
        .apply-date-btn {
            background: #e6b800;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 13px;
            color: #3d2e0f;
            cursor: pointer;
            border: 1px solid #c9a100;
            box-shadow: 0 3px 0 #b88744;
            transition: 0.1s;
        }
        
        .apply-date-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #b88744;
        }

        .user-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f7f1e4;
            border-radius: 80px;
            padding: 6px 6px 6px 22px;
            margin-bottom: 40px;
            border: 1px solid #efdbb0;
            box-shadow: 0 8px 18px -10px #bb9a60;
        }
        
        .user-badge {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .user-name {
            background: white;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 600;
            color: #8b6913;
            box-shadow: inset 0 2px 6px #fde9cc;
            border: 1px solid #f7cf9a;
        }
        
        .user-level {
            background: #e6f0da;
            padding: 6px 20px;
            border-radius: 60px;
            color: #2d6e2d;
            font-weight: 600;
            border: 1px solid #c0daa6;
        }
        
        .user-level.supervisor { background: #ffefd2; color: #b87c1b; border-color: #f5cb8b; }
        
        .user-rcno {
            background: #ffffffb3;
            border: 1px dashed #cfa668;
            padding: 6px 18px;
            border-radius: 60px;
            color: #8f6f3a;
        }
        
        .logout-btn {
            background: #eddbc0;
            border: none;
            border-radius: 60px;
            padding: 12px 32px;
            font-weight: 600;
            color: #5e451f;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #dbb78b;
            box-shadow: 0 6px 0 #b78f5b;
        }
        
        .logout-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b78f5b; }

        .shift-grid {
            display: flex;
            gap: 28px;
            margin-bottom: 30px;
        }
        
        .shift-card {
            flex: 1;
            background: #fcf6eb;
            border-radius: 32px;
            padding: 30px 28px;
            border: 1px solid #fad6a8;
            box-shadow: 0 20px 30px -20px #ac8b57, 0 -2px 0 #ffffff inset, 0 4px 0 #f5dbb5 inset;
            transition: 0.25s ease;
        }
        
        .shift-card.active {
            border: 2px solid #e6b800;
            box-shadow: 0 25px 35px -20px #b68d40, 0 -2px 0 #fff9e6 inset;
            background: #fff8eb;
        }
        
        .shift-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .shift-header .icon {
            font-size: 42px;
            background: #fff1db;
            width: 70px; height: 70px;
            display: flex;
            align-items: center; justify-content: center;
            border-radius: 30px;
            border: 1px solid #f8cf9c;
            box-shadow: 0 10px 16px -12px #bb8b4c;
        }
        
        .shift-header h2 {
            font-size: 28px;
            font-weight: 500;
            color: #6b4e2a;
        }
        
        .shift-header h2 strong { font-weight: 700; color: #8b6913; }

        .shift-status {
            font-size: 18px;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            margin-bottom: 28px;
            background: #f5ebd7;
            border: 1px solid #eed6b0;
            color: #604e28;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset 0 3px 8px #fff1da;
        }
        
        .shift-status.open { background: #e6f2da; color: #2d702d; border-color: #b1d18b; }
        .shift-status.closed { background: #ffe1dc; color: #b64545; border-color: #f7b2a8; }
        .shift-status.pending { background: #fcefd2; color: #9e721d; border-color: #efcb8b; }

        .action-group {
            display: flex;
            gap: 18px;
        }
        
        .action-group button {
            flex: 1;
            padding: 16px 10px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid;
            background: white;
            box-shadow: 0 8px 0 #bfa27b, 0 10px 20px -10px #7d613b;
        }
        
        .action-group button:active { transform: translateY(5px); box-shadow: 0 3px 0 #bfa27b; }
        .btn-open { background: #f2fbe9; border-color: #b8d9a6; color: #2b6e2b; }
        .btn-close { background: #ffeee8; border-color: #fbb5b5; color: #b13e3e; }
        
        .action-group button:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #bfa27b;
            cursor: not-allowed;
        }

        .bottom-dock {
            display: flex;
            gap: 20px;
            margin-top: 28px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .refresh-large {
            flex: 2;
            padding: 18px;
            background: #ede0ce;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            color: #6b4e2a;
            cursor: pointer;
            border: 1px solid #f7cf9a;
            box-shadow: 0 8px 0 #b9915f, 0 10px 20px -8px #a5713a;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .dashboard-btn {
            flex: 3;
            padding: 18px;
            background: #f7e9d2;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            color: #7b592b;
            cursor: pointer;
            border: 1px solid #fad19e;
            box-shadow: 0 8px 0 #cb9f62, 0 10px 20px -8px #a5713a;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .reset-btn {
            flex: 1;
            padding: 18px;
            background: #fbe7c4;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            color: #7b4f1f;
            cursor: pointer;
            border: 1px solid #f5c58c;
            box-shadow: 0 8px 0 #b88744, 0 10px 20px -8px #8b621f;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s;
        }
        
        .reset-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #b88744; }

        #message {
            margin: 20px 0 0;
            padding: 16px 28px;
            border-radius: 70px;
            text-align: center;
            font-weight: 500;
            display: none;
            border: 1px solid;
            font-size: 1rem;
            animation: fadeSlide 0.3s;
        }
        
        @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .success { background: #e1f3d3; color: #2d6e2d; border-color: #b1d18b; }
        .error { background: #ffe4df; color: #ac3a3a; border-color: #fbb5b5; }

        .footer-note {
            text-align: right;
            margin-top: 22px;
            font-size: 14px;
            color: #ad8e4f;
            font-style: italic;
            border-top: 1px dashed #eac476;
            padding-top: 14px;
        }
        
        .date-note {
            font-size: 12px;
            color: #b88744;
            margin-top: 5px;
            text-align: right;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- header with editable date -->
    <div class="brand-head">
        <div class="brand-logo">
            <span>✦</span>
            <h1><strong>Koveli</strong> Lounge · apex</h1>
        </div>
        <div class="date-chip">
            <span>📅</span>
            <div class="date-display">
                <input type="date" id="datePicker" class="date-picker-input" value="">
                <button class="apply-date-btn" onclick="applySelectedDate()">Apply</button>
            </div>
        </div>
    </div>

    <!-- user panel -->
    <div class="user-panel">
        <div class="user-badge">
            <span class="user-name" id="userNameDisplay">👤 operator</span>
            <span class="user-level" id="userLevelDisplay">operator</span>
            <span class="user-rcno" id="userRcnoDisplay">RC: ---</span>
        </div>
        <button class="logout-btn" onclick="logout()">sign out</button>
    </div>

    <!-- message area -->
    <div id="message"></div>

    <!-- shift cards -->
    <div class="shift-grid">
        <!-- morning card -->
        <div class="shift-card" id="morningCard">
            <div class="shift-header">
                <span class="icon">🌅</span>
                <h2><strong>morning</strong> shift</h2>
            </div>
            <div class="shift-status" id="morningStatusDisplay">pending</div>
            <div class="action-group">
                <button class="btn-open" id="openMorningBtn" onclick="handleShift('morning', 'open')">open</button>
                <button class="btn-close" id="closeMorningBtn" onclick="handleShift('morning', 'close')">close</button>
            </div>
        </div>

        <!-- evening card -->
        <div class="shift-card" id="eveningCard">
            <div class="shift-header">
                <span class="icon">🌆</span>
                <h2><strong>evening</strong> shift</h2>
            </div>
            <div class="shift-status" id="eveningStatusDisplay">pending</div>
            <div class="action-group">
                <button class="btn-open" id="openEveningBtn" onclick="handleShift('evening', 'open')">open</button>
                <button class="btn-close" id="closeEveningBtn" onclick="handleShift('evening', 'close')">close</button>
            </div>
        </div>
    </div>

    <!-- bottom dock -->
    <div class="bottom-dock">
        <button class="refresh-large" onclick="loadShiftsForDate()"><span>⟳</span> refresh status</button>
        <button class="dashboard-btn" onclick="goToDashboard()"><span>📋</span> back to dashboard</button>
        <button class="reset-btn" onclick="resetShifts()"><span>✨</span> reset day</button>
    </div>

    <div class="footer-note">
        <span id="lastUpdatedInfo">working date: <span id="currentWorkingDate">---</span></span>
    </div>
    <div class="date-note" id="supervisorNote"></div>
</div>

<script>
    // ===== STANDALONE VERSION - NO FIREBASE =====
    // Using localStorage for data persistence
    
    let currentUser = { name: 'operator', level: 'operator', rcno: '', isSupervisor: false };
    let currentWorkingDate = ''; // Will be set to today or selected date

    // Initialize data structure in localStorage if not exists
    function initializeStorage() {
        if (!localStorage.getItem('shiftData')) {
            const today = getSystemDateString();
            const initialData = {
                [today]: {
                    morning: 'pending',
                    evening: 'pending',
                    date: today,
                    updated: new Date().toLocaleString(),
                    updatedBy: 'system'
                }
            };
            localStorage.setItem('shiftData', JSON.stringify(initialData));
        }
    }

    // Helper function to get today's date in YYYY-MM-DD format
    function getSystemDateString() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // Format date for display (DD/MM/YYYY)
    function formatDateForDisplay(dateStr) {
        if (!dateStr) return 'no date';
        try { 
            if (dateStr.includes('-')) { 
                const [y, m, d] = dateStr.split('-'); 
                return `${d}/${m}/${y}`; 
            } 
            return dateStr; 
        } catch { 
            return dateStr; 
        }
    }

    // Load user from login
    function loadUserFromLogin() {
        try {
            const username = localStorage.getItem('username');
            const level = localStorage.getItem('level');
            const rcno = localStorage.getItem('rcno');
            
            if (username) currentUser.name = username;
            if (level) currentUser.level = level;
            if (rcno) currentUser.rcno = rcno;
            
            const levelStr = (currentUser.level || '').toString().toUpperCase();
            currentUser.isSupervisor = levelStr === 'SUPERVISOR' || levelStr === 'ADMIN' || levelStr === 'MANAGER';
            
            if (!currentUser.name) currentUser.name = 'operator';
            if (!currentUser.level) currentUser.level = 'operator';
            if (!currentUser.rcno) currentUser.rcno = 'N/A';
        } catch (error) {
            currentUser = { name: 'operator', level: 'operator', rcno: 'N/A', isSupervisor: false };
        }
        updateUserDisplay();
        
        // Show supervisor note
        const noteEl = document.getElementById('supervisorNote');
        if (currentUser.isSupervisor) {
            noteEl.textContent = '👑 Supervisor: You can select any date to view/edit shifts';
        } else {
            noteEl.textContent = '';
        }
    }

    function updateUserDisplay() {
        document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.name}`;
        const levelSpan = document.getElementById('userLevelDisplay');
        levelSpan.textContent = currentUser.level;
        if (currentUser.isSupervisor) levelSpan.classList.add('supervisor');
        else levelSpan.classList.remove('supervisor');
        document.getElementById('userRcnoDisplay').textContent = `RC: ${currentUser.rcno}`;
    }

    // Initialize date picker
    function initDatePicker() {
        const today = getSystemDateString();
        const picker = document.getElementById('datePicker');
        picker.value = today;
        currentWorkingDate = today;
        document.getElementById('currentWorkingDate').textContent = formatDateForDisplay(today);
    }

    // Apply selected date
    window.applySelectedDate = function() {
        const selectedDate = document.getElementById('datePicker').value;
        if (!selectedDate) {
            showMessage('Please select a date', true);
            return;
        }
        
        // Check if user is supervisor for future dates
        const today = getSystemDateString();
        if (selectedDate > today && !currentUser.isSupervisor) {
            showMessage('Only supervisors can select future dates', true);
            document.getElementById('datePicker').value = currentWorkingDate;
            return;
        }
        
        currentWorkingDate = selectedDate;
        document.getElementById('currentWorkingDate').textContent = formatDateForDisplay(selectedDate);
        loadShiftsForDate();
        showMessage(`Loaded shifts for ${formatDateForDisplay(selectedDate)}`);
    };

    // Load shifts for current working date
    window.loadShiftsForDate = function() {
        if (!currentWorkingDate) {
            currentWorkingDate = getSystemDateString();
        }
        
        const allShifts = JSON.parse(localStorage.getItem('shiftData') || '{}');
        
        // If no data for this date, create default
        if (!allShifts[currentWorkingDate]) {
            allShifts[currentWorkingDate] = {
                morning: 'pending',
                evening: 'pending',
                date: currentWorkingDate,
                updated: new Date().toLocaleString(),
                updatedBy: 'system'
            };
            localStorage.setItem('shiftData', JSON.stringify(allShifts));
        }
        
        updateShiftUI(allShifts[currentWorkingDate]);
    };

    // Update UI based on shift data
    function updateShiftUI(data) {
        const mornDiv = document.getElementById('morningStatusDisplay');
        const eveDiv = document.getElementById('eveningStatusDisplay');
        const morningCard = document.getElementById('morningCard');
        const eveningCard = document.getElementById('eveningCard');
        
        if (!data) return;

        const m = data.morning || 'pending';
        const e = data.evening || 'pending';

        mornDiv.textContent = m === 'open' ? '🟢 shift open' : m === 'closed' ? '🔴 shift closed' : '🟡 pending';
        mornDiv.className = `shift-status ${m}`;
        eveDiv.textContent = e === 'open' ? '🟢 shift open' : e === 'closed' ? '🔴 shift closed' : '🟡 pending';
        eveDiv.className = `shift-status ${e}`;

        // active highlight
        morningCard.classList.remove('active');
        eveningCard.classList.remove('active');
        if (m === 'open') morningCard.classList.add('active');
        if (e === 'open') eveningCard.classList.add('active');

        // button states - only enable if viewing current date or supervisor
        const canEdit = (currentWorkingDate === getSystemDateString()) || currentUser.isSupervisor;
        
        document.getElementById('openMorningBtn').disabled = !canEdit || !(m === 'pending');
        document.getElementById('closeMorningBtn').disabled = !canEdit || !(m === 'open');
        
        // evening open allowed only if morning closed AND evening pending
        const canOpenEvening = (m === 'closed' && e === 'pending');
        document.getElementById('openEveningBtn').disabled = !canEdit || !canOpenEvening;
        document.getElementById('closeEveningBtn').disabled = !canEdit || !(e === 'open');

        // Update last updated info
        if (data.updated) {
            document.getElementById('lastUpdatedInfo').innerHTML = `working date: <span id="currentWorkingDate">${formatDateForDisplay(currentWorkingDate)}</span> · last action: ${data.updated}`;
        }
    }

    // Handle shift actions
    window.handleShift = function(shift, action) {
        // Check if user can edit this date
        const today = getSystemDateString();
        if (currentWorkingDate !== today && !currentUser.isSupervisor) {
            showMessage('You can only modify today\'s shifts', true);
            return;
        }
        
        const allShifts = JSON.parse(localStorage.getItem('shiftData') || '{}');
        const currentData = allShifts[currentWorkingDate] || {
            morning: 'pending',
            evening: 'pending',
            date: currentWorkingDate
        };

        // Validations
        if (shift === 'morning') {
            if (action === 'open' && currentData.morning === 'open') { 
                showMessage('morning already open!', true); 
                return; 
            }
            if (action === 'close' && currentData.morning !== 'open') { 
                showMessage('open morning first!', true); 
                return; 
            }
        }
        
        if (shift === 'evening') {
            if (currentData.morning !== 'closed') { 
                showMessage('close morning first!', true); 
                return; 
            }
            if (action === 'open' && currentData.evening === 'open') { 
                showMessage('evening already open!', true); 
                return; 
            }
            if (action === 'close' && currentData.evening !== 'open') { 
                showMessage('open evening first!', true); 
                return; 
            }
        }

        // Update data
        const newStatus = action === 'open' ? 'open' : 'closed';
        const now = new Date().toLocaleString();
        
        currentData[shift] = newStatus;
        currentData.updated = now;
        currentData.updatedBy = currentUser.name;
        currentData.updatedByLevel = currentUser.level;
        
        // Save back to storage
        allShifts[currentWorkingDate] = currentData;
        localStorage.setItem('shiftData', JSON.stringify(allShifts));
        
        // Show message and update UI
        showMessage(`✓ ${shift} ${newStatus} for ${formatDateForDisplay(currentWorkingDate)}`);
        
        // Check if we need to redirect (only for current date opens)
        if (action === 'open' && currentWorkingDate === today) {
            showMessage(`✓ ${shift} ${newStatus} · redirecting to dashboard...`);
            setTimeout(() => window.location.href = 'dashboard.html', 900);
        } else {
            loadShiftsForDate(); // Refresh the current view
        }
    };

    // Reset shifts for current working date
    window.resetShifts = function() {
        const today = getSystemDateString();
        
        // Check if user can reset this date
        if (currentWorkingDate !== today && !currentUser.isSupervisor) {
            showMessage('You can only reset today\'s shifts', true);
            return;
        }
        
        const allShifts = JSON.parse(localStorage.getItem('shiftData') || '{}');
        const currentData = allShifts[currentWorkingDate];
        
        if (currentData) {
            // Check for open shifts
            if (currentData.morning === 'open' || currentData.evening === 'open') {
                const confirmClose = confirm(
                    `⚠️ Open shifts detected!\n\n` +
                    `Morning: ${currentData.morning}\n` +
                    `Evening: ${currentData.evening}\n\n` +
                    `Do you want to close all and reset?`
                );
                
                if (!confirmClose) {
                    showMessage('Reset cancelled', true);
                    return;
                }
            }
        }
        
        // Confirm reset
        const confirmReset = confirm(
            `🔄 Reset shifts for ${formatDateForDisplay(currentWorkingDate)}?\n\n` +
            `This will set both shifts to PENDING.`
        );
        
        if (!confirmReset) {
            showMessage('Reset cancelled', true);
            return;
        }
        
        // Perform reset
        const now = new Date().toLocaleString();
        allShifts[currentWorkingDate] = {
            morning: 'pending',
            evening: 'pending',
            date: currentWorkingDate,
            updated: now,
            updatedBy: currentUser.name,
            updatedByLevel: currentUser.level,
            resetBy: currentUser.name,
            resetAt: now
        };
        
        localStorage.setItem('shiftData', JSON.stringify(allShifts));
        showMessage(`✅ Reset shifts for ${formatDateForDisplay(currentWorkingDate)}`);
        loadShiftsForDate();
    };

    // Navigation
    window.logout = function() {
        localStorage.removeItem('username'); 
        localStorage.removeItem('level'); 
        localStorage.removeItem('rcno'); 
        showMessage('signing out...', false);
        setTimeout(() => window.location.href = 'login.html', 1000);
    };
    
    window.goToDashboard = function() { 
        window.location.href = 'dashboard.html'; 
    };

    function showMessage(text, isError = false) {
        const msg = document.getElementById('message');
        msg.style.display = 'block'; 
        msg.textContent = text; 
        msg.className = isError ? 'error' : 'success';
        setTimeout(() => msg.style.display = 'none', 3000);
    }

    function checkLogin() { 
        if (!localStorage.getItem('username')) { 
            window.location.href='login.html'; 
            return false; 
        } 
        return true; 
    }

    // Initialize on load
    window.onload = () => {
        if (!checkLogin()) return;
        initializeStorage();
        loadUserFromLogin();
        initDatePicker();
        loadShiftsForDate();
    };
</script>
</body>
</html>
