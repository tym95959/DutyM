<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli · Pending Approvals</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Your external files -->
    <script src="fireshift.js"></script>
    <script src="iata.js"></script>
    <script src="rate.js"></script>
    <script src="Co.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(120deg, #faf3e0, #fff5e6);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(230, 184, 0, 0.15);
            border: 1px solid rgba(230, 184, 0, 0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(90deg, #fff9e6, #ffffff);
            padding: 20px;
            border-bottom: 2px solid rgba(230, 184, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #8b6913;
            font-size: 24px;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .back-btn {
            background: #6b8e23;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        
        .refresh-btn {
            background: #e6b800;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        
        .stats-bar {
            background: linear-gradient(115deg, #f3d48f20, #eec97a20);
            padding: 15px 20px;
            display: flex;
            gap: 30px;
            border-bottom: 1px solid #e6b80030;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stat-label {
            color: #8b6913;
            font-weight: 600;
            font-size: 14px;
        }
        
        .stat-value {
            background: white;
            padding: 5px 15px;
            border-radius: 30px;
            border: 2px solid #e6b800;
            font-weight: 700;
            color: #6b8e23;
        }
        
        .filters {
            padding: 15px 20px;
            background: #fff9e6;
            border-bottom: 1px solid #e6b80030;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 8px 15px;
            border: 2px solid rgba(230, 184, 0, 0.3);
            border-radius: 30px;
            font-size: 14px;
            min-width: 150px;
        }
        
        .search-input {
            padding: 8px 15px;
            border: 2px solid rgba(230, 184, 0, 0.3);
            border-radius: 30px;
            font-size: 14px;
            flex: 1;
            min-width: 250px;
        }
        
        .transactions-table {
            padding: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th {
            background: #8b6913;
            color: white;
            padding: 12px 8px;
            font-weight: 600;
            text-align: left;
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e6b80030;
        }
        
        tr:hover {
            background: #fff9e6;
        }
        
        .payment-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-cash { background: #6b8e23; color: white; }
        .badge-card { background: #4a6fa5; color: white; }
        .badge-transfer { background: #c68b5e; color: white; }
        .badge-pending { background: #b63e3e; color: white; }
        
        .missing-field {
            color: #b63e3e;
            font-size: 11px;
            display: block;
        }
        
        .action-btn {
            background: #6b8e23;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin: 2px;
        }
        
        .action-btn.approve {
            background: #4a6fa5;
        }
        
        .action-btn.print {
            background: #8b6913;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: linear-gradient(145deg, #fff9e6, #fff2d7);
            border: 3px solid #e6b800;
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            color: #8b6913;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(230, 184, 0, 0.3);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #8b6913;
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid rgba(230, 184, 0, 0.3);
            border-radius: 8px;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .save-btn {
            background: #6b8e23;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .cancel-btn {
            background: #c68b5e;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .no-data {
            text-align: center;
            padding: 50px;
            color: #8b6913;
            font-size: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #8b6913;
        }
        
        .summary-box {
            background: white;
            border: 2px solid #e6b800;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
        }
        
        .status-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #6b8e23;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Receipt Print Styles - 80mm x 100mm */
        @media print {
            @page {
                size: 80mm 100mm;
                margin: 2mm;
            }
            body * {
                visibility: hidden;
            }
            .receipt-print,
            .receipt-print * {
                visibility: visible;
            }
            .receipt-print {
                position: absolute;
                left: 0;
                top: 0;
                width: 76mm;
                padding: 3mm;
                background: white;
                font-family: 'Courier New', monospace;
                font-size: 10px;
                line-height: 1.4;
            }
        }
        
        .receipt-print {
            display: none;
        }
        
        .receipt-print.active {
            display: block;
        }
        
        .receipt-print .center {
            text-align: center;
            margin-bottom: 4px;
        }
        
        .receipt-print .company {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        .receipt-print .company-detail {
            font-size: 8px;
            color: #333;
        }
        
        .receipt-print .divider {
            border-top: 1px dashed #888;
            margin: 5px 0;
        }
        
        .receipt-print .row {
            display: flex;
            justify-content: space-between;
            margin: 2px 0;
        }
        
        .receipt-print .passenger {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            background: #f0f0f0;
            padding: 4px 0;
            margin: 6px 0;
            text-transform: uppercase;
        }
        
        .receipt-print .flight-info {
            display: flex;
            justify-content: space-between;
            background: #f5f5f5;
            padding: 4px 6px;
            margin: 5px 0;
            font-weight: 600;
        }
        
        .receipt-print .items {
            width: 100%;
            margin: 5px 0;
            border-collapse: collapse;
        }
        
        .receipt-print .items td {
            padding: 2px 0;
        }
        
        .receipt-print .items td:first-child {
            text-align: left;
        }
        
        .receipt-print .items td:nth-child(2) {
            text-align: right;
            padding-right: 5px;
        }
        
        .receipt-print .items td:last-child {
            text-align: right;
            font-weight: 600;
        }
        
        .receipt-print .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 12px;
            margin: 4px 0;
            padding: 3px 0;
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
        }
        
        .receipt-print .payment-line {
            display: flex;
            justify-content: space-between;
            background: #efefef;
            padding: 4px 5px;
            margin: 5px 0;
            font-weight: 600;
        }
        
        .receipt-print .valid-block {
            text-align: center;
            border: 2px solid #111;
            padding: 6px 2px;
            margin: 8px 0;
        }
        
        .receipt-print .valid-block .time {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        
        .receipt-print .footer {
            text-align: center;
            font-size: 8px;
            margin-top: 5px;
            color: #444;
        }
        
        .receipt-print .reprint {
            text-align: center;
            font-size: 9px;
            font-weight: bold;
            color: #b33;
            background: #ffe0e0;
            padding: 2px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PENDING APPROVALS</h1>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn">↻ REFRESH</button>
                <a href="index.html" class="back-btn">← BACK TO PAYMENT</a>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">TOTAL PENDING:</span>
                <span class="stat-value" id="totalPending">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">CARD PAYMENTS:</span>
                <span class="stat-value" id="cardPending">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">OTHER PAYMENTS:</span>
                <span class="stat-value" id="otherPending">0</span>
            </div>
        </div>
        
        <div class="filters">
            <select class="filter-select" id="paymentFilter">
                <option value="ALL">ALL PAYMENT METHODS</option>
                <option value="CARD">CARD ONLY</option>
                <option value="BANK TRANSFER">BANK TRANSFER</option>
                <option value="MOBILE PAYMENT">MOBILE PAYMENT</option>
                <option value="VOUCHER">VOUCHER</option>
            </select>
            
            <select class="filter-select" id="missingFilter">
                <option value="ALL">ALL MISSING FIELDS</option>
                <option value="approval">MISSING APPROVAL CODE</option>
                <option value="batch">MISSING BATCH NO</option>
                <option value="card">MISSING CARD TYPE</option>
            </select>
            
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 SEARCH BY RECEIPT # OR PASSENGER NAME...">
        </div>
        
        <div class="transactions-table">
            <table id="transactionsTable">
                <thead>
                    <tr>
                        <th>DATE/TIME</th>
                        <th>RECEIPT #</th>
                        <th>PASSENGER</th>
                        <th>PAYMENT METHOD</th>
                        <th>AMOUNT</th>
                        <th>REQUIRED FIELDS</th>
                        <th>STATUS</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8" class="loading">Loading pending transactions...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Hidden Receipt Template -->
    <div class="receipt-print" id="receiptTemplate"></div>
    
    <!-- Approval Modal -->
    <div id="approvalModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">UPDATE APPROVAL DETAILS</h2>
            <div class="summary-box" id="transactionSummary"></div>
            
            <form id="approvalForm">
                <input type="hidden" id="transactionId">
                <input type="hidden" id="docId">
                
                <div class="form-group">
                    <label>PAYMENT METHOD</label>
                    <input type="text" id="modalPaymentMethod" readonly>
                </div>
                
                <div class="form-group" id="approvalCodeGroup">
                    <label>APPROVAL CODE *</label>
                    <input type="text" id="approvalCode" placeholder="ENTER APPROVAL CODE">
                </div>
                
                <div class="form-group" id="batchNoGroup">
                    <label>BATCH NUMBER *</label>
                    <input type="text" id="batchNo" placeholder="ENTER BATCH NUMBER">
                </div>
                
                <div class="form-group" id="cardTypeGroup">
                    <label>CARD TYPE *</label>
                    <select id="cardType">
                        <option value="">SELECT CARD TYPE</option>
                        <option value="VISA">VISA</option>
                        <option value="MASTER">MASTER</option>
                        <option value="AMEX">AMEX</option>
                        <option value="UNIONPAY">UNIONPAY</option>
                        <option value="WECHATPAY">WECHATPAY</option>
                        <option value="ALIPAY">ALIPAY</option>
                        <option value="QRPAY">QRPAY</option>
                    </select>
                </div>
                
                <div class="modal-buttons">
                    <button type="button" class="cancel-btn" onclick="closeModal()">CANCEL</button>
                    <button type="submit" class="save-btn">SAVE & APPROVE</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        let allTransactions = [];
        let currentUser = null;
        let currentExchangeRate = 15.42;
        
        // Load user data
        function loadUser() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                try {
                    currentUser = JSON.parse(loggedInUser);
                } catch (e) {
                    currentUser = { username: localStorage.getItem('username') };
                }
            } else {
                currentUser = {
                    username: localStorage.getItem('username'),
                    level: localStorage.getItem('level'),
                    rcno: localStorage.getItem('rcno')
                };
            }
        }
        
        // Show status message
        function showStatus(message, isError = false) {
            const statusDiv = document.createElement('div');
            statusDiv.className = 'status-message';
            statusDiv.style.background = isError ? '#c68b5e' : '#6b8e23';
            statusDiv.textContent = message;
            document.body.appendChild(statusDiv);
            
            setTimeout(() => {
                statusDiv.remove();
            }, 3000);
        }
        
        // Generate receipt content (80mm format)
        function generateReceiptContent(transaction) {
            const timeOnly = transaction.submissionDateTime ? 
                (transaction.submissionDateTime.split(' ')[1] || transaction.submissionDateTime) : '';
            
            // Get airline name if available
            let airlineName = transaction.flightNo || '';
            if (window.airlineData && transaction.flightNo) {
                const iataCode = transaction.flightNo.substring(0, 2);
                const airline = window.airlineData.airlines_flying_to_maldives?.find(a => a.iata === iataCode);
                if (airline) airlineName = airline.airline;
            }
            
            return `
                <div class="center">
                    <div class="company">KOVELI LOUNGE</div>
                    <div class="company-detail">Velana International Airport</div>
                    <div class="company-detail">+960 304 6677</div>
                </div>
                <div class="reprint">*** R E P R I N T ***</div>
                <div class="divider"></div>
        
                <div class="row">
                    <span class="l">Receipt No:</span>
                    <span class="r">${transaction.receiptNo || 'N/A'}</span>
                </div>
                <div class="row">
                    <span class="l">Date:</span>
                    <span class="r">${transaction.shiftDate || transaction.date || ''}</span>
                </div>
                <div class="row">
                    <span class="l">Shift:</span>
                    <span class="r">${transaction.shiftName || transaction.shift || ''}</span>
                </div>
                <div class="row">
                    <span class="l">Time:</span>
                    <span class="r">${timeOnly}</span>
                </div>
                <div class="row">
                    <span class="l">Cashier:</span>
                    <span class="r">${transaction.cashier?.name || transaction.user?.username || 'N/A'}</span>
                </div>
        
                <div class="divider"></div>
        
                <div class="passenger">${transaction.passengerName || 'N/A'}</div>
        
                <div class="flight-info">
                    <span>Flight: ${airlineName}</span>
                    <span>Seat: ${transaction.seatNo || 'N/A'}</span>
                </div>
        
                <table class="items">
                    <tr>
                        <td>Adult x${transaction.adult || 0} (${transaction.rateType || 'A'})</td>
                        <td>${transaction.currency || 'USD'} ${Number(transaction.adultPrice || 0).toFixed(2)}</td>
                        <td>${transaction.currency || 'USD'} ${Number(transaction.adultSubtotal || 0).toFixed(2)}</td>
                    </tr>
                    <tr>
                        <td>Child x${transaction.children || 0} (${transaction.rateType || 'A'})</td>
                        <td>${transaction.currency || 'USD'} ${Number(transaction.childrenPrice || 0).toFixed(2)}</td>
                        <td>${transaction.currency || 'USD'} ${Number(transaction.childrenSubtotal || 0).toFixed(2)}</td>
                    </tr>
                </table>
        
                <div class="divider"></div>
        
                <div class="row">
                    <span class="l">Subtotal:</span>
                    <span class="r">${transaction.currency || 'USD'} ${Number(transaction.subtotal || 0).toFixed(2)}</span>
                </div>
                <div class="row">
                    <span class="l">GST ${transaction.gstRate || 8}%:</span>
                    <span class="r">${transaction.currency || 'USD'} ${Number(transaction.gstAmount || 0).toFixed(2)}</span>
                </div>
                <div class="total-row">
                    <span>TOTAL:</span>
                    <span>${transaction.currency || 'USD'} ${Number(transaction.totalAmount || 0).toFixed(2)}</span>
                </div>
        
                <div class="payment-line">
                    <span>Payment:</span>
                    <span>${transaction.paymentMethod || 'N/A'}</span>
                </div>
        
                ${transaction.paymentMethod !== 'CASH' ? `
                <div class="row">
                    <span class="l">Approval:</span>
                    <span class="r">${transaction.approvalCode || transaction.approval || 'PENDING'}</span>
                </div>
                <div class="row">
                    <span class="l">Batch No:</span>
                    <span class="r">${transaction.batchNo || transaction.batch || 'PENDING'}</span>
                </div>
                ` : ''}
        
                ${transaction.cardType ? `
                <div class="row">
                    <span class="l">Card Type:</span>
                    <span class="r">${transaction.cardType}</span>
                </div>
                ` : ''}
        
                ${transaction.currency === 'MVR' ? `
                <div class="row">
                    <span class="l">Exchange rate:</span>
                    <span class="r">1 USD = ${(transaction.exchangeRateUsed || currentExchangeRate).toFixed(2)} MVR</span>
                </div>
                ` : ''}
        
                <div class="valid-block">
                    <div class="label">VALID UNTIL</div>
                    <div class="time">${transaction.expiryTime || '--:--:--'}</div>
                    <div class="label">(3 hours from issue)</div>
                </div>
        
                <div class="footer">Thank you for choosing Koveli Lounge</div>
                <div class="footer">✈️ welcome back ✈️</div>
            `;
        }
        
        // Print receipt function
        function printReceipt(transaction) {
            const receiptTemplate = document.getElementById('receiptTemplate');
            receiptTemplate.innerHTML = generateReceiptContent(transaction);
            receiptTemplate.classList.add('active');
            
            setTimeout(() => {
                window.print();
                setTimeout(() => {
                    receiptTemplate.classList.remove('active');
                    receiptTemplate.innerHTML = '';
                }, 100);
            }, 100);
        }
        
        // Fetch all pending transactions
        async function fetchPendingTransactions() {
            try {
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = '<tr><td colspan="8" class="loading">Loading pending transactions...</td></tr>';
                
                if (typeof passengerDb === 'undefined') {
                    throw new Error('Database not initialized');
                }
                
                const kovelipayRef = passengerDb.collection('Kovelipay');
                const snapshot = await kovelipayRef.get();
                
                allTransactions = [];
                let cardPending = 0;
                let otherPending = 0;
                
                // Get exchange rate from rates if available
                if (typeof rates !== 'undefined' && rates.exchangeRate) {
                    currentExchangeRate = rates.exchangeRate.MVRtoUSD || 15.42;
                }
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const paymentMethod = data.paymentMethod || '';
                    
                    // Skip CASH payments
                    if (paymentMethod === 'CASH') return;
                    
                    // Check required fields
                    const hasApprovalCode = (data.approvalCode && data.approvalCode.trim() !== '') || 
                                           (data.approval && data.approval.trim() !== '');
                    const hasBatchNo = (data.batchNo && data.batchNo.trim() !== '') || 
                                      (data.batch && data.batch.trim() !== '');
                    const hasCardType = (data.cardType && data.cardType.trim() !== '') || 
                                       (data.card && data.card.trim() !== '');
                    
                    // Determine if this is a card payment
                    const cardPayments = ['AMEX', 'VISA', 'MASTER', 'UNIONPAY', 'WECHATPAY', 'QRPAY', 'ALIPAY', 'CARD'];
                    const isCardPayment = cardPayments.includes(paymentMethod);
                    
                    // Check if complete
                    let isComplete = false;
                    if (isCardPayment) {
                        isComplete = hasApprovalCode && hasBatchNo && hasCardType;
                    } else {
                        isComplete = hasApprovalCode && hasBatchNo;
                    }
                    
                    // Only include pending transactions
                    if (!isComplete) {
                        const transaction = {
                            id: doc.id,
                            ...data,
                            hasApprovalCode: hasApprovalCode,
                            hasBatchNo: hasBatchNo,
                            hasCardType: hasCardType,
                            isCardPayment: isCardPayment
                        };
                        
                        allTransactions.push(transaction);
                        
                        if (isCardPayment) {
                            cardPending++;
                        } else {
                            otherPending++;
                        }
                    }
                });
                
                // Update stats
                document.getElementById('totalPending').textContent = allTransactions.length;
                document.getElementById('cardPending').textContent = cardPending;
                document.getElementById('otherPending').textContent = otherPending;
                
                // Display transactions
                displayTransactions(allTransactions);
                
                console.log('Pending transactions loaded:', allTransactions);
                
            } catch (error) {
                console.error('Error fetching pending transactions:', error);
                document.getElementById('tableBody').innerHTML = 
                    `<tr><td colspan="8" class="loading" style="color: #c68b5e;">Error loading transactions: ${error.message}</td></tr>`;
            }
        }
        
        // Display transactions in table
        function displayTransactions(transactions) {
            const tableBody = document.getElementById('tableBody');
            
            if (transactions.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" class="no-data">✅ NO PENDING APPROVALS FOUND</td></tr>';
                return;
            }
            
            let html = '';
            
            transactions.forEach(t => {
                // Determine missing fields
                const missingFields = [];
                if (!t.hasApprovalCode) missingFields.push('Approval Code');
                if (!t.hasBatchNo) missingFields.push('Batch No');
                if (t.isCardPayment && !t.hasCardType) missingFields.push('Card Type');
                
                // Format date/time
                let dateTime = t.submissionDateTime || t.createdAt || 'N/A';
                if (dateTime && dateTime.includes(',')) {
                    const parts = dateTime.split(',');
                    dateTime = parts[0].trim() + ' ' + (parts[1] || '').trim();
                }
                
                html += `
                    <tr>
                        <td>${dateTime}</td>
                        <td><strong>${t.receiptNo || 'N/A'}</strong></td>
                        <td>
                            ${t.passengerName || 'N/A'}<br>
                            <small style="color: #8b6913;">${t.flightNo || ''} / Seat ${t.seatNo || ''}</small>
                        </td>
                        <td>
                            <span class="payment-badge ${getBadgeClass(t.paymentMethod)}">${t.paymentMethod || 'N/A'}</span>
                        </td>
                        <td><strong>${t.currency || 'USD'} ${Number(t.totalAmount || 0).toFixed(2)}</strong></td>
                        <td>
                            ${missingFields.map(f => `<span class="missing-field">⚠️ MISSING: ${f}</span>`).join('')}
                            ${missingFields.length === 0 ? '✅ ALL FIELDS OK' : ''}
                        </td>
                        <td>
                            <span class="payment-badge badge-pending">PENDING</span>
                        </td>
                        <td>
                            <button class="action-btn" onclick="editTransaction('${t.id}')">✏️ EDIT</button>
                            <button class="action-btn approve" onclick="viewDetails('${t.id}')">👁️ VIEW</button>
                            <button class="action-btn print" onclick="printReceipt(${JSON.stringify(t).replace(/'/g, "\\'")})">🖨️ PRINT</button>
                        </td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
        }
        
        function getBadgeClass(method) {
            if (method === 'CARD' || method.includes('VISA') || method.includes('MASTER')) {
                return 'badge-card';
            } else if (method === 'BANK TRANSFER') {
                return 'badge-transfer';
            } else {
                return 'badge-cash';
            }
        }
        
        // Edit transaction
        function editTransaction(transactionId) {
            const transaction = allTransactions.find(t => t.id === transactionId);
            if (!transaction) return;
            
            document.getElementById('transactionId').value = transaction.receiptNo;
            document.getElementById('docId').value = transaction.id;
            document.getElementById('modalPaymentMethod').value = transaction.paymentMethod || '';
            document.getElementById('approvalCode').value = transaction.approvalCode || transaction.approval || '';
            document.getElementById('batchNo').value = transaction.batchNo || transaction.batch || '';
            document.getElementById('cardType').value = transaction.cardType || transaction.card || '';
            
            // Show/hide card type field based on payment method
            const cardTypeGroup = document.getElementById('cardTypeGroup');
            if (transaction.isCardPayment) {
                cardTypeGroup.style.display = 'block';
            } else {
                cardTypeGroup.style.display = 'none';
            }
            
            // Update summary
            document.getElementById('transactionSummary').innerHTML = `
                <strong>Receipt:</strong> ${transaction.receiptNo}<br>
                <strong>Passenger:</strong> ${transaction.passengerName}<br>
                <strong>Amount:</strong> ${transaction.currency || 'USD'} ${Number(transaction.totalAmount || 0).toFixed(2)}
            `;
            
            document.getElementById('approvalModal').style.display = 'flex';
        }
        
        function viewDetails(transactionId) {
            editTransaction(transactionId);
        }
        
        function closeModal() {
            document.getElementById('approvalModal').style.display = 'none';
        }
        
        // Save approval details
        document.getElementById('approvalForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const docId = document.getElementById('docId').value;
            const approvalCode = document.getElementById('approvalCode').value.trim();
            const batchNo = document.getElementById('batchNo').value.trim();
            const cardType = document.getElementById('cardType').value;
            const paymentMethod = document.getElementById('modalPaymentMethod').value;
            
            // Validate based on payment method
            const cardPayments = ['AMEX', 'VISA', 'MASTER', 'UNIONPAY', 'WECHATPAY', 'QRPAY', 'ALIPAY', 'CARD'];
            const isCardPayment = cardPayments.includes(paymentMethod);
            
            if (!approvalCode) {
                alert('Approval Code is required');
                return;
            }
            
            if (!batchNo) {
                alert('Batch Number is required');
                return;
            }
            
            if (isCardPayment && !cardType) {
                alert('Card Type is required for card payments');
                return;
            }
            
            try {
                const updateData = {
                    approvalCode: approvalCode,
                    batchNo: batchNo,
                    updatedAt: new Date().toISOString(),
                    updatedBy: currentUser?.username || 'Unknown'
                };
                
                if (isCardPayment) {
                    updateData.cardType = cardType;
                }
                
                await passengerDb.collection('Kovelipay').doc(docId).update(updateData);
                
                showStatus('✅ Transaction approved successfully!');
                closeModal();
                fetchPendingTransactions(); // Refresh the list
                
            } catch (error) {
                console.error('Error updating transaction:', error);
                showStatus('❌ Error updating transaction: ' + error.message, true);
            }
        });
        
        // Filter functionality
        document.getElementById('paymentFilter').addEventListener('change', filterTransactions);
        document.getElementById('missingFilter').addEventListener('change', filterTransactions);
        document.getElementById('searchInput').addEventListener('input', filterTransactions);
        
        function filterTransactions() {
            const paymentFilter = document.getElementById('paymentFilter').value;
            const missingFilter = document.getElementById('missingFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allTransactions];
            
            // Filter by payment method
            if (paymentFilter !== 'ALL') {
                if (paymentFilter === 'CARD') {
                    filtered = filtered.filter(t => t.isCardPayment);
                } else {
                    filtered = filtered.filter(t => t.paymentMethod === paymentFilter);
                }
            }
            
            // Filter by missing fields
            if (missingFilter !== 'ALL') {
                filtered = filtered.filter(t => {
                    if (missingFilter === 'approval') return !t.hasApprovalCode;
                    if (missingFilter === 'batch') return !t.hasBatchNo;
                    if (missingFilter === 'card') return t.isCardPayment && !t.hasCardType;
                    return true;
                });
            }
            
            // Filter by search term
            if (searchTerm) {
                filtered = filtered.filter(t => 
                    (t.receiptNo && t.receiptNo.toLowerCase().includes(searchTerm)) ||
                    (t.passengerName && t.passengerName.toLowerCase().includes(searchTerm)) ||
                    (t.flightNo && t.flightNo.toLowerCase().includes(searchTerm))
                );
            }
            
            displayTransactions(filtered);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadUser();
            fetchPendingTransactions();
            
            document.getElementById('refreshBtn').addEventListener('click', fetchPendingTransactions);
            
            // Close modal when clicking outside
            window.addEventListener('click', function(event) {
                const modal = document.getElementById('approvalModal');
                if (event.target === modal) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
