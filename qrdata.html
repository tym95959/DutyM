<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli Lounge - QR Card Data</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Your firebase config file -->
    <script src="fireshift.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(120deg, #faf3e0, #fff5e6);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(230, 184, 0, 0.2);
            padding: 25px;
            border: 1px solid rgba(230, 184, 0, 0.3);
        }

        h1 {
            color: #8b6913;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 600;
            border-bottom: 2px solid rgba(230, 184, 0, 0.3);
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 i {
            color: #e6b800;
        }

        .filter-section {
            background: linear-gradient(135deg, #fff9e6, #fff2d7);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(230, 184, 0, 0.3);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: #8b6913;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filter-group select, .filter-group input {
            padding: 12px;
            border: 2px solid rgba(230, 184, 0, 0.3);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            background: white;
        }

        .filter-group select {
            cursor: pointer;
        }

        .filter-group select:focus, .filter-group input:focus {
            outline: none;
            border-color: #e6b800;
            box-shadow: 0 0 0 3px rgba(230, 184, 0, 0.1);
        }

        .filter-group select option {
            padding: 10px;
        }

        .filter-group select:disabled, .filter-group input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .filter-group input::placeholder {
            color: #c9a65c;
            opacity: 0.6;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            grid-column: span 2;
            justify-content: flex-end;
        }

        .search-btn, .reset-btn, .refresh-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn {
            background: linear-gradient(135deg, #e6b800, #d4a900);
            color: white;
        }

        .search-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #d4a900, #c29800);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(230, 184, 0, 0.3);
        }

        .reset-btn {
            background: linear-gradient(135deg, #c68b5e, #a67244);
            color: white;
        }

        .reset-btn:hover {
            background: linear-gradient(135deg, #a67244, #8b5a3c);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(198, 139, 94, 0.3);
        }

        .refresh-btn {
            background: linear-gradient(135deg, #4682b4, #31698e);
            color: white;
        }

        .refresh-btn:hover {
            background: linear-gradient(135deg, #31698e, #1e4b6a);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(70, 130, 180, 0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #faf3e0;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(230, 184, 0, 0.2);
        }

        .record-count {
            font-size: 14px;
            color: #5e4a1a;
            font-weight: 600;
        }

        .record-count span {
            background: #e6b800;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 8px;
            font-size: 12px;
        }

        .loading-indicator {
            color: #e6b800;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(230, 184, 0, 0.3);
            border-top-color: #e6b800;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(230, 184, 0, 0.2);
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        th {
            background: linear-gradient(135deg, #faf3e0, #fff5e6);
            color: #8b6913;
            padding: 12px 8px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            border-bottom: 2px solid #e6b800;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(230, 184, 0, 0.1);
            color: #5e4a1a;
            font-size: 13px;
        }

        tr:hover td {
            background: rgba(230, 184, 0, 0.05);
        }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #c9a65c;
            font-style: italic;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-code {
            background: rgba(230, 184, 0, 0.15);
            color: #8b6913;
            border: 1px solid rgba(230, 184, 0, 0.3);
            font-family: monospace;
        }

        .badge-flight {
            background: rgba(107, 142, 35, 0.15);
            color: #556b2f;
            border: 1px solid rgba(107, 142, 35, 0.3);
        }

        .badge-date {
            background: rgba(198, 139, 94, 0.15);
            color: #c68b5e;
            border: 1px solid rgba(198, 139, 94, 0.3);
        }

        .code-value {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: monospace;
            font-size: 11px;
        }

        .distinct-values {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .distinct-values span {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #8b6913;
            opacity: 0.7;
        }

        .error-message {
            color: #c68b5e;
            background: #fff2f0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #c68b5e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-qrcode"></i>
            QR Card Data - cardentryqr
        </h1>

        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-group">
                <label><i class="fas fa-calendar"></i> Date</label>
                <select id="filterDate" onchange="filterData()">
                    <option value="">ALL DATES</option>
                </select>
                <div class="distinct-values">
                    <span id="dateCount">0 dates</span>
                </div>
            </div>

            <div class="filter-group">
                <label><i class="fas fa-plane"></i> Flight Number</label>
                <select id="filterFlight" onchange="filterData()">
                    <option value="">ALL FLIGHTS</option>
                </select>
                <div class="distinct-values">
                    <span id="flightCount">0 flights</span>
                </div>
            </div>

            <div class="filter-group">
                <label><i class="fas fa-user"></i> Passenger Name</label>
                <input type="text" id="filterName" placeholder="Search by name..." oninput="filterData()">
            </div>

            <div class="filter-group">
                <label><i class="fas fa-chair"></i> Seat Number</label>
                <input type="text" id="filterSeat" placeholder="Search by seat..." oninput="filterData()">
            </div>

            <div class="filter-group">
                <label><i class="fas fa-id-card"></i> FQTV</label>
                <input type="text" id="filterFQTV" placeholder="Search by FQTV..." oninput="filterData()">
            </div>

            <div class="button-group">
                <button class="search-btn" onclick="filterData()" id="searchBtn">
                    <i class="fas fa-search"></i> FILTER
                </button>
                <button class="reset-btn" onclick="resetFilters()">
                    <i class="fas fa-undo"></i> RESET
                </button>
                <button class="refresh-btn" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> REFRESH
                </button>
            </div>
        </div>

        <!-- Error Message (if any) -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="record-count">
                <i class="fas fa-database"></i> 
                Showing: <span id="recordCount">0</span> of <span id="totalCount">0</span> records
            </div>
            <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                <div class="spinner"></div>
                <span>Loading data...</span>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>DATE</th>
                        <th>FLIGHT NO</th>
                        <th>PASSENGER NAME</th>
                        <th>SEAT NO</th>
                        <th>FQTV</th>
                        <th>CODE</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row">
                        <td colspan="6">
                            <i class="fas fa-spinner fa-spin"></i>
                            Loading data from Firebase...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <i class="fas fa-info-circle"></i>
            Data from cardentryqr collection • Showing code from Firebase
        </div>
    </div>

    <script>
        // Global variables
        let allData = [];
        let filteredData = [];
        let distinctDates = [];
        let distinctFlights = [];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, checking Firebase...');
            
            // Check if Firebase is available
            if (typeof firebase === 'undefined') {
                showError('Firebase not loaded. Check your internet connection.');
                return;
            }
            
            // Check if cardDb is available
            if (typeof cardDb === 'undefined') {
                console.log('cardDb not found, trying window.cardDb...');
                if (typeof window.cardDb !== 'undefined') {
                    window.cardDb = window.cardDb;
                    console.log('Using window.cardDb');
                } else {
                    showError('cardDb not initialized. Check fireshift.js configuration.');
                    return;
                }
            }
            
            // Load initial data
            loadAllData();
        });

        // Load all data from cardentryqr
        async function loadAllData() {
            showLoading(true);
            disableControls(true);
            hideError();
            
            try {
                console.log('Loading data from cardentryqr...');
                
                // Use the correct database reference
                const db = cardDb || window.cardDb;
                
                if (!db) {
                    throw new Error('Database not available');
                }
                
                // Get all documents from QrCards collection
                const snapshot = await db.collection('QrCards').get();
                
                if (snapshot.empty) {
                    console.log('No documents found in QrCards collection');
                    allData = [];
                    distinctDates = [];
                    distinctFlights = [];
                } else {
                    console.log(`Found ${snapshot.size} documents`);
                    
                    allData = [];
                    const dateSet = new Set();
                    const flightSet = new Set();
                    
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        
                        // Extract data with fallbacks
                        let date = data.date || '';
                        let flightNo = data.flightNo || '';
                        let pName = data.pName || data.name || '';
                        let seatNo = data.seatNo || data.seat || '';
                        let FQTV = data.FQTV || data.fqtv || data.frequentFlyer || '';
                        let code = data.code || '';
                        
                        // Try to parse date from doc.id if format is DATE_FLIGHT
                        if (!date && doc.id && doc.id.includes('_')) {
                            const parts = doc.id.split('_');
                            date = parts[0] || '';
                            if (!flightNo && parts[1]) flightNo = parts[1];
                        }
                        
                        // Format date for display (YYYY-MM-DD)
                        let displayDate = date;
                        if (date && date.length === 8 && !date.includes('-') && !date.includes('/')) {
                            // Format YYYYMMDD to YYYY-MM-DD
                            displayDate = `${date.substring(0,4)}-${date.substring(4,6)}-${date.substring(6,8)}`;
                        } else if (date && date.includes('/')) {
                            // Convert DD/MM/YYYY to YYYY-MM-DD
                            const parts = date.split('/');
                            if (parts.length === 3) {
                                if (parts[2].length === 4) {
                                    displayDate = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                                }
                            }
                        }
                        
                        // Add to distinct sets
                        if (displayDate) dateSet.add(displayDate);
                        if (flightNo) flightSet.add(flightNo);
                        
                        allData.push({
                            id: doc.id,
                            date: displayDate || '',
                            rawDate: date,
                            flightNo: flightNo || '',
                            pName: pName || '',
                            seatNo: seatNo || '',
                            FQTV: FQTV || '',
                            code: code || '',
                            ...data // Include all original data for reference
                        });
                    });
                    
                    // Convert sets to sorted arrays
                    distinctDates = Array.from(dateSet).sort().reverse(); // Newest first
                    distinctFlights = Array.from(flightSet).sort();
                }
                
                console.log(`Loaded ${allData.length} records from cardentryqr`);
                console.log(`Found ${distinctDates.length} unique dates`);
                console.log(`Found ${distinctFlights.length} unique flights`);
                
                // Sort by date (newest first)
                allData.sort((a, b) => {
                    if (a.date > b.date) return -1;
                    if (a.date < b.date) return 1;
                    return 0;
                });
                
                // Populate dropdowns
                populateDateDropdown();
                populateFlightDropdown();
                
                filteredData = [...allData];
                renderTable();
                updateRecordCount();
                
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Failed to load data: ' + error.message);
                
                // Show empty table
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="6">
                            <i class="fas fa-exclamation-triangle" style="color: #c68b5e;"></i>
                            Error: ${error.message}
                        </td>
                    </tr>
                `;
            } finally {
                showLoading(false);
                disableControls(false);
            }
        }

        // Populate date dropdown
        function populateDateDropdown() {
            const dateSelect = document.getElementById('filterDate');
            const dateCount = document.getElementById('dateCount');
            
            // Clear existing options except first
            while (dateSelect.options.length > 1) {
                dateSelect.remove(1);
            }
            
            // Add date options
            distinctDates.forEach(date => {
                if (date) { // Only add non-empty dates
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = date;
                    dateSelect.appendChild(option);
                }
            });
            
            // Update count
            dateCount.textContent = `${distinctDates.length} date${distinctDates.length !== 1 ? 's' : ''}`;
        }

        // Populate flight dropdown
        function populateFlightDropdown() {
            const flightSelect = document.getElementById('filterFlight');
            const flightCount = document.getElementById('flightCount');
            
            // Clear existing options except first
            while (flightSelect.options.length > 1) {
                flightSelect.remove(1);
            }
            
            // Add flight options
            distinctFlights.forEach(flight => {
                if (flight) { // Only add non-empty flights
                    const option = document.createElement('option');
                    option.value = flight;
                    option.textContent = flight;
                    flightSelect.appendChild(option);
                }
            });
            
            // Update count
            flightCount.textContent = `${distinctFlights.length} flight${distinctFlights.length !== 1 ? 's' : ''}`;
        }

        // Filter data based on all filter inputs
        function filterData() {
            const dateFilter = document.getElementById('filterDate').value;
            const flightFilter = document.getElementById('filterFlight').value;
            const nameFilter = document.getElementById('filterName').value.trim().toLowerCase();
            const seatFilter = document.getElementById('filterSeat').value.trim().toLowerCase();
            const fqtvFilter = document.getElementById('filterFQTV').value.trim().toLowerCase();
            
            filteredData = allData.filter(item => {
                // Date filter
                if (dateFilter && item.date !== dateFilter) {
                    return false;
                }
                
                // Flight filter
                if (flightFilter && item.flightNo !== flightFilter) {
                    return false;
                }
                
                // Name filter (case insensitive)
                if (nameFilter) {
                    const itemName = (item.pName || '').toLowerCase();
                    if (!itemName.includes(nameFilter)) {
                        return false;
                    }
                }
                
                // Seat filter (case insensitive)
                if (seatFilter) {
                    const itemSeat = (item.seatNo || '').toLowerCase();
                    if (!itemSeat.includes(seatFilter)) {
                        return false;
                    }
                }
                
                // FQTV filter (case insensitive)
                if (fqtvFilter) {
                    const itemFQTV = (item.FQTV || '').toLowerCase();
                    if (!itemFQTV.includes(fqtvFilter)) {
                        return false;
                    }
                }
                
                return true;
            });
            
            renderTable();
            updateRecordCount();
        }

        // Reset all filters
        function resetFilters() {
            document.getElementById('filterDate').value = '';
            document.getElementById('filterFlight').value = '';
            document.getElementById('filterName').value = '';
            document.getElementById('filterSeat').value = '';
            document.getElementById('filterFQTV').value = '';
            
            filteredData = [...allData];
            renderTable();
            updateRecordCount();
        }

        // Refresh data from Firebase
        async function refreshData() {
            await loadAllData();
        }

        // Render table with filtered data
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="6">
                            <i class="fas fa-inbox"></i>
                            No records found matching your filters
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            filteredData.forEach(item => {
                // Truncate code for display
                const displayCode = item.code ? 
                    (item.code.length > 40 ? item.code.substring(0, 40) + '...' : item.code) : 
                    '—';
                
                html += `
                    <tr>
                        <td>
                            <span class="badge badge-date">${item.date || '—'}</span>
                        </td>
                        <td>
                            <span class="badge badge-flight">${item.flightNo || '—'}</span>
                        </td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <i class="fas fa-user" style="color: #8b6913; font-size: 11px;"></i>
                                <span style="font-weight: 500;">${item.pName || '—'}</span>
                            </div>
                        </td>
                        <td>
                            ${item.seatNo ? 
                                `<span class="badge" style="background: #e6b80020; color: #8b6913;">${item.seatNo}</span>` : 
                                '—'}
                        </td>
                        <td>
                            ${item.FQTV ? 
                                `<span class="badge" style="background: #4682b420; color: #31698e;">${item.FQTV}</span>` : 
                                '—'}
                        </td>
                        <td>
                            <div class="code-value" title="${item.code || ''}">
                                <span class="badge badge-code">${displayCode}</span>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }

        // Update record count display
        function updateRecordCount() {
            document.getElementById('recordCount').textContent = filteredData.length;
            document.getElementById('totalCount').textContent = allData.length;
        }

        // Show/hide loading indicator
        function showLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'flex' : 'none';
        }

        // Enable/disable controls during loading
        function disableControls(disable) {
            document.getElementById('filterDate').disabled = disable;
            document.getElementById('filterFlight').disabled = disable;
            document.getElementById('filterName').disabled = disable;
            document.getElementById('filterSeat').disabled = disable;
            document.getElementById('filterFQTV').disabled = disable;
            document.getElementById('searchBtn').disabled = disable;
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Update dropdown counts to show error
            document.getElementById('dateCount').textContent = 'Error';
            document.getElementById('flightCount').textContent = 'Error';
        }

        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Debug function to check Firebase connection
        function checkFirebaseConnection() {
            console.log('Checking Firebase connection...');
            console.log('firebase available:', typeof firebase !== 'undefined');
            console.log('cardDb available:', typeof cardDb !== 'undefined');
            console.log('window.cardDb available:', typeof window.cardDb !== 'undefined');
            
            if (typeof cardDb !== 'undefined') {
                console.log('cardDb methods:', Object.keys(cardDb));
            }
        }

        // Run connection check
        setTimeout(checkFirebaseConnection, 1000);

        // Make functions global
        window.filterData = filterData;
        window.resetFilters = resetFilters;
        window.refreshData = refreshData;
        window.checkFirebaseConnection = checkFirebaseConnection;
    </script>
</body>
</html>
