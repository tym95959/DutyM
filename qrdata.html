<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Card Data – Passenger List</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Your config files -->
    <script src="fireshift.js"></script>
    <script src="Co.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f0e1, #fff5e6);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ===== smaller top ribbon ===== */
        .shift-ribbon {
            background: linear-gradient(135deg, #8b6913, #e6b800);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(230, 184, 0, 0.25);
            font-size: 0.9rem;
        }
        
        .shift-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .shift-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .date-value {
            font-weight: 500;
            font-size: 13px;
            opacity: 0.9;
        }
        
        .refresh-shift {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        /* ===== main card – more compact ===== */
        .card {
            background: white;
            border-radius: 20px;
            padding: 18px 22px;
            box-shadow: 0 8px 24px rgba(230, 184, 0, 0.15);
            border: 2px solid #e6b800;
            margin-bottom: 18px;
        }
        
        /* --- REARRANGED: date/flight on left, ops on right --- */
        .selection-flight-row {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        /* left block: date + flight selects */
        .left-selectors {
            display: flex;
            gap: 16px;
            flex: 2;
            min-width: 360px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }
        
        .form-group label {
            color: #8b6913;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .form-control {
            padding: 8px 12px;
            border: 2px solid rgba(230, 184, 0, 0.25);
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        /* right block: minimal quick info (optional) */
        .quick-shift-box {
            background: #fff9e6;
            border-radius: 30px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: #8b6913;
            border: 1px solid #e6b800;
            white-space: nowrap;
        }
        
        /* Database indicator */
        .database-badge {
            background: #4682b4;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        /* flight panel — two columns now: left (details + stats) and right (ops + buttons) */
        .flight-panel-revised {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 8px;
        }
        
        .left-details-block {
            background: #fff9e6;
            border-radius: 14px;
            padding: 14px 16px;
            border-left: 4px solid #e6b800;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px 16px;
            align-items: center;
            font-size: 13px;
        }
        
        .info-label {
            color: #8b6913;
            font-weight: 600;
            font-size: 12px;
        }
        
        .info-value {
            color: #2c3e50;
            font-weight: 500;
            font-size: 13px;
        }
        
        /* stats inside left block */
        .stats-mini {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: white;
            border-radius: 12px;
            padding: 10px 8px;
            border: 1px solid rgba(230,184,0,0.2);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-label {
            color: #8b6913;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .stat-number {
            color: #2c3e50;
            font-size: 18px;
            font-weight: 600;
        }
        
        /* right block: ops + buttons (under last pax) */
        .right-ops-block {
            background: white;
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(230, 184, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .ops-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px 16px;
            align-items: center;
            font-size: 13px;
        }
        
        .ops-label {
            color: #8b6913;
            font-weight: 600;
            font-size: 12px;
        }
        
        .ops-value {
            color: #2c3e50;
            font-weight: 500;
        }
        
        .edit-field {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        .edit-input {
            padding: 4px 8px;
            border: 2px solid rgba(230, 184, 0, 0.3);
            border-radius: 6px;
            font-size: 12px;
            width: 100px;
        }
        
        .edit-btn {
            background: #e6b800;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        
        /* action buttons */
        .action-buttons-vertical {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            border-top: 1px dashed rgba(230,184,0,0.3);
            padding-top: 12px;
        }
        
        .refresh-data-btn, .print-btn {
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            flex: 1 0 auto;
            min-width: 110px;
            white-space: nowrap;
        }
        
        .refresh-data-btn { background: #6b8e23; color: white; }
        .print-btn { background: #4a6fa5; color: white; }
        
        /* passenger table unchanged */
        .table-container {
            background: white;
            border-radius: 16px;
            border: 2px solid #e6b800;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .table-header {
            background: linear-gradient(135deg, #faf3e0, #fff5e6);
            padding: 12px 18px;
            border-bottom: 2px solid #e6b800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .table-header h3 {
            color: #8b6913;
            font-size: 16px;
            font-weight: 600;
        }
        
        .passenger-count {
            background: #6b8e23;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .table-wrapper {
            overflow-x: auto;
            max-height: 480px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }
        
        th {
            background: #e6b800;
            color: white;
            padding: 10px 8px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(230, 184, 0, 0.2);
            color: #2c3e50;
            font-size: 12px;
        }
        
        tr:hover td {
            background: rgba(230, 184, 0, 0.04);
        }
        
        .serial-no {
            font-weight: 600;
            color: #8b6913;
            font-family: monospace;
        }
        
        .code-value {
            font-family: monospace;
            font-size: 11px;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-code {
            background: rgba(230, 184, 0, 0.15);
            color: #8b6913;
            border: 1px solid rgba(230, 184, 0, 0.3);
        }
        
        .badge-flight {
            background: rgba(107, 142, 35, 0.15);
            color: #556b2f;
            border: 1px solid rgba(107, 142, 35, 0.3);
        }
        
        .badge-date {
            background: rgba(198, 139, 94, 0.15);
            color: #c68b5e;
            border: 1px solid rgba(198, 139, 94, 0.3);
        }
        
        .no-data, .loading { text-align: center; padding: 30px; color: #8b6913; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(230,184,0,0.3); border-radius: 50%; border-top-color: #e6b800; animation: spin 1s infinite; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* print-specific styles */
        @media print {
            body { background: white; padding: 0; margin: 0.5in; }
            .shift-ribbon, .card .selection-flight-row, .action-buttons-vertical, .edit-btn, .refresh-shift, .quick-shift-box, .database-badge, .refresh-data-btn { display: none; }
            .card { border: none; box-shadow: none; padding: 0; background: transparent; }
            .flight-panel-revised { display: block; }
            .left-details-block, .right-ops-block { background: transparent; border: none; padding: 0; }
            .stats-mini { border: 1px solid #ccc; }
            .table-container { border: 1px solid #000; margin-top: 20px; }
            th { background: #e6b800 !important; color: black; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            
            /* Header only on first page */
            .report-header-print {
                display: block !important;
            }
            
            tr, td, th {
                page-break-inside: avoid;
            }
            
            thead {
                display: table-header-group;
            }
        }
        
        /* Print header - hidden normally, shown only in print */
        .report-header-print {
            display: none;
        }
        
        @media print {
            .report-header-print {
                display: block;
                margin-bottom: 20px;
            }
        }
        
        .distinct-count {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
        
        .distinct-count span {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- smaller ribbon -->
        <div class="shift-ribbon" id="shiftRibbon">
            <div class="shift-info">
                <span class="shift-badge" id="shiftBadge">LOADING...</span>
                <span class="date-value" id="ribbonDate">--</span>
            </div>
            <button class="refresh-shift" onclick="fetchOpenShift()">↻ REFRESH SHIFT</button>
        </div>

        <!-- main card – compact & rearranged -->
        <div class="card">
            <!-- Row: Date and Flight No on left side, extra right box for visual balance -->
            <div class="selection-flight-row">
                <div class="left-selectors">
                    <div class="form-group">
                        <label>📅 DATE</label>
                        <select id="dateSelect" class="form-control" onclick="loadDates()" onchange="onDateSelected()">
                            <option value="">-- Click to load dates --</option>
                        </select>
                        <div class="distinct-count">
                            <span id="dateCount">0 dates</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>✈ FLIGHT NO</label>
                        <select id="flightSelect" class="form-control" onchange="onFlightSelected()" disabled>
                            <option value="">-- Select date first --</option>
                        </select>
                        <div class="distinct-count">
                            <span id="flightCount">0 flights</span>
                        </div>
                    </div>
                </div>
                <div class="quick-shift-box" id="quickShiftDisplay">
                    <span id="quickShiftText">Select flight</span>
                    <span id="databaseBadge" class="database-badge" style="display: none;"></span>
                </div>
            </div>
            
            <!-- flight panel – two columns: left details+stats, right ops+buttons -->
            <div id="flightPanel" style="display: none;">
                <div class="flight-panel-revised">
                    <!-- LEFT SIDE: flight details + stats -->
                    <div class="left-details-block">
                        <div class="info-grid">
                            <span class="info-label">Airline:</span><span class="info-value" id="airlineDisplay">-</span>
                            <span class="info-label">Flight No:</span><span class="info-value" id="flightNoDisplay">-</span>
                            <span class="info-label">Date:</span><span class="info-value" id="dateDisplay">-</span>
                            <span class="info-label">Database:</span><span class="info-value" id="databaseDisplay">-</span>
                            <span class="info-label">Shift:</span><span class="info-value" id="shiftDisplay">-</span>
                        </div>
                        <!-- stats inside left block -->
                        <div class="stats-mini">
                            <div class="stat-item"><div class="stat-label">Total Pax</div><div class="stat-number" id="totalPaxStat">0</div></div>
                            <div class="stat-item"><div class="stat-label">First Pax</div><div class="stat-number" id="firstPaxStat">--:--</div></div>
                            <div class="stat-item"><div class="stat-label">Last Pax</div><div class="stat-number" id="lastPaxStat">--:--</div></div>
                        </div>
                    </div>

                    <!-- RIGHT SIDE: Quick info + buttons -->
                    <div class="right-ops-block">
                        <div class="ops-grid">
                            <span class="ops-label">First Pax:</span><span class="ops-value first-pax" id="firstPaxDisplay">-</span>
                            <span class="ops-label">Last Pax:</span><span class="ops-value" id="lastPaxDisplay">-</span>
                            <span class="ops-label">Total Pax:</span><span class="ops-value" id="totalPaxDisplay">0</span>
                        </div>
                        
                        <!-- BUTTONS: only REFRESH and PRINT -->
                        <div class="action-buttons-vertical">
                            <button id="refreshDataBtn" class="refresh-data-btn" onclick="refreshCurrentFlight()">🔄 REFRESH DATA</button>
                            <button id="printReportBtn" class="print-btn" onclick="printQRReport()" disabled>🖨️ PRINT</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- passenger table -->
        <div id="tableContainer" class="table-container" style="display: none;">
            <div class="table-header">
                <h3>📋 QR CODE DATA</h3>
                <span class="passenger-count" id="passengerCount">0</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>Name</th>
                            <th>Flight</th>
                            <th>Seat</th>
                            <th>Pax</th>
                            <th>FQTV</th>
                            <th>Serial No</th>
                            <th>Time</th>
                            <th>Remarks</th>
                            <th>Code</th>
                        </tr>
                    </thead>
                    <tbody id="passengerTableBody">
                        <tr><td colspan="10" class="no-data">Select a flight to view QR data</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ========== GLOBAL VARIABLES ==========
        let flightsByDate = {};
        let allDates = [];
        let currentFlightData = null;
        let currentDatabase = null;
        let isLoadingDates = false;
        let databaseStats = {};
        let datesLoaded = false;

        // ========== MULTI-DATABASE HELPER FUNCTIONS ==========
        
        /**
         * Returns the appropriate Firestore database based on flight number
         * @param {string} flightNo - The flight number (e.g., "BA123", "EK456")
         * @returns {Object} - The Firestore database instance
         */
        function getFirestoreForFlight(flightNo) {
            if (!flightNo || typeof flightNo !== 'string') {
                console.log("No valid flight number provided, using default database");
                return window.defaultCardDb || window.db;
            }

            const flightPrefix = flightNo.substring(0, 2).toUpperCase();
            
            switch(flightPrefix) {
                case 'BA':
                    return window.baDb;
                case 'EK':
                    return window.ekDb;
                case 'QR':
                    return window.qrDb;
                case 'SQ':
                    return window.sqDb;
                default:
                    return window.defaultCardDb;
            }
        }

        /**
         * Gets the friendly name of the database for a flight
         * @param {string} flightNo - The flight number
         * @returns {string} - The database name
         */
        function getFirestoreNameForFlight(flightNo) {
            if (!flightNo || typeof flightNo !== 'string') return "Default Database";
            
            const flightPrefix = flightNo.substring(0, 2).toUpperCase();
            
            switch(flightPrefix) {
                case 'BA': return "BA Database";
                case 'EK': return "EK Database";
                case 'QR': return "QR Database";
                case 'SQ': return "SQ Database";
                default: return "Default Database";
            }
        }

        /**
         * Gets the cardentryqr database specifically for QR codes
         * @returns {Object} - The cardentryqr database instance
         */
        function getCardEntryQRDatabase() {
            // First try window.qrDb (which should be cardentryqr)
            if (window.qrDb) {
                console.log("Using qrDb for cardentryqr");
                return window.qrDb;
            }
            
            // Then try window.cardDb if available
            if (window.cardDb) {
                console.log("Using cardDb for cardentryqr");
                return window.cardDb;
            }
            
            // Then try to find by project ID
            const databases = getAllDatabases();
            const qrDb = databases.find(db => 
                db.projectId === 'cardentryqr' || 
                db.name.includes('QR') || 
                db.name.includes('cardentryqr')
            );
            
            if (qrDb) {
                console.log(`Found cardentryqr database: ${qrDb.name}`);
                return qrDb.ref;
            }
            
            console.warn("No cardentryqr database found, using default");
            return window.defaultCardDb || window.db;
        }

        /**
         * Gets all available databases for loading passenger data
         * @returns {Array} - Array of database objects with name and reference
         */
        function getAllDatabases() {
            const databases = [];
            
            if (window.baDb) {
                databases.push({ 
                    name: 'BA Database', 
                    ref: window.baDb, 
                    prefix: 'BA',
                    projectId: 'cardentryba'
                });
            }
            
            if (window.ekDb) {
                databases.push({ 
                    name: 'EK Database', 
                    ref: window.ekDb, 
                    prefix: 'EK',
                    projectId: 'cardentryek'
                });
            }
            
            if (window.qrDb) {
                databases.push({ 
                    name: 'QR Database', 
                    ref: window.qrDb, 
                    prefix: 'QR',
                    projectId: 'cardentryqr'
                });
            }
            
            if (window.sqDb) {
                databases.push({ 
                    name: 'SQ Database', 
                    ref: window.sqDb, 
                    prefix: 'SQ',
                    projectId: 'dcleeli'
                });
            }
            
            if (window.cardDb) {
                databases.push({ 
                    name: 'Card Database', 
                    ref: window.cardDb, 
                    prefix: 'CARD',
                    projectId: 'cardentryqr'
                });
            }
            
            if (window.defaultCardDb) {
                databases.push({ 
                    name: 'Default Database', 
                    ref: window.defaultCardDb, 
                    prefix: 'OTHER',
                    projectId: 'cardentry-7bad1'
                });
            }
            
            return databases;
        }

        // ========== UTILS ==========
        function calculatePaxFromSeat(seatNo) {
            if (!seatNo) return 1;
            const letters = seatNo.toString().match(/[A-Za-z]/g);
            return letters ? letters.length : 1;
        }

        function showNotification(msg, type = 'info') { 
            console.log(msg); 
        }

        // ========== SHIFT ==========
        async function fetchOpenShift() {
            try {
                const shiftBadge = document.getElementById('shiftBadge');
                const ribbonDate = document.getElementById('ribbonDate');
                const ribbon = document.getElementById('shiftRibbon');
                shiftBadge.textContent = 'LOADING...';
                ribbonDate.textContent = '--';
                if (typeof passengerDb === 'undefined') throw new Error('no passengerDb');
                const shiftDoc = await passengerDb.collection('shifts').doc('currentshift').get();
                if (shiftDoc.exists) {
                    const data = shiftDoc.data();
                    const date = data.date || 'No date';
                    const morning = data.morning || 'closed';
                    const evening = data.evening || 'closed';
                    if (morning === 'open') {
                        shiftBadge.textContent = 'MORNING SHIFT';
                        ribbonDate.textContent = date;
                        ribbon.style.background = 'linear-gradient(135deg, #6b8e23, #8b6913)';
                    } else if (evening === 'open') {
                        shiftBadge.textContent = 'EVENING SHIFT';
                        ribbonDate.textContent = date;
                        ribbon.style.background = 'linear-gradient(135deg, #c68b5e, #8b6913)';
                    } else {
                        shiftBadge.textContent = 'NO OPEN SHIFT';
                        ribbonDate.textContent = date;
                        ribbon.style.background = 'linear-gradient(135deg, #7f8c8d, #5e4a1a)';
                    }
                } else throw new Error('shift missing');
            } catch (error) {
                document.getElementById('shiftBadge').textContent = 'ERROR';
                document.getElementById('ribbonDate').textContent = '--';
            }
        }

        // ========== LOAD DATES FROM CARDENTRYQR DATABASE ==========
        async function loadDates(forceReload = false) {
            // If dates are already loaded and not forcing reload, just return
            if (datesLoaded && !forceReload) {
                console.log('Dates already loaded, skipping...');
                return;
            }
            
            if (isLoadingDates) return;
            
            const dateSelect = document.getElementById('dateSelect');
            isLoadingDates = true;
            
            // Show loading message
            dateSelect.innerHTML = '<option value="">🔍 Scanning cardentryqr database...</option>';
            dateSelect.disabled = true;
            
            // Clear previous data only if forcing reload
            if (forceReload) {
                flightsByDate = {};
                databaseStats = {};
                allDates = [];
            }
            
            try {
                // Get the cardentryqr database
                const qrDb = getCardEntryQRDatabase();
                
                if (!qrDb) {
                    throw new Error('cardentryqr database not found');
                }
                
                console.log(`🔍 Loading data from cardentryqr...`);
                
                // Query the QrCards collection
                const snapshot = await qrDb.collection('QrCards').get();
                
                databaseStats['cardentryqr'] = {
                    records: snapshot.size,
                    flights: new Set(),
                    dates: new Set()
                };
                
                if (snapshot.size > 0) {
                    console.log(`✅ Found ${snapshot.size} records in cardentryqr`);
                    
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        
                        // Extract date from various possible fields
                        let date = data.date || '';
                        let flightNo = data.flightNo || '';
                        let pName = data.pName || data.name || '';
                        let seatNo = data.seatNo || data.seat || '';
                        let FQTV = data.FQTV || data.fqtv || data.frequentFlyer || '';
                        let code = data.code || '';
                        let entryTime = data.entryTime || data.timestamp || '';
                        
                        // Try to parse date from doc.id if format is DATE_FLIGHT
                        if (!date && doc.id && doc.id.includes('_')) {
                            const parts = doc.id.split('_');
                            date = parts[0] || '';
                            if (!flightNo && parts[1]) flightNo = parts[1];
                        }
                        
                        // Format date for display (YYYY-MM-DD)
                        let displayDate = date;
                        if (date && date.length === 8 && !date.includes('-') && !date.includes('/')) {
                            // Format YYYYMMDD to YYYY-MM-DD
                            displayDate = `${date.substring(0,4)}-${date.substring(4,6)}-${date.substring(6,8)}`;
                        } else if (date && date.includes('/')) {
                            // Convert DD/MM/YYYY to YYYY-MM-DD
                            const parts = date.split('/');
                            if (parts.length === 3) {
                                if (parts[2].length === 4) {
                                    displayDate = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                                }
                            }
                        }
                        
                        if (displayDate) {
                            databaseStats['cardentryqr'].dates.add(displayDate);
                            
                            if (!flightsByDate[displayDate]) flightsByDate[displayDate] = new Map();
                            
                            // Create a unique key for each flight
                            const flightKey = flightNo || 'UNKNOWN_FLIGHT';
                            databaseStats['cardentryqr'].flights.add(flightNo);
                            
                            if (!flightsByDate[displayDate].has(flightKey)) {
                                flightsByDate[displayDate].set(flightKey, {
                                    flightNo: flightNo,
                                    shift: data.shift || 'N/A',
                                    airline: data.airline || '',
                                    passengers: [],
                                    firstPax: null,
                                    lastPax: null,
                                    database: 'cardentryqr',
                                    dbRef: qrDb,
                                    databaseProject: 'cardentryqr'
                                });
                            }
                            
                            const flightData = flightsByDate[displayDate].get(flightKey);
                            
                            // Format time
                            let timeValue = entryTime;
                            if (data.timestamp && data.timestamp.toDate) {
                                const d = data.timestamp.toDate();
                                timeValue = d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                            } else if (data.timestamp && data.timestamp.seconds) {
                                const d = new Date(data.timestamp.seconds * 1000);
                                timeValue = d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                            }
                            
                            flightData.passengers.push({
                                docId: doc.id,
                                pName: pName || '',
                                flightNo: flightNo || '',
                                seatNo: seatNo || '',
                                pax: data.pax || '1',
                                FQTV: FQTV || '',
                                entryTime: timeValue,
                                remarks: data.remarks || '',
                                serialNo: data.serialNo || '',
                                code: code || ''
                            });
                            
                            if (timeValue) {
                                if (!flightData.firstPax || timeValue < flightData.firstPax) {
                                    flightData.firstPax = timeValue;
                                }
                                if (!flightData.lastPax || timeValue > flightData.lastPax) {
                                    flightData.lastPax = timeValue;
                                }
                            }
                        }
                    });
                    
                    console.log(`📊 Found ${databaseStats['cardentryqr'].dates.size} unique dates`);
                    console.log(`📊 Found ${databaseStats['cardentryqr'].flights.size} unique flights`);
                    
                } else {
                    console.log(`ℹ️ No records found in cardentryqr`);
                }
                
                // Get all unique dates and sort them (newest first)
                allDates = Object.keys(flightsByDate).sort().reverse();
                datesLoaded = true;
                
                // Update the date select dropdown
                if (allDates.length === 0) {
                    dateSelect.innerHTML = '<option value="">❌ No dates found in cardentryqr</option>';
                } else {
                    let options = '<option value="">📅 Select a date</option>';
                    allDates.forEach(d => { 
                        const flightCount = flightsByDate[d]?.size || 0;
                        options += `<option value="${d}">${d} (${flightCount} flight${flightCount !== 1 ? 's' : ''})</option>`; 
                    });
                    dateSelect.innerHTML = options;
                }
                
                // Update date count
                document.getElementById('dateCount').textContent = `${allDates.length} date${allDates.length !== 1 ? 's' : ''}`;
                dateSelect.disabled = false;
                
            } catch (error) {
                console.error('Error loading dates:', error);
                dateSelect.innerHTML = '<option value="">❌ Error loading dates</option>';
                dateSelect.disabled = false;
                document.getElementById('dateCount').textContent = 'Error';
            } finally { 
                isLoadingDates = false; 
            }
        }

        function onDateSelected() {
            const dateSelect = document.getElementById('dateSelect');
            const flightSelect = document.getElementById('flightSelect');
            const selectedDate = dateSelect.value;
            
            // Reset flight select
            flightSelect.innerHTML = '<option value="">⏳ Loading flights...</option>';
            flightSelect.disabled = true;
            
            // Hide panels
            document.getElementById('flightPanel').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('quickShiftText').innerText = 'Select flight';
            document.getElementById('databaseBadge').style.display = 'none';
            document.getElementById('printReportBtn').disabled = true;
            
            // Reset current data
            currentDatabase = null;
            currentFlightData = null;
            
            if (!selectedDate) {
                flightSelect.innerHTML = '<option value="">-- Select date first --</option>';
                document.getElementById('flightCount').textContent = '0 flights';
                return;
            }
            
            // Get flights for selected date
            const flights = flightsByDate[selectedDate];
            if (!flights || flights.size === 0) {
                flightSelect.innerHTML = '<option value="">❌ No flights for this date</option>';
                document.getElementById('flightCount').textContent = '0 flights';
                return;
            }
            
            // Convert Map to array and sort
            const flightsArray = Array.from(flights.values()).sort((a,b) => (a.flightNo || '').localeCompare(b.flightNo || ''));
            
            // Build options
            let options = '<option value="">✈️ Select a flight</option>';
            flightsArray.forEach(f => { 
                const passengerCount = f.passengers.length;
                const flightDisplay = f.flightNo || 'UNKNOWN';
                options += `<option value="${flightDisplay}">${flightDisplay} - ${passengerCount} records</option>`; 
            });
            
            flightSelect.innerHTML = options;
            flightSelect.disabled = false;
            document.getElementById('flightCount').textContent = `${flightsArray.length} flight${flightsArray.length !== 1 ? 's' : ''}`;
        }

        async function onFlightSelected() {
            const dateSelect = document.getElementById('dateSelect');
            const flightSelect = document.getElementById('flightSelect');
            const selectedDate = dateSelect.value;
            const selectedFlight = flightSelect.value;
            
            if (!selectedDate || !selectedFlight) {
                document.getElementById('flightPanel').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'none';
                return;
            }
            
            // Show loading state
            document.getElementById('flightPanel').style.display = 'block';
            document.getElementById('airlineDisplay').textContent = 'Loading...';
            document.getElementById('passengerTableBody').innerHTML = '<tr><td colspan="10" class="loading"><span class="spinner"></span> Loading QR data...</td></tr>';
            
            const flights = flightsByDate[selectedDate];
            const flightData = Array.from(flights.values()).find(f => f.flightNo === selectedFlight);
            
            if (!flightData) {
                alert('Flight data not found');
                return;
            }
            
            currentFlightData = flightData;
            currentDatabase = flightData.dbRef;
            
            console.log('Flight Data:', {
                flightNo: flightData.flightNo,
                passengers: flightData.passengers.length,
                firstPax: flightData.firstPax,
                lastPax: flightData.lastPax,
                database: flightData.database
            });
            
            // Update database display
            document.getElementById('databaseDisplay').textContent = `cardentryqr`;
            document.getElementById('databaseBadge').textContent = 'QR Database';
            document.getElementById('databaseBadge').style.display = 'inline-block';
            
            // Update UI with loaded data
            document.getElementById('airlineDisplay').textContent = flightData.airline || '-';
            document.getElementById('flightNoDisplay').textContent = flightData.flightNo || '-';
            document.getElementById('dateDisplay').textContent = selectedDate;
            document.getElementById('shiftDisplay').textContent = flightData.shift || 'N/A';
            document.getElementById('firstPaxDisplay').textContent = flightData.firstPax || '-';
            document.getElementById('lastPaxDisplay').textContent = flightData.lastPax || '-';
            document.getElementById('totalPaxDisplay').textContent = flightData.passengers.length;
            document.getElementById('totalPaxStat').textContent = flightData.passengers.length;
            document.getElementById('firstPaxStat').textContent = flightData.firstPax || '--:--';
            document.getElementById('lastPaxStat').textContent = flightData.lastPax || '--:--';
            document.getElementById('passengerCount').textContent = flightData.passengers.length + ' RECORDS';
            document.getElementById('quickShiftText').innerHTML = `${flightData.flightNo || 'Unknown'} <span style="font-size:10px; opacity:0.8;">(QR Database)</span>`;
            
            // Enable print button if there are passengers
            document.getElementById('printReportBtn').disabled = flightData.passengers.length === 0;
            
            // Display passenger table
            displayPassengerTable(flightData.passengers);
        }

        function displayPassengerTable(passengers) {
            const tbody = document.getElementById('passengerTableBody');
            
            if (!passengers || passengers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="no-data">No QR data found for this flight</td></tr>';
                document.getElementById('tableContainer').style.display = 'block';
                return;
            }
            
            // Sort passengers by entry time
            const sorted = [...passengers].sort((a,b) => (a.entryTime||'').localeCompare(b.entryTime||''));
            let html = '';
            
            sorted.forEach((p, idx) => {
                const serial = String(idx+1).padStart(3,'0');
                
                html += `<tr>
                    <td class="serial-no">${serial}</td>
                    <td>${p.pName || '-'}</td>
                    <td><span class="badge badge-flight">${p.flightNo || '-'}</span></td>
                    <td>${p.seatNo || '-'}</td>
                    <td style="text-align:center;">${p.pax || '1'}</td>
                    <td>${p.FQTV || '-'}</td>
                    <td class="${p.serialNo ? 'serial-no' : ''}">${p.serialNo || '—'}</td>
                    <td>${p.entryTime || '-'}</td>
                    <td>${p.remarks || '-'}</td>
                    <td><div class="code-value" title="${p.code || ''}"><span class="badge badge-code">${p.code ? (p.code.length > 30 ? p.code.substring(0,30)+'...' : p.code) : '—'}</span></div></td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
            document.getElementById('tableContainer').style.display = 'block';
        }

        async function refreshCurrentFlight() {
            if (!currentFlightData) return;
            
            // Reload all data and reselect current flight
            await loadDates(true);
            
            const dateSelect = document.getElementById('dateSelect');
            const flightSelect = document.getElementById('flightSelect');
            
            // Try to reselect the same date and flight
            if (currentFlightData.flightNo) {
                dateSelect.value = document.getElementById('dateDisplay').textContent;
                onDateSelected();
                
                setTimeout(() => {
                    const options = Array.from(flightSelect.options);
                    const option = options.find(opt => opt.value === currentFlightData.flightNo);
                    if (option) {
                        flightSelect.value = currentFlightData.flightNo;
                        onFlightSelected();
                    }
                }, 500);
            }
        }
