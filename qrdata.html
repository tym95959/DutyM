<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Data – cardentryqr</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Your config files -->
    <script src="fireshift.js"></script>
    <script src="Co.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f0e1, #fff5e6);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ===== smaller top ribbon ===== */
        .shift-ribbon {
            background: linear-gradient(135deg, #8b6913, #e6b800);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(230, 184, 0, 0.25);
            font-size: 0.9rem;
        }
        
        .shift-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .shift-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .date-value {
            font-weight: 500;
            font-size: 13px;
            opacity: 0.9;
        }
        
        .refresh-shift {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        /* ===== main card – more compact ===== */
        .card {
            background: white;
            border-radius: 20px;
            padding: 18px 22px;
            box-shadow: 0 8px 24px rgba(230, 184, 0, 0.15);
            border: 2px solid #e6b800;
            margin-bottom: 18px;
        }
        
        /* --- REARRANGED: date/flight on left, ops on right --- */
        .selection-flight-row {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        /* left block: date + flight selects */
        .left-selectors {
            display: flex;
            gap: 16px;
            flex: 2;
            min-width: 360px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }
        
        .form-group label {
            color: #8b6913;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .form-control {
            padding: 8px 12px;
            border: 2px solid rgba(230, 184, 0, 0.25);
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        /* right block: minimal quick info */
        .quick-shift-box {
            background: #fff9e6;
            border-radius: 30px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: #8b6913;
            border: 1px solid #e6b800;
            white-space: nowrap;
        }
        
        /* Database indicator */
        .database-badge {
            background: #4682b4;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        /* flight panel — two columns now: left (details + stats) and right (ops + buttons) */
        .flight-panel-revised {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 8px;
        }
        
        .left-details-block {
            background: #fff9e6;
            border-radius: 14px;
            padding: 14px 16px;
            border-left: 4px solid #e6b800;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px 16px;
            align-items: center;
            font-size: 13px;
        }
        
        .info-label {
            color: #8b6913;
            font-weight: 600;
            font-size: 12px;
        }
        
        .info-value {
            color: #2c3e50;
            font-weight: 500;
            font-size: 13px;
        }
        
        /* stats inside left block */
        .stats-mini {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: white;
            border-radius: 12px;
            padding: 10px 8px;
            border: 1px solid rgba(230,184,0,0.2);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-label {
            color: #8b6913;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .stat-number {
            color: #2c3e50;
            font-size: 18px;
            font-weight: 600;
        }
        
        /* right block: ops + buttons */
        .right-ops-block {
            background: white;
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(230, 184, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .ops-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px 16px;
            align-items: center;
            font-size: 13px;
        }
        
        .ops-label {
            color: #8b6913;
            font-weight: 600;
            font-size: 12px;
        }
        
        .ops-value {
            color: #2c3e50;
            font-weight: 500;
        }
        
        /* action buttons */
        .action-buttons-vertical {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            border-top: 1px dashed rgba(230,184,0,0.3);
            padding-top: 12px;
        }
        
        .refresh-data-btn, .print-btn {
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            flex: 1 0 auto;
            min-width: 110px;
            white-space: nowrap;
        }
        
        .refresh-data-btn { background: #6b8e23; color: white; }
        .print-btn { background: #4a6fa5; color: white; }
        
        /* passenger table */
        .table-container {
            background: white;
            border-radius: 16px;
            border: 2px solid #e6b800;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .table-header {
            background: linear-gradient(135deg, #faf3e0, #fff5e6);
            padding: 12px 18px;
            border-bottom: 2px solid #e6b800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .table-header h3 {
            color: #8b6913;
            font-size: 16px;
            font-weight: 600;
        }
        
        .passenger-count {
            background: #6b8e23;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .table-wrapper {
            overflow-x: auto;
            max-height: 480px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }
        
        th {
            background: #e6b800;
            color: white;
            padding: 10px 8px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(230, 184, 0, 0.2);
            color: #2c3e50;
            font-size: 12px;
        }
        
        tr:hover td {
            background: rgba(230, 184, 0, 0.04);
        }
        
        .serial-no {
            font-weight: 600;
            color: #8b6913;
            font-family: monospace;
        }
        
        .code-value {
            font-family: monospace;
            font-size: 11px;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-code {
            background: rgba(230, 184, 0, 0.15);
            color: #8b6913;
            border: 1px solid rgba(230, 184, 0, 0.3);
        }
        
        .badge-flight {
            background: rgba(107, 142, 35, 0.15);
            color: #556b2f;
            border: 1px solid rgba(107, 142, 35, 0.3);
        }
        
        .badge-date {
            background: rgba(198, 139, 94, 0.15);
            color: #c68b5e;
            border: 1px solid rgba(198, 139, 94, 0.3);
        }
        
        .no-data, .loading { text-align: center; padding: 30px; color: #8b6913; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(230,184,0,0.3); border-radius: 50%; border-top-color: #e6b800; animation: spin 1s infinite; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* print-specific styles */
        @media print {
            body { background: white; padding: 0; margin: 0.5in; }
            .shift-ribbon, .card .selection-flight-row, .action-buttons-vertical, .refresh-shift, .quick-shift-box, .database-badge, .refresh-data-btn { display: none; }
            .card { border: none; box-shadow: none; padding: 0; background: transparent; }
            .flight-panel-revised { display: block; }
            .left-details-block, .right-ops-block { background: transparent; border: none; padding: 0; }
            .stats-mini { border: 1px solid #ccc; }
            .table-container { border: 1px solid #000; margin-top: 20px; }
            th { background: #e6b800 !important; color: black; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            
            tr, td, th {
                page-break-inside: avoid;
            }
            
            thead {
                display: table-header-group;
            }
        }
        
        .distinct-count {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
        
        .distinct-count span {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 12px;
        }
        
        .qr-icon {
            color: #8b6913;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- smaller ribbon -->
        <div class="shift-ribbon" id="shiftRibbon">
            <div class="shift-info">
                <span class="shift-badge" id="shiftBadge">LOADING...</span>
                <span class="date-value" id="ribbonDate">--</span>
            </div>
            <button class="refresh-shift" onclick="fetchOpenShift()">↻ REFRESH SHIFT</button>
        </div>

        <!-- main card -->
        <div class="card">
            <!-- Row: Date and Flight No on left side -->
            <div class="selection-flight-row">
                <div class="left-selectors">
                    <div class="form-group">
                        <label><i class="qr-icon">📅</i> DATE</label>
                        <select id="dateSelect" class="form-control" onclick="loadQRData()" onchange="onDateSelected()">
                            <option value="">-- Click to load dates --</option>
                        </select>
                        <div class="distinct-count">
                            <span id="dateCount">0 dates</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="qr-icon">✈</i> FLIGHT NO</label>
                        <select id="flightSelect" class="form-control" onchange="onFlightSelected()" disabled>
                            <option value="">-- Select date first --</option>
                        </select>
                        <div class="distinct-count">
                            <span id="flightCount">0 flights</span>
                        </div>
                    </div>
                </div>
                <div class="quick-shift-box" id="quickShiftDisplay">
                    <span id="quickShiftText"><i class="qr-icon">📱</i> QR Data</span>
                    <span id="databaseBadge" class="database-badge" style="display: none;">cardentryqr</span>
                </div>
            </div>
            
            <!-- flight panel -->
            <div id="flightPanel" style="display: none;">
                <div class="flight-panel-revised">
                    <!-- LEFT SIDE: flight details + stats -->
                    <div class="left-details-block">
                        <div class="info-grid">
                            <span class="info-label"><i class="qr-icon">🛫</i> Flight:</span><span class="info-value" id="flightNoDisplay">-</span>
                            <span class="info-label"><i class="qr-icon">📅</i> Date:</span><span class="info-value" id="dateDisplay">-</span>
                            <span class="info-label"><i class="qr-icon">💾</i> Database:</span><span class="info-value" id="databaseDisplay">cardentryqr</span>
                            <span class="info-label"><i class="qr-icon">📊</i> Shift:</span><span class="info-value" id="shiftDisplay">-</span>
                        </div>
                        <!-- stats inside left block -->
                        <div class="stats-mini">
                            <div class="stat-item"><div class="stat-label">Total QR</div><div class="stat-number" id="totalPaxStat">0</div></div>
                            <div class="stat-item"><div class="stat-label">First</div><div class="stat-number" id="firstPaxStat">--:--</div></div>
                            <div class="stat-item"><div class="stat-label">Last</div><div class="stat-number" id="lastPaxStat">--:--</div></div>
                        </div>
                    </div>

                    <!-- RIGHT SIDE: Quick info + buttons -->
                    <div class="right-ops-block">
                        <div class="ops-grid">
                            <span class="ops-label"><i class="qr-icon">⏱️</i> First:</span><span class="ops-value first-pax" id="firstPaxDisplay">-</span>
                            <span class="ops-label"><i class="qr-icon">⏱️</i> Last:</span><span class="ops-value" id="lastPaxDisplay">-</span>
                            <span class="ops-label"><i class="qr-icon">📊</i> Total:</span><span class="ops-value" id="totalPaxDisplay">0</span>
                        </div>
                        
                        <!-- BUTTONS: REFRESH and PRINT -->
                        <div class="action-buttons-vertical">
                            <button id="refreshDataBtn" class="refresh-data-btn" onclick="refreshCurrentFlight()">🔄 REFRESH QR</button>
                            <button id="printReportBtn" class="print-btn" onclick="printQRReport()" disabled>🖨️ PRINT QR</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- QR data table -->
        <div id="tableContainer" class="table-container" style="display: none;">
            <div class="table-header">
                <h3><i class="qr-icon">📱</i> QR CODE DATA - cardentryqr</h3>
                <span class="passenger-count" id="passengerCount">0</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>Date</th>
                            <th>Flight</th>
                            <th>Code</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="qrTableBody">
                        <tr><td colspan="5" class="no-data">Select a flight to view QR data</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ========== GLOBAL VARIABLES ==========
        let qrDataByDate = {};
        let allDates = [];
        let currentFlightData = null;
        let isLoadingData = false;
        let datesLoaded = false;

        // ========== DATABASE ACCESS ==========
        
        /**
         * Gets the cardentryqr database specifically for QR codes
         * @returns {Object} - The cardentryqr database instance
         */
        function getCardEntryQRDatabase() {
            // Try window.qrDb first (should be cardentryqr)
            if (window.qrDb) {
                console.log("✅ Using qrDb for cardentryqr");
                return window.qrDb;
            }
            
            // Try window.cardDb
            if (window.cardDb) {
                console.log("✅ Using cardDb for cardentryqr");
                return window.cardDb;
            }
            
            // Try to find by checking all databases
            const databases = [
                { name: 'baDb', ref: window.baDb, project: 'cardentryba' },
                { name: 'ekDb', ref: window.ekDb, project: 'cardentryek' },
                { name: 'qrDb', ref: window.qrDb, project: 'cardentryqr' },
                { name: 'sqDb', ref: window.sqDb, project: 'dcleeli' },
                { name: 'defaultCardDb', ref: window.defaultCardDb, project: 'cardentry-7bad1' }
            ];
            
            const qrDb = databases.find(db => 
                db.project === 'cardentryqr' || 
                (db.ref && db.name === 'qrDb')
            );
            
            if (qrDb && qrDb.ref) {
                console.log(`✅ Found cardentryqr database via ${qrDb.name}`);
                return qrDb.ref;
            }
            
            console.error("❌ cardentryqr database not found");
            return null;
        }

        // ========== SHIFT ==========
        async function fetchOpenShift() {
            try {
                const shiftBadge = document.getElementById('shiftBadge');
                const ribbonDate = document.getElementById('ribbonDate');
                const ribbon = document.getElementById('shiftRibbon');
                shiftBadge.textContent = 'LOADING...';
                ribbonDate.textContent = '--';
                
                if (typeof passengerDb === 'undefined') {
                    throw new Error('passengerDb not available');
                }
                
                const shiftDoc = await passengerDb.collection('shifts').doc('currentshift').get();
                
                if (shiftDoc.exists) {
                    const data = shiftDoc.data();
                    const date = data.date || 'No date';
                    const morning = data.morning || 'closed';
                    const evening = data.evening || 'closed';
                    
                    if (morning === 'open') {
                        shiftBadge.textContent = 'MORNING SHIFT';
                        ribbonDate.textContent = date;
                        ribbon.style.background = 'linear-gradient(135deg, #6b8e23, #8b6913)';
                    } else if (evening === 'open') {
                        shiftBadge.textContent = 'EVENING SHIFT';
                        ribbonDate.textContent = date;
                        ribbon.style.background = 'linear-gradient(135deg, #c68b5e, #8b6913)';
                    } else {
                        shiftBadge.textContent = 'NO OPEN SHIFT';
                        ribbonDate.textContent = date;
                        ribbon.style.background = 'linear-gradient(135deg, #7f8c8d, #5e4a1a)';
                    }
                } else {
                    throw new Error('shift document not found');
                }
            } catch (error) {
                document.getElementById('shiftBadge').textContent = 'ERROR';
                document.getElementById('ribbonDate').textContent = '--';
                console.error('Shift error:', error);
            }
        }

        // ========== LOAD QR DATA FROM CARDENTRYQR ==========
        async function loadQRData(forceReload = false) {
            // If already loaded and not forcing reload, just return
            if (datesLoaded && !forceReload) {
                console.log('QR data already loaded, skipping...');
                return;
            }
            
            if (isLoadingData) return;
            
            const dateSelect = document.getElementById('dateSelect');
            isLoadingData = true;
            
            // Show loading message
            dateSelect.innerHTML = '<option value="">🔍 Loading QR data from cardentryqr...</option>';
            dateSelect.disabled = true;
            
            // Clear previous data
            qrDataByDate = {};
            allDates = [];
            
            try {
                // Get the cardentryqr database
                const qrDb = getCardEntryQRDatabase();
                
                if (!qrDb) {
                    throw new Error('cardentryqr database not found - check fireshift.js configuration');
                }
                
                console.log(`🔍 Loading QR data from cardentryqr...`);
                
                // Query the QrCards collection
                const snapshot = await qrDb.collection('QrCards').get();
                
                if (snapshot.empty) {
                    console.log(`ℹ️ No QR records found in cardentryqr`);
                } else {
                    console.log(`✅ Found ${snapshot.size} QR records`);
                    
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        
                        // Extract date from various possible fields
                        let date = data.date || '';
                        let flightNo = data.flightNo || '';
                        let code = data.code || '';
                        let timestamp = '';
                        
                        // Parse timestamp
                        if (data.timestamp) {
                            if (data.timestamp.toDate) {
                                const d = data.timestamp.toDate();
                                timestamp = d.toLocaleString();
                            } else if (data.timestamp.seconds) {
                                const d = new Date(data.timestamp.seconds * 1000);
                                timestamp = d.toLocaleString();
                            } else if (typeof data.timestamp === 'string') {
                                timestamp = data.timestamp;
                            }
                        }
                        
                        // Try to parse date from doc.id if format is DATE_FLIGHT
                        if (!date && doc.id && doc.id.includes('_')) {
                            const parts = doc.id.split('_');
                            date = parts[0] || '';
                            if (!flightNo && parts[1]) flightNo = parts[1];
                        }
                        
                        // Format date for display (YYYY-MM-DD)
                        let displayDate = date;
                        if (date && date.length === 8 && !date.includes('-') && !date.includes('/')) {
                            // Format YYYYMMDD to YYYY-MM-DD
                            displayDate = `${date.substring(0,4)}-${date.substring(4,6)}-${date.substring(6,8)}`;
                        } else if (date && date.includes('/')) {
                            // Convert DD/MM/YYYY to YYYY-MM-DD
                            const parts = date.split('/');
                            if (parts.length === 3) {
                                if (parts[2].length === 4) {
                                    displayDate = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                                }
                            }
                        }
                        
                        if (displayDate) {
                            if (!qrDataByDate[displayDate]) {
                                qrDataByDate[displayDate] = new Map();
                            }
                            
                            // Use flight number as key (or 'UNKNOWN' if missing)
                            const flightKey = flightNo || 'UNKNOWN';
                            
                            if (!qrDataByDate[displayDate].has(flightKey)) {
                                qrDataByDate[displayDate].set(flightKey, {
                                    flightNo: flightNo,
                                    records: [],
                                    firstTimestamp: null,
                                    lastTimestamp: null
                                });
                            }
                            
                            const flightData = qrDataByDate[displayDate].get(flightKey);
                            
                            flightData.records.push({
                                docId: doc.id,
                                date: displayDate,
                                flightNo: flightNo,
                                code: code,
                                timestamp: timestamp,
                                rawTimestamp: data.timestamp
                            });
                            
                            // Update first/last timestamps
                            if (timestamp) {
                                if (!flightData.firstTimestamp || timestamp < flightData.firstTimestamp) {
                                    flightData.firstTimestamp = timestamp;
                                }
                                if (!flightData.lastTimestamp || timestamp > flightData.lastTimestamp) {
                                    flightData.lastTimestamp = timestamp;
                                }
                            }
                        }
                    });
                }
                
                // Get all unique dates and sort them (newest first)
                allDates = Object.keys(qrDataByDate).sort().reverse();
                datesLoaded = true;
                
                // Update the date select dropdown
                if (allDates.length === 0) {
                    dateSelect.innerHTML = '<option value="">❌ No QR data found in cardentryqr</option>';
                } else {
                    let options = '<option value="">📅 Select a date</option>';
                    allDates.forEach(d => { 
                        const flightCount = qrDataByDate[d]?.size || 0;
                        options += `<option value="${d}">${d} (${flightCount} flight${flightCount !== 1 ? 's' : ''})</option>`; 
                    });
                    dateSelect.innerHTML = options;
                }
                
                // Update date count
                document.getElementById('dateCount').textContent = `${allDates.length} date${allDates.length !== 1 ? 's' : ''}`;
                dateSelect.disabled = false;
                
            } catch (error) {
                console.error('Error loading QR data:', error);
                dateSelect.innerHTML = '<option value="">❌ Error loading QR data</option>';
                dateSelect.disabled = false;
                document.getElementById('dateCount').textContent = 'Error';
                alert('Error loading QR data: ' + error.message);
            } finally { 
                isLoadingData = false; 
            }
        }

        function onDateSelected() {
            const dateSelect = document.getElementById('dateSelect');
            const flightSelect = document.getElementById('flightSelect');
            const selectedDate = dateSelect.value;
            
            // Reset flight select
            flightSelect.innerHTML = '<option value="">⏳ Loading flights...</option>';
            flightSelect.disabled = true;
            
            // Hide panels
            document.getElementById('flightPanel').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('quickShiftText').innerHTML = '<i class="qr-icon">📱</i> QR Data';
            document.getElementById('databaseBadge').style.display = 'none';
            document.getElementById('printReportBtn').disabled = true;
            
            // Reset current data
            currentFlightData = null;
            
            if (!selectedDate) {
                flightSelect.innerHTML = '<option value="">-- Select date first --</option>';
                document.getElementById('flightCount').textContent = '0 flights';
                return;
            }
            
            // Get flights for selected date
            const flights = qrDataByDate[selectedDate];
            if (!flights || flights.size === 0) {
                flightSelect.innerHTML = '<option value="">❌ No flights for this date</option>';
                document.getElementById('flightCount').textContent = '0 flights';
                return;
            }
            
            // Convert Map to array and sort
            const flightsArray = Array.from(flights.values()).sort((a,b) => (a.flightNo || '').localeCompare(b.flightNo || ''));
            
            // Build options
            let options = '<option value="">✈️ Select a flight</option>';
            flightsArray.forEach(f => { 
                const recordCount = f.records.length;
                const flightDisplay = f.flightNo || 'UNKNOWN';
                options += `<option value="${flightDisplay}">${flightDisplay} - ${recordCount} QR code${recordCount !== 1 ? 's' : ''}</option>`; 
            });
            
            flightSelect.innerHTML = options;
            flightSelect.disabled = false;
            document.getElementById('flightCount').textContent = `${flightsArray.length} flight${flightsArray.length !== 1 ? 's' : ''}`;
        }

        async function onFlightSelected() {
            const dateSelect = document.getElementById('dateSelect');
            const flightSelect = document.getElementById('flightSelect');
            const selectedDate = dateSelect.value;
            const selectedFlight = flightSelect.value;
            
            if (!selectedDate || !selectedFlight) {
                document.getElementById('flightPanel').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'none';
                return;
            }
            
            // Show loading state
            document.getElementById('flightPanel').style.display = 'block';
            document.getElementById('qrTableBody').innerHTML = '<tr><td colspan="5" class="loading"><span class="spinner"></span> Loading QR data...</td></tr>';
            
            const flights = qrDataByDate[selectedDate];
            const flightData = Array.from(flights.values()).find(f => f.flightNo === selectedFlight);
            
            if (!flightData) {
                alert('Flight data not found');
                return;
            }
            
            currentFlightData = flightData;
            
            console.log('QR Data:', {
                flightNo: flightData.flightNo,
                records: flightData.records.length,
                first: flightData.firstTimestamp,
                last: flightData.lastTimestamp
            });
            
            // Update UI
            document.getElementById('databaseDisplay').textContent = 'cardentryqr';
            document.getElementById('databaseBadge').style.display = 'inline-block';
            document.getElementById('flightNoDisplay').textContent = flightData.flightNo || '-';
            document.getElementById('dateDisplay').textContent = selectedDate;
            document.getElementById('shiftDisplay').textContent = 'N/A';
            document.getElementById('firstPaxDisplay').textContent = flightData.firstTimestamp || '-';
            document.getElementById('lastPaxDisplay').textContent = flightData.lastTimestamp || '-';
            document.getElementById('totalPaxDisplay').textContent = flightData.records.length;
            document.getElementById('totalPaxStat').textContent = flightData.records.length;
            document.getElementById('firstPaxStat').textContent = flightData.firstTimestamp ? 'QR' : '--:--';
            document.getElementById('lastPaxStat').textContent = flightData.lastTimestamp ? 'QR' : '--:--';
            document.getElementById('passengerCount').textContent = flightData.records.length + ' QR';
            document.getElementById('quickShiftText').innerHTML = `${flightData.flightNo || 'Unknown'} <span style="font-size:10px; opacity:0.8;">(QR Database)</span>`;
            
            // Enable print button if there are records
            document.getElementById('printReportBtn').disabled = flightData.records.length === 0;
            
            // Display QR table
            displayQRTable(flightData.records);
        }

        function displayQRTable(records) {
            const tbody = document.getElementById('qrTableBody');
            
            if (!records || records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-data">No QR data found for this flight</td></tr>';
                document.getElementById('tableContainer').style.display = 'block';
                return;
            }
            
            // Sort records by timestamp
            const sorted = [...records].sort((a,b) => (a.timestamp||'').localeCompare(b.timestamp||''));
            let html = '';
            
            sorted.forEach((record, idx) => {
                const serial = String(idx+1).padStart(3,'0');
                
                html += `<tr>
                    <td class="serial-no">${serial}</td>
                    <td><span class="badge badge-date">${record.date || '-'}</span></td>
                    <td><span class="badge badge-flight">${record.flightNo || '-'}</span></td>
                    <td><div class="code-value" title="${record.code || ''}"><span class="badge badge-code">${record.code ? (record.code.length > 40 ? record.code.substring(0,40)+'...' : record.code) : '—'}</span></div></td>
                    <td>${record.timestamp || '-'}</td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
            document.getElementById('tableContainer').style.display = 'block';
        }

        async function refreshCurrentFlight() {
            if (!currentFlightData) return;
            
            // Reload all data
            await loadQRData(true);
            
            const dateSelect = document.getElementById('dateSelect');
            const flightSelect = document.getElementById('flightSelect');
            const currentFlight = currentFlightData.flightNo;
            const currentDate = document.getElementById('dateDisplay').textContent;
            
            // Try to reselect the same date and flight
            if (currentDate && currentFlight) {
                dateSelect.value = currentDate;
                onDateSelected();
                
                setTimeout(() => {
                    const options = Array.from(flightSelect.options);
                    const option = options.find(opt => opt.value === currentFlight);
                    if (option) {
                        flightSelect.value = currentFlight;
                        onFlightSelected();
                    }
                }, 500);
            }
        }

                </head>
                <body>
                    <div class="header">

                            <div class="logo-section">
                                <div class="logo">

                                </div>
                                <div class="company-address">
                                    <strong>${company.name}</strong><br>

                            <div class="flight-details">

            // Add record rows

            printWindow.document.write(`

        // initialization
        document.addEventListener('DOMContentLoaded', function() {
            fetchOpenShift();
            setInterval(fetchOpenShift, 30000);
            
            // Load QR data when page loads
            setTimeout(() => {
                loadQRData();
            }, 1000);
        });

        // global functions
        window.loadQRData = loadQRData; 
        window.onDateSelected = onDateSelected; 
        window.onFlightSelected = onFlightSelected;
        window.fetchOpenShift = fetchOpenShift;
        window.refreshCurrentFlight = refreshCurrentFlight;
        window.printQRReport = printQRReport;
    </script>
</body>
</html>
