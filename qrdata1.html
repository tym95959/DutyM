<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Report – Passenger List (QR Database Only)</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Your config files -->
    <script src="fireshift.js"></script>
    <script src="Co.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f0e1, #fff5e6);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ===== smaller top ribbon - REMOVED for third party ===== */
        /* Shift ribbon completely removed */
        
        /* ===== Tab Navigation ===== */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .tab-button {
            padding: 10px 24px;

        }

        /* --- REARRANGED: date/flight on left, ops on right --- */
        .selection-flight-row {

        }
        
        /* left block: date + flight selects */
        .left-selectors {

            min-width: 360px;
        }
        
        .form-group {

        /* stats inside left block */

        /* right block: ops + buttons (under last pax) */

        }

        }

            color: #333;
            padding: 10px;

            margin-top: 6px;

            font-size: 13px;

            font-weight: 600;
            color: #666;
            font-size: 10px;
            text-transform: uppercase;
        }
        
        .detail-value {
            font-weight: bold;
            color: #333;
            font-size: 11px;
        }
        
        .qr-code-container {
            margin: 8px 0;
            padding: 8px;
            background: white;
            border: 1px solid #eee;
            border-radius: 4px;
            text-align: center;
        }
        
        .qr-code-container div {
            margin: 0 auto;
        }
        
        .timestamp {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }
        
        .loading, .qr-no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #8b1e3f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        .qr-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(139, 30, 63, 0.3);
            border-radius: 50%;
            border-top-color: #8b1e3f;
            animation: spin 1s infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding: 15px;

        }
        
        .stat-label {

        }

        .sort-controls {

        .sort-controls label {

            border-radius: 4px;

            border: 1px solid #f5c6cb;

        .warning {

        .code-preview {

    </style>
</head>
<body>
    <div class="container">
        <!-- Tab Navigation - Only QR tab for third party -->
        <div class="tab-container" style="justify-content: center;">
            <button class="tab-button active" onclick="switchTab('qr')" id="tabQrBtn">📱 QR CODES</button>
        </div>

        <!-- QR CODES TAB - Only tab shown -->
        <div id="qrTab" class="tab-content active">
            <div class="card">
                <!-- Message Container -->
                <div id="messageContainer" class="message-container"></div>
                
                <!-- Controls -->
                <div class="controls" style="margin-bottom: 20px;">
                    <div class="filters" style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <div class="form-group qr-date-selector" style="flex: 2;">
                            <label>📅 SELECT DATE</label>
                            <select id="qrDateSelect" class="form-control" onchange="onQrDateSelected()">
                                <option value="">-- Select a date --</option>
                            </select>
                        </div>
                        
                        <div class="form-group" style="flex: 2;">
                            <label>✈ FILTER BY FLIGHT</label>
                            <select id="qrFlightSelect" class="form-control" onchange="filterQRCodes()">
                                <option value="">All Flights</option>
                            </select>
                        </div>
                        
                        <div class="form-group" style="flex: 1;">
                            <label>&nbsp;</label>
                            <button onclick="loadQRCodes()" id="loadQrBtn" class="generate-btn" disabled>
                                📱 GENERATE QR CODES
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Sort Controls -->
                <div class="sort-controls" id="sortControls" style="display: none;">
                    <label>Sort by:</label>
                    <select id="sortSelect" class="sort-select" onchange="sortAndDisplayQRCodes()">
                        <option value="timestamp_desc">Timestamp (Newest First)</option>
                        <option value="timestamp_asc">Timestamp (Oldest First)</option>
                        <option value="name_asc">Name (A-Z)</option>
                        <option value="name_desc">Name (Z-A)</option>
                        <option value="seat_asc">Seat Number</option>
                    </select>
                    <div style="font-size: 12px; color: #666; margin-left: auto;">
                        Showing <span id="currentCount">0</span> of <span id="totalCount">0</span> records
                    </div>
                </div>
                
                <!-- Stats -->
                <div class="stats" id="statsSection" style="display: none;">
                    <div class="stat-item">
                        <div class="stat-value" id="totalCodes">0</div>
                        <div class="stat-label">Total Codes</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="filteredCodes">0</div>
                        <div class="stat-label">Filtered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="qrCodes">0</div>
                        <div class="stat-label">QR Codes</div>
                    </div>
                </div>
                
                <!-- QR Codes Container -->
                <div id="qrContainer" class="qr-container">
                    <div class="qr-no-data">
                        Select a date and click Generate to create QR codes
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ========== GLOBAL VARIABLES ==========
    // Use 'var' instead of 'let' to avoid redeclaration issues with multiple script tags
    var flightsByDate = {};
    var allDates = [];
    var currentFlightData = null;
    var isLoadingDates = false;
    var datesLoaded = false;
    
    // QR Code variables
    var allQRCodes = [];
    var filteredQRCodes = [];
    var currentQRSort = 'timestamp_desc';
    var qrDatabase = null;

    // ========== QR DATABASE FUNCTIONS ==========
    
    /**
     * Returns the QR Firestore database
     */
    function getQRDatabase() {
        if (!window.qrDb) {
            console.error("QR Database not found in window.qrDb");
            return null;
        }
        return window.qrDb;
    }

    // ========== TAB SWITCHING (Simplified - only QR tab) ==========
    function switchTab(tabName) {
        // Only QR tab exists, so this is just a placeholder
        console.log("Only QR tab is available");
    }

    // ========== LOAD DATES FROM QR DATABASE ==========
    async function loadDates(forceReload = false) {
        if (datesLoaded && !forceReload) {
            console.log('Dates already loaded, skipping...');
            updateQrDateSelect();
            return;
        }
        
        if (isLoadingDates) return;
        
        isLoadingDates = true;
        
        if (forceReload) {
            flightsByDate = {};
            allDates = [];
        }
        
        try {
            qrDatabase = getQRDatabase();
            
            if (!qrDatabase) {
                throw new Error("QR Database not available");
            }
            
            console.log(`🔍 Loading dates from QR database...`);
            
            var snapshot = await qrDatabase.collection('KoveliPass').get();
            
            if (snapshot.size > 0) {
                snapshot.forEach(doc => {
                    var data = doc.data();
                    var date = data.date;
                    
                    if (date) {
                        if (!flightsByDate[date]) flightsByDate[date] = new Map();
                        
                        var flightKey = data.flightNo + '_' + (data.shift || 'UNKNOWN');
                        
                        if (!flightsByDate[date].has(flightKey)) {
                            flightsByDate[date].set(flightKey, {
                                flightNo: data.flightNo,
                                airline: data.airline || '',
                                passengers: [],
                                firstPax: null,
                                lastPax: null,
                                isClosed: false // Default to open
                            });
                        }
                        
                        var flightData = flightsByDate[date].get(flightKey);
                        flightData.passengers.push({
                            docId: doc.id,
                            pName: data.pName || '',
                            seatNo: data.seatNo || '',
                            pax: data.pax || '1',
                            FQTV: data.FQTV || '',
                            entryTime: data.entryTime || '',
                            remarks: data.remarks || '',
                            serialNo: data.serialNo || '',
                            flightNo: data.flightNo || '',
                            date: data.date || '',
                            timestamp: data.timestamp || null,
                            code: data.hiddenCode || '' // Using hiddenCode field from Firebase
                        });
                        
                        if (data.entryTime) {
                            if (!flightData.firstPax || data.entryTime < flightData.firstPax) {
                                flightData.firstPax = data.entryTime;
                            }
                            if (!flightData.lastPax || data.entryTime > flightData.lastPax) {
                                flightData.lastPax = data.entryTime;
                            }
                        }
                    }
                });
                
                console.log(`✅ QR Database: ${snapshot.size} records found`);
            }
            
            // Load flight status from FlightReports collection
            await loadFlightStatuses();
            
            allDates = Object.keys(flightsByDate).sort().reverse();
            datesLoaded = true;
            
            updateQrDateSelect();
            
        } catch (error) {
            console.error('Error loading dates:', error);
            var qrDateSelect = document.getElementById('qrDateSelect');
            qrDateSelect.innerHTML = '<option value="">❌ Error loading dates</option>';
        } finally { 
            isLoadingDates = false; 
        }
    }

    // Load flight statuses from FlightReports collection
    async function loadFlightStatuses() {
        try {
            var reportsSnapshot = await qrDatabase.collection('FlightReports').get();
            
            reportsSnapshot.forEach(doc => {
                var reportData = doc.data();
                var flightNo = reportData.flightNo;
                var reportDate = reportData.date;
                var isClosed = reportData.isClosed || false;
                
                // Format date to match our date format
                var formattedDate = reportDate;
                if (reportDate.includes('-')) {
                    var parts = reportDate.split('-');
                    formattedDate = parts[0] + '-' + parts[1] + '-' + parts[2];
                }
                
                // Find matching flight in our data
                if (flightsByDate[formattedDate]) {
                    flightsByDate[formattedDate].forEach(function(flight, key) {
                        if (flight.flightNo === flightNo) {
                            flight.isClosed = isClosed;
                        }
                    });
                }
            });
            
            console.log("✅ Flight statuses loaded");
        } catch (error) {
            console.error("Error loading flight statuses:", error);
        }
    }

    function updateQrDateSelect() {
        var qrDateSelect = document.getElementById('qrDateSelect');
        var loadBtn = document.getElementById('loadQrBtn');
        
        if (allDates.length === 0) {
            qrDateSelect.innerHTML = '<option value="">❌ No dates found</option>';
        } else {
            var options = '<option value="">📅 Select a date</option>';
            allDates.forEach(d => { 
                options += `<option value="${d}">${d}</option>`; 
            });
            qrDateSelect.innerHTML = options;
        }
        
        loadBtn.disabled = true;
    }

    function onQrDateSelected() {
        var qrDateSelect = document.getElementById('qrDateSelect');
        var loadBtn = document.getElementById('loadQrBtn');
        var selectedDate = qrDateSelect.value;
        
        // Update flight filter dropdown
        var flightSelect = document.getElementById('qrFlightSelect');
        
        if (selectedDate && flightsByDate[selectedDate]) {
            loadBtn.disabled = false;
            
            // Get unique flights for this date
            var flights = new Set();
            flightsByDate[selectedDate].forEach(function(flight) {
                flights.add(flight.flightNo);
            });
            
            var options = '<option value="">All Flights</option>';
            Array.from(flights).sort().forEach(function(flight) {
                options += `<option value="${flight}">${flight}</option>`;
            });
            flightSelect.innerHTML = options;
            flightSelect.disabled = false;
        } else {
            loadBtn.disabled = true;
            flightSelect.innerHTML = '<option value="">All Flights</option>';
            flightSelect.disabled = true;
        }
        
        // Clear previous QR codes when date changes
        document.getElementById('qrContainer').innerHTML = '<div class="qr-no-data">Select a date and click Generate to create QR codes</div>';
        document.getElementById('sortControls').style.display = 'none';
        document.getElementById('statsSection').style.display = 'none';
    }

    // ========== MESSAGE FUNCTIONS ==========
    function showMessage(message, type) {
        var container = document.getElementById('messageContainer');
        var messageDiv = document.createElement('div');
        messageDiv.className = 'message ' + type;
        messageDiv.textContent = message;
        container.appendChild(messageDiv);
        
        setTimeout(function() {
            if (messageDiv.parentNode) {
                messageDiv.remove();
            }
        }, 5000);
    }

    function clearMessages() {
        document.getElementById('messageContainer').innerHTML = '';
    }

    // ========== QR CODE GENERATION FUNCTIONS ==========
    
    // Format timestamp
    function formatTimestamp(timestamp) {
        if (!timestamp) return 'No timestamp';
        try {
            if (timestamp.toDate) {
                var date = timestamp.toDate();
                return date.toLocaleString();
            }
            var date = new Date(timestamp);
            if (!isNaN(date.getTime())) {
                return date.toLocaleString();
            }
            return 'Invalid timestamp';
        } catch (error) {
            return 'Error formatting';
        }
    }

    // Load QR codes for selected date
    async function loadQRCodes() {
        clearMessages();
        
        var qrDateSelect = document.getElementById('qrDateSelect');
        var selectedDate = qrDateSelect.value;
        var qrContainer = document.getElementById('qrContainer');
        var loadBtn = document.getElementById('loadQrBtn');
        
        if (!selectedDate) {
            showMessage("Please select a date first", 'error');
            return;
        }
        
        loadBtn.disabled = true;
        qrContainer.innerHTML = `
            <div class="loading">
                Loading codes from Firebase for ${selectedDate}...
            </div>
        `;
        
        try {
            // Clear previous data
            allQRCodes = [];
            
            // Get QR database reference
            qrDatabase = getQRDatabase();
            
            if (!qrDatabase) {
                throw new Error("QR Database not available");
            }
            
            console.log(`🔍 Loading code fields from KoveliPass collection for date: ${selectedDate}`);
            
            // Direct query to Firebase for the selected date
            var snapshot = await qrDatabase.collection('KoveliPass')
                .where('date', '==', selectedDate)
                .get();
            
            if (snapshot.empty) {
                qrContainer.innerHTML = '<div class="qr-no-data">No records found for this date in Firebase</div>';
                loadBtn.disabled = false;
                return;
            }
            
            console.log(`Found ${snapshot.size} records for date ${selectedDate}`);
            
            // Process each document
            snapshot.forEach(doc => {
                var data = doc.data();
                
                // Get the code field from Firebase (hiddenCode field)
                var code = data.hiddenCode || '';  // This is the hiddenCode field from Firebase
                
                allQRCodes.push({
                    id: doc.id,
                    pName: data.pName || 'Unknown',
                    seatNo: data.seatNo || 'N/A',
                    FQTV: data.FQTV || 'N/A',
                    flightNo: data.flightNo || 'N/A',
                    date: data.date || selectedDate,
                    entryTime: data.entryTime || '',
                    code: code,  // Store the code for QR generation
                    timestamp: data.timestamp || null
                });
            });
            
            filteredQRCodes = [...allQRCodes];
            
            // Sort by timestamp (newest first)
            filteredQRCodes.sort(function(a, b) {
                var timeA = a.timestamp ? (a.timestamp.toDate ? a.timestamp.toDate().getTime() : new Date(a.timestamp).getTime()) : 0;
                var timeB = b.timestamp ? (b.timestamp.toDate ? b.timestamp.toDate().getTime() : new Date(b.timestamp).getTime()) : 0;
                return timeB - timeA;
            });
            
            // Update UI
            document.getElementById('sortControls').style.display = 'flex';
            document.getElementById('statsSection').style.display = 'flex';
            
            updateStats();
            displayQRCodes(filteredQRCodes);
            
            showMessage(`Successfully loaded ${filteredQRCodes.length} records.`, 'success');
            
        } catch (error) {
            console.error("Error loading codes:", error);
            qrContainer.innerHTML = '<div class="qr-no-data">Error loading data: ' + error.message + '</div>';
            showMessage("Error loading codes: " + error.message, 'error');
        } finally {
            loadBtn.disabled = false;
        }
    }

    // Filter QR codes by flight - FIXED VERSION
    function filterQRCodes() {
        var flightSelect = document.getElementById('qrFlightSelect');
        var selectedFlight = flightSelect.value;
        
        console.log("Filtering by flight:", selectedFlight);
        console.log("Total allQRCodes:", allQRCodes.length);
        
        if (selectedFlight) {
            filteredQRCodes = allQRCodes.filter(function(item) { 
                return item.flightNo === selectedFlight; 
            });
        } else {
            filteredQRCodes = [...allQRCodes];
        }
        
        console.log("Filtered count:", filteredQRCodes.length);
        
        updateStats();
        
        // IMPORTANT: Call sortAndDisplayQRCodes to refresh the display
        // This will use the current sort setting and display the filtered codes
        sortAndDisplayQRCodes();
    }

    // Sort and display QR codes
    function sortAndDisplayQRCodes() {
        currentQRSort = document.getElementById('sortSelect').value;
        
        if (filteredQRCodes.length === 0) {
            displayQRCodes([]);
            return;
        }
        
        var sortedCodes = [...filteredQRCodes];
        
        switch(currentQRSort) {
            case 'timestamp_desc':
                sortedCodes.sort(function(a, b) {
                    var timeA = a.timestamp ? (a.timestamp.toDate ? a.timestamp.toDate().getTime() : new Date(a.timestamp).getTime()) : 0;
                    var timeB = b.timestamp ? (b.timestamp.toDate ? b.timestamp.toDate().getTime() : new Date(b.timestamp).getTime()) : 0;
                    return timeB - timeA;
                });
                break;
                
            case 'timestamp_asc':
                sortedCodes.sort(function(a, b) {
                    var timeA = a.timestamp ? (a.timestamp.toDate ? a.timestamp.toDate().getTime() : new Date(a.timestamp).getTime()) : 0;
                    var timeB = b.timestamp ? (b.timestamp.toDate ? b.timestamp.toDate().getTime() : new Date(b.timestamp).getTime()) : 0;
                    return timeA - timeB;
                });
                break;
                
            case 'name_asc':
                sortedCodes.sort(function(a, b) {
                    var nameA = (a.pName || '').toLowerCase();
                    var nameB = (b.pName || '').toLowerCase();
                    if (nameA < nameB) return -1;
                    if (nameA > nameB) return 1;
                    return 0;
                });
                break;
                
            case 'name_desc':
                sortedCodes.sort(function(a, b) {
                    var nameA = (a.pName || '').toLowerCase();
                    var nameB = (b.pName || '').toLowerCase();
                    if (nameA > nameB) return -1;
                    if (nameA < nameB) return 1;
                    return 0;
                });
                break;
                
            case 'seat_asc':
                sortedCodes.sort(function(a, b) {
                    var seatA = a.seatNo || '';
                    var seatB = b.seatNo || '';
                    return seatA.localeCompare(seatB, undefined, {numeric: true});
                });
                break;
        }
        
        displayQRCodes(sortedCodes);
    }

    // Display QR codes using the code field
    function displayQRCodes(codesToDisplay) {
        var container = document.getElementById('qrContainer');
        
        // Update current count display
        document.getElementById('currentCount').textContent = codesToDisplay.length;
        document.getElementById('totalCount').textContent = allQRCodes.length;
        
        if (codesToDisplay.length === 0) {
            container.innerHTML = '<div class="qr-no-data">No records match the selected filter</div>';
            return;
        }
        
        // Create a grid container
        container.innerHTML = '';
        
        codesToDisplay.forEach(function(item, index) {
            var card = document.createElement('div');
            card.className = 'qr-card';
            card.id = 'card-' + item.id;
            
            // Use the code field for QR generation
            var qrCodeData = item.code || '';
            
            card.innerHTML = `
                <div class="qr-info">
                    <div class="passenger-name">${item.pName || 'Unknown'}</div>
                    
                    <div class="passenger-details">
                        <div>
                            <div class="detail-label">Seat</div>
                            <div class="detail-value">${item.seatNo || 'N/A'}</div>
                        </div>
                        <div>
                            <div class="detail-label">FQTV</div>
                            <div class="detail-value">${item.FQTV || 'N/A'}</div>
                        </div>
                        <div>
                            <div class="detail-label">Flight</div>
                            <div class="detail-value">${item.flightNo || 'N/A'}</div>
                        </div>
                        <div>
                            <div class="detail-label">Time</div>
                            <div class="detail-value">${item.entryTime || 'N/A'}</div>
                        </div>
                    </div>
                    
                    <div class="timestamp">
                        ${formatTimestamp(item.timestamp)}
                    </div>
                </div>
                
                <div class="qr-code-container">
                    <div id="qr-${index}" style="display: flex; justify-content: center;"></div>
                </div>
                
                <div class="code-preview" title="Code from Firebase">
                    <strong>Code:</strong> ${qrCodeData.substring(0, 50)}${qrCodeData.length > 50 ? '...' : ''}
                </div>
            `;
            
            container.appendChild(card);
            
            // Generate QR code using the code field
            try {
                if (qrCodeData) {
                    new QRCode(document.getElementById('qr-' + index), {
                        text: qrCodeData,
                        width: 150,
                        height: 150,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } else {
                    // Show placeholder if no code
                    document.getElementById('qr-' + index).innerHTML = '<div style="color: #999; padding: 20px; text-align: center;">No code</div>';
                }
            } catch (qrError) {
                console.error("Error generating QR code:", qrError);
                document.getElementById('qr-' + index).innerHTML = '<div style="color: red; padding: 20px; text-align: center;">Error</div>';
            }
        });
        
        document.getElementById('qrCodes').textContent = codesToDisplay.length;
    }

    // Update statistics
    function updateStats() {
        document.getElementById('statsSection').style.display = 'flex';
        document.getElementById('totalCodes').textContent = allQRCodes.length;
        document.getElementById('filteredCodes').textContent = filteredQRCodes.length;
        document.getElementById('qrCodes').textContent = filteredQRCodes.length;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            loadDates();
        }, 1000);
    });

    // Global functions - make sure all are attached to window
    window.loadDates = loadDates; 
    window.switchTab = switchTab;
    window.onQrDateSelected = onQrDateSelected;
    window.loadQRCodes = loadQRCodes;
    window.filterQRCodes = filterQRCodes;
    window.sortAndDisplayQRCodes = sortAndDisplayQRCodes;
    </script>
</body>
</html>
