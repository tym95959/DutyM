<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli Lounge · Shift Commander</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fbf7e9 0%, #f5e7d3 100%);
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Warm golden glow effects (same theme, just polished) */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 215, 140, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(230, 180, 80, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><path d="M0 20 L40 20 M20 0 L20 40" stroke="rgba(230,184,0,0.03)" stroke-width="1"/></svg>');
            pointer-events: none;
        }

        .container {
            width: 520px;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 0 25px 50px -12px rgba(184, 134, 11, 0.35),
                        0 0 0 1px rgba(255, 215, 140, 0.5) inset,
                        0 0 0 2px rgba(255, 242, 215, 0.8) inset;
            border: 1px solid #ffeac2;
            position: relative;
            z-index: 1;
        }

        .gold-bar {
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #e6b800, #f5d58c, #e6b800);
            border-radius: 6px;
            margin: 0 auto 20px auto;
            border: 1px solid #fff3cf;
        }

        /* Shift info bar — cleaner, same colours */
        .shift-info {
            display: flex;
            gap: 18px;
            align-items: center;
            background: linear-gradient(135deg, #fff2d7, #fff9e6);
            padding: 14px 22px;
            border-radius: 40px;
            border: 1px solid rgba(230, 184, 0, 0.3);
            box-shadow: 0 4px 12px rgba(230, 184, 0, 0.15);
            margin-bottom: 20px;
            justify-content: space-between;
        }
        
        .shift-info div {
            color: #5e4a1a;
            font-size: 14px;
            font-weight: 500;
        }
        
        .shift-info .date {
            color: #8b6913;
            padding-left: 24px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%238b6913" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>') left center no-repeat;
            background-size: 16px;
        }
        
        .shift-info .shift {
            color: #6b8e23;
            padding-left: 24px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%236b8e23" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>') left center no-repeat;
            background-size: 16px;
        }
        
        .status-badge {
            background-color: #6b8e23;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
            text-transform: uppercase;
        }
        
        .refresh-btn {
            background: #f0f0f0;
            border: 1px solid #e6b800;
            color: #8b6913;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: #e6b800;
            color: white;
            transform: rotate(180deg);
        }

        /* User badge – same friendly style */
        .user-badge {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(115deg, #fff8e7, #fef3dd);
            border-radius: 40px;
            padding: 8px 16px 8px 20px;
            margin-bottom: 20px;
            border: 1px solid #f8d4a5;
            box-shadow: 0 4px 0 #e2bc84, inset 0 1px 4px #fff3db;
            font-weight: 500;
            color: #74592d;
        }

        #userDisplay {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            flex-wrap: wrap;
        }

        .user-name {
            color: #8b6913;
            font-weight: 600;
            background: white;
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid #f8d4a5;
            box-shadow: inset 0 1px 3px #fff3db;
        }

        .user-level {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 40px;
            background: #e6f0da;
            color: #2d6e2d;
            border: 1px solid #b8d9a6;
            font-weight: 600;
        }

        .user-level.supervisor {
            background: #fff0d4;
            color: #b87c1b;
            border-color: #f5cb8b;
        }

        .user-rcno {
            font-size: 0.75rem;
            color: #ad8e4f;
            background: rgba(255, 255, 255, 0.7);
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px dashed #eac476;
        }

        .user-badge button {
            background: #f7d9aa;
            border: none;
            border-radius: 40px;
            padding: 6px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 3px 0 #b88744;
            color: #533f1f;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #edc690;
        }

        .user-badge button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b88744;
        }
        .user-badge button:hover { background: #fce2b5; }

        /* Shift cards – warmer, slightly easier on the eyes */
        .shift {
            background: rgba(255, 245, 225, 0.9);
            border-radius: 36px;
            padding: 24px 24px;
            margin-bottom: 24px;
            border: 1px solid #f8d9a8;
            box-shadow: 0 8px 0 #e5c294, 0 12px 28px -12px rgba(179, 139, 81, 0.4);
            backdrop-filter: blur(5px);
            position: relative;
            transition: all 0.3s ease;
        }

        .shift.active-shift {
            border: 2px solid #ffd966;
            box-shadow: 0 8px 0 #e5c294, 0 12px 28px -8px rgba(255, 200, 50, 0.5);
        }

        .shift-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .shift-header span {
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 4px rgba(184, 134, 11, 0.3));
            background: rgba(255, 245, 225, 0.8);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            border: 1px solid #ffd89c;
        }

        .shift-header h3 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #8b6913, #b4843c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        /* Status badges – clearer, still warm */
        .status {
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            background: #faf1dd;
            border: 1px solid #eeddbb;
            box-shadow: inset 0 2px 4px #f0ddc0, 0 3px 0 #c7a15e;
            color: #4a3a1f;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .status.open {
            background: #ebf7e4;
            border-color: #b8d9a6;
            box-shadow: inset 0 2px 4px #dceacd, 0 3px 0 #749b50;
            color: #2b6e2b;
        }
        .status.closed {
            background: #ffe8e8;
            border-color: #fbbdbd;
            box-shadow: inset 0 2px 4px #fedfdf, 0 3px 0 #b47373;
            color: #ac3a3a;
        }
        .status.pending {
            background: #fff2cf;
            border-color: #f5d797;
            box-shadow: inset 0 2px 4px #fbebc3, 0 3px 0 #bc8f4a;
            color: #8f6327;
        }

        .btn-group {
            display: flex;
            gap: 16px;
        }

        button {
            flex: 1;
            padding: 16px 8px;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            background: white;
            color: #6b4e2a;
            border: 1px solid #f7cf9a;
            box-shadow: 0 5px 0 #d6a56b, 0 6px 12px rgba(184, 135, 65, 0.2);
            letter-spacing: 0.3px;
        }
        button:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #d6a56b, 0 6px 12px rgba(160, 115, 45, 0.15);
        }
        button:disabled {
            opacity: 0.45;
            box-shadow: 0 3px 0 #b5915f, 0 4px 8px rgba(128, 92, 41, 0.1);
            transform: translateY(2px);
            background: #f3e4d1;
            border-color: #dbbc8b;
            color: #7b623e;
            cursor: not-allowed;
        }

        .btn-open {
            background: #fef6e6;
            box-shadow: 0 5px 0 #699e4c, 0 6px 12px rgba(160, 184, 90, 0.25);
            color: #2b6e2b;
            border-color: #aacf94;
        }
        .btn-open:hover:not(:disabled) { background: #f7ffec; }

        .btn-close {
            background: #ffefe7;
            box-shadow: 0 5px 0 #c25e5e, 0 6px 12px rgba(219, 97, 97, 0.2);
            color: #b13e3e;
            border-color: #fbb5b5;
        }
        .btn-close:hover:not(:disabled) { background: #ffe1d6; }

        /* bottom action row: refresh + dashboard button */
        .action-row {
            display: flex;
            gap: 14px;
            margin-top: 16px;
        }
        .action-row button {
            flex: 1;
            padding: 18px 8px;
            background: #f7e9d2;
            color: #7b592b;
            border: 1px solid #fad19e;
            box-shadow: 0 6px 0 #cb9f62, 0 8px 20px rgba(181, 130, 75, 0.3);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .action-row button:hover:not(:disabled) {
            background: #fef0da;
            transform: translateY(-1px);
            box-shadow: 0 7px 0 #cb9f62, 0 12px 24px rgba(181, 130, 75, 0.35);
        }

        /* Reset button – supervisor only */
        .reset-btn {
            width: 100%;
            margin-top: 16px;
            padding: 18px;
            background: #fbe7c4;
            border-color: #f5c58c;
            box-shadow: 0 6px 0 #cb9f62, 0 8px 20px rgba(181, 130, 75, 0.3);
        }

        #message {
            margin: 16px 0 24px;
            padding: 16px 20px;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
            display: none;
            border: 1px solid;
            backdrop-filter: blur(5px);
            font-size: 0.95rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { background: #f1f9e8; color: #476b36; border-color: #bcdb9c; }
        .error { background: #ffedea; color: #9f4d4d; border-color: #feb3af; }

        .last-updated {
            font-size: 0.75rem;
            color: #ad8e4f;
            text-align: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #eac476;
        }

        /* scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f5e7d3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #e6b800; border-radius: 10px; border: 2px solid #f5e7d3; }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="fireshift.js"></script>
</head>
<body>
    <div class="container">
        <div class="gold-bar"></div>

        <!-- Shift info bar (same) -->
        <div class="shift-info" id="shiftInfo">
            <div class="date">DATE: <span id="currentDate">Loading...</span></div>
            <div class="shift">SHIFT: <span id="currentShift">Loading...</span> <span id="shiftStatus" class="status-badge"></span></div>
            <button id="refreshShiftBtn" class="refresh-btn">↻</button>
        </div>

        <!-- User badge -->
        <div class="user-badge" id="userBadge">
            <div id="userDisplay">
                <span class="user-name" id="userNameDisplay">👤 loading...</span>
                <span class="user-level" id="userLevelDisplay">operator</span>
                <span class="user-rcno" id="userRcnoDisplay"></span>
            </div>
            <button id="logoutBtn" onclick="logout()">logout</button>
        </div>

        <div id="message"></div>

        <!-- Morning shift card -->
        <div class="shift" id="morningShift">
            <div class="shift-header"><span>🌅</span><h3>morning shift</h3></div>
            <div class="status" id="morningStatus">pending</div>
            <div class="btn-group">
                <button class="btn-open" id="openMorning" onclick="handleShift('morning', 'open')">open</button>
                <button class="btn-close" id="closeMorning" onclick="handleShift('morning', 'close')">close</button>
            </div>
        </div>

        <!-- Evening shift card -->
        <div class="shift" id="eveningShift">
            <div class="shift-header"><span>🌆</span><h3>evening shift</h3></div>
            <div class="status" id="eveningStatus">pending</div>
            <div class="btn-group">
                <button class="btn-open" id="openEvening" onclick="handleShift('evening', 'open')">open</button>
                <button class="btn-close" id="closeEvening" onclick="handleShift('evening', 'close')">close</button>
            </div>
        </div>

        <!-- ACTION ROW: refresh + DASHBOARD BUTTON (go back) -->
        <div class="action-row">
            <button onclick="loadTodayData()"><span>⟳</span> refresh</button>
            <button id="dashboardBtn" onclick="goToDashboard()"><span>📋</span> dashboard</button>
        </div>

        <!-- Reset (supervisor only) -->
        <button class="reset-btn" id="resetBtn" onclick="supervisorReset()"><span>✨</span> new day reset</button>

        <div class="last-updated" id="lastUpdated">last updated: —</div>
    </div>

    <script>
        // ========== USER ==========
        let currentUser = { name: 'operator', level: 'operator', rcno: '', isSupervisor: false };
        let currentShiftData = { date: '', shift: '', status: '', openTime: '' };

        // load from login
        function loadUserFromLogin() {
            try {
                const username = localStorage.getItem('username');
                const level = localStorage.getItem('level');
                const rcno = localStorage.getItem('rcno');
                const loggedInUser = localStorage.getItem('loggedInUser');

                if (loggedInUser) {
                    try {
                        const parsed = JSON.parse(loggedInUser);
                        currentUser.name = parsed.username || parsed.name || username || 'operator';
                        currentUser.level = parsed.level || level || 'operator';
                        currentUser.rcno = parsed.rcno || rcno || '';
                    } catch (e) {}
                }
                if (username) currentUser.name = username;
                if (level) currentUser.level = level;
                if (rcno) currentUser.rcno = rcno;

                const levelStr = (currentUser.level || '').toString().toUpperCase();
                currentUser.isSupervisor = levelStr === 'SUPERVISOR' || levelStr === 'ADMIN' || levelStr === 'MANAGER';

                if (!currentUser.name) currentUser.name = 'operator';
                if (!currentUser.level) currentUser.level = 'operator';
                if (!currentUser.rcno) currentUser.rcno = 'N/A';
            } catch (error) {
                currentUser = { name: 'operator', level: 'operator', rcno: 'N/A', isSupervisor: false };
            }
            updateUserDisplay();
        }

        function updateUserDisplay() {
            const userNameSpan = document.getElementById('userNameDisplay');
            const userLevelSpan = document.getElementById('userLevelDisplay');
            const userRcnoSpan = document.getElementById('userRcnoDisplay');
            const resetBtn = document.getElementById('resetBtn');

            if (userNameSpan) userNameSpan.innerHTML = `👤 ${currentUser.name}`;
            if (userLevelSpan) {
                userLevelSpan.textContent = currentUser.level;
                if (currentUser.isSupervisor) userLevelSpan.classList.add('supervisor');
                else userLevelSpan.classList.remove('supervisor');
            }
            if (userRcnoSpan) userRcnoSpan.textContent = `RC: ${currentUser.rcno}`;
            if (resetBtn) {
                resetBtn.disabled = !currentUser.isSupervisor;
                resetBtn.title = currentUser.isSupervisor ? 'Reset both shifts' : 'Supervisor only';
            }
        }

        window.logout = function() {
            localStorage.removeItem('username');
            localStorage.removeItem('level');
            localStorage.removeItem('rcno');
            localStorage.removeItem('loggedInUser');
            showMessage('logging out...', false);
            setTimeout(() => { window.location.href = 'login.html'; }, 1000);
        };

        // === DASHBOARD NAVIGATION (go back) ===
        window.goToDashboard = function() {
            // go to dashboard.html (adjust if needed)
            window.location.href = 'dashboard.html';
        };

        function formatDateForDisplay(dateStr) {
            if (!dateStr) return 'NO DATE';
            try {
                if (dateStr.includes('-')) {
                    const [year, month, day] = dateStr.split('-');
                    return `${day}/${month}/${year}`;
                }
                return dateStr;
            } catch { return dateStr; }
        }

        function showMessage(text, isError = false) {
            const msg = document.getElementById('message');
            msg.style.display = 'block';
            msg.textContent = text;
            msg.className = isError ? 'error' : 'success';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function updateShiftDisplay() {
            const dateEl = document.getElementById('currentDate');
            const shiftEl = document.getElementById('currentShift');
            const badge = document.getElementById('shiftStatus');
            const info = document.getElementById('shiftInfo');
            const morningShift = document.getElementById('morningShift');
            const eveningShift = document.getElementById('eveningShift');

            if (!dateEl || !shiftEl || !badge) return;
            dateEl.textContent = currentShiftData.date ? formatDateForDisplay(currentShiftData.date) : 'NO DATE';

            morningShift.classList.remove('active-shift');
            eveningShift.classList.remove('active-shift');

            if (currentShiftData.shift === 'MORNING') {
                shiftEl.textContent = 'MORNING';
                badge.textContent = currentShiftData.status;
                badge.style.backgroundColor = '#6b8e23';
                morningShift.classList.add('active-shift');
            } else if (currentShiftData.shift === 'EVENING') {
                shiftEl.textContent = 'EVENING';
                badge.textContent = currentShiftData.status;
                badge.style.backgroundColor = '#6b8e23';
                eveningShift.classList.add('active-shift');
            } else {
                shiftEl.textContent = currentShiftData.shift || '--';
                badge.textContent = currentShiftData.status || '--';
                badge.style.backgroundColor = '#c68b5e';
            }
            info.classList.remove('loading', 'error');
            if (currentShiftData.openTime) {
                document.getElementById('lastUpdated').textContent = `last updated: ${currentShiftData.openTime}`;
            } else {
                document.getElementById('lastUpdated').textContent = `last updated: —`;
            }
        }

        // === FETCH SHIFT (EXACT LOGIC) ===
        async function loadTodayData() {
            try {
                const info = document.getElementById('shiftInfo');
                const dateEl = document.getElementById('currentDate');
                const shiftEl = document.getElementById('currentShift');
                const badge = document.getElementById('shiftStatus');
                if (!info || !dateEl || !shiftEl || !badge) return;

                dateEl.textContent = 'Loading...';
                shiftEl.textContent = 'Loading...';
                info.classList.add('loading');

                if (typeof passengerDb === 'undefined') {
                    console.error('passengerDb missing');
                    dateEl.textContent = 'DB ERROR';
                    shiftEl.textContent = 'NOT INIT';
                    info.classList.remove('loading');
                    info.classList.add('error');
                    return;
                }

                let shiftDoc = null;
                try {
                    shiftDoc = await passengerDb.collection('shifts').doc('currentshift').get();
                } catch (e) { console.log(e); }

                if (shiftDoc && shiftDoc.exists) {
                    const data = shiftDoc.data();
                    // update morning status
                    const mornStat = document.getElementById('morningStatus');
                    if (mornStat) {
                        const mStatus = data.morning || 'pending';
                        mornStat.textContent = mStatus === 'open' ? '🟢 shift open' : mStatus === 'closed' ? '🔴 shift closed' : '🟡 pending';
                        mornStat.className = `status ${mStatus}`;
                    }
                    const eveStat = document.getElementById('eveningStatus');
                    if (eveStat) {
                        const eStatus = data.evening || 'pending';
                        eveStat.textContent = eStatus === 'open' ? '🟢 shift open' : eStatus === 'closed' ? '🔴 shift closed' : '🟡 pending';
                        eveStat.className = `status ${eStatus}`;
                    }

                    updateButtonStates(data);

                    currentShiftData.date = data.date || '';
                    if (data.morning === 'open') {
                        currentShiftData.shift = 'MORNING';
                        currentShiftData.status = 'OPEN';
                        currentShiftData.openTime = data.updated || '';
                    } else if (data.evening === 'open') {
                        currentShiftData.shift = 'EVENING';
                        currentShiftData.status = 'OPEN';
                        currentShiftData.openTime = data.updated || '';
                    } else {
                        currentShiftData.shift = 'NO OPEN SHIFT';
                        currentShiftData.status = 'CLOSED';
                        currentShiftData.openTime = data.updated || '';
                    }
                } else {
                    document.getElementById('morningStatus').textContent = '🟡 pending';
                    document.getElementById('morningStatus').className = 'status pending';
                    document.getElementById('eveningStatus').textContent = '🟡 pending';
                    document.getElementById('eveningStatus').className = 'status pending';
                    currentShiftData.date = '';
                    currentShiftData.shift = 'NO SHIFT DATA';
                    currentShiftData.status = 'NOT FOUND';
                    currentShiftData.openTime = '';
                }
                updateShiftDisplay();
            } catch (error) {
                console.error('fetch error', error);
                const info = document.getElementById('shiftInfo');
                if (info) {
                    info.classList.remove('loading');
                    info.classList.add('error');
                }
            }
        }

        function updateButtonStates(data) {
            const openM = document.getElementById('openMorning');
            const closeM = document.getElementById('closeMorning');
            const openE = document.getElementById('openEvening');
            const closeE = document.getElementById('closeEvening');
            const morn = data.morning || 'pending';
            const eve = data.evening || 'pending';

            if (morn === 'pending') {
                openM.disabled = false; closeM.disabled = true;
                openE.disabled = true; closeE.disabled = true;
            } else if (morn === 'open') {
                openM.disabled = true; closeM.disabled = false;
                openE.disabled = true; closeE.disabled = true;
            } else if (morn === 'closed') {
                openM.disabled = true; closeM.disabled = true;
                if (eve === 'pending') { openE.disabled = false; closeE.disabled = true; }
                else if (eve === 'open') { openE.disabled = true; closeE.disabled = false; }
                else if (eve === 'closed') { openE.disabled = true; closeE.disabled = true; }
            }
        }

        // === HANDLE SHIFT (after save, go to dashboard) ===
        async function handleShift(shift, action) {
            try {
                const doc = await passengerDb.collection('shifts').doc('currentshift').get();
                const currentData = doc.exists ? doc.data() : {};
                const existingDate = currentData.date;
                const todayStr = new Date().toISOString().split('T')[0];

                // validation
                if (shift === 'morning') {
                    if (action === 'open' && currentData.morning === 'open') {
                        showMessage('morning already open!', true); return;
                    }
                    if (action === 'close' && currentData.morning !== 'open') {
                        showMessage('open morning first!', true); return;
                    }
                }
                if (shift === 'evening') {
                    if (currentData.morning !== 'closed') {
                        showMessage('close morning first!', true); return;
                    }
                    if (action === 'open' && currentData.evening === 'open') {
                        showMessage('evening already open!', true); return;
                    }
                    if (action === 'close' && currentData.evening !== 'open') {
                        showMessage('open evening first!', true); return;
                    }
                }

                const newStatus = action === 'open' ? 'open' : 'closed';
                const now = new Date().toLocaleString();
                const updateData = {
                    [shift]: newStatus,
                    updated: now,
                    updatedBy: currentUser.name,
                    updatedByLevel: currentUser.level,
                    updatedByRC: currentUser.rcno
                };
                if (!existingDate) updateData.date = todayStr;
                else updateData.date = existingDate;

                await passengerDb.collection('shifts').doc('currentshift').set(updateData, { merge: true });

                showMessage(`✅ ${shift} ${newStatus} by ${currentUser.name}`);

                // === AFTER ACTION, REDIRECT TO DASHBOARD (go back) ===
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800); // short delay to show success message

            } catch (error) {
                console.error(error);
                showMessage('Error saving shift', true);
            }
        }

        async function supervisorReset() {
            if (!currentUser.isSupervisor) {
                showMessage('⚠️ supervisors only', true); return;
            }
            if (!confirm('Reset both shifts for new day?')) return;
            const today = new Date().toISOString().split('T')[0];
            const now = new Date().toLocaleString();
            try {
                await passengerDb.collection('shifts').doc('currentshift').set({
                    morning: 'pending',
                    evening: 'pending',
                    date: today,
                    updated: now,
                    updatedBy: currentUser.name,
                    updatedByLevel: currentUser.level,
                    updatedByRC: currentUser.rcno,
                    resetBy: currentUser.name,
                    resetAt: now
                });
                showMessage('✅ new day started');
                await loadTodayData();
            } catch (error) {
                showMessage('Reset error', true);
            }
        }

        function checkLogin() {
            if (!localStorage.getItem('username')) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        // INIT
        window.onload = () => {
            if (!checkLogin()) return;
            loadUserFromLogin();
            setTimeout(loadTodayData, 200);
            setInterval(loadTodayData, 30000);
            document.getElementById('refreshShiftBtn').addEventListener('click', loadTodayData);
        };
    </script>
</body>
