<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli Lounge · Shift Commander</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fbf7e9 0%, #f5e7d3 100%);
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Warm golden glow effects (SAME COLOR THEME) */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 215, 140, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(230, 180, 80, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><path d="M0 20 L40 20 M20 0 L20 40" stroke="rgba(230,184,0,0.03)" stroke-width="1"/></svg>');
            pointer-events: none;
        }

        /* CONTAINER — bigger & refined */
        .container {
            width: 660px;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 38px 36px;
            box-shadow: 0 25px 50px -12px rgba(184, 134, 11, 0.35),
                        0 0 0 1px rgba(255, 215, 140, 0.5) inset,
                        0 0 0 2px rgba(255, 242, 215, 0.8) inset;
            border: 1px solid #ffeac2;
            position: relative;
            z-index: 1;
        }

        .gold-bar {
            height: 6px;
            width: 120px;
            background: linear-gradient(90deg, #e6b800, #f5d58c, #e6b800);
            border-radius: 6px;
            margin: 0 auto 24px auto;
            border: 1px solid #fff3cf;
        }

        /* ===== SHIFT INFO BAR — cleaner, same colors ===== */
        .shift-info {
            display: flex;
            gap: 18px;
            align-items: center;
            background: rgba(255, 245, 230, 0.7);
            padding: 14px 24px;
            border-radius: 100px;          /* pill shape */
            border: 1px solid rgba(230, 184, 0, 0.25);
            box-shadow: 0 6px 12px rgba(184, 134, 11, 0.08);
            margin-bottom: 24px;
            justify-content: space-between;
        }
        
        .shift-info div {
            color: #5e4a1a;
            font-size: 15px;
            font-weight: 500;
        }
        
        .shift-info .date {
            color: #8b6913;
            padding-left: 26px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%238b6913" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>') left center no-repeat;
            background-size: 18px;
        }
        
        .shift-info .shift {
            color: #6b8e23;
            padding-left: 26px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%236b8e23" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>') left center no-repeat;
            background-size: 18px;
        }
        
        .status-badge {
            background-color: #6b8e23;
            color: white;
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .refresh-btn {
            background: #ffffffcc;
            border: 1px solid #e6b800;
            color: #8b6913;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            box-shadow: 0 2px 6px rgba(184, 134, 11, 0.15);
        }
        .refresh-btn:hover {
            background: #e6b800;
            color: white;
            transform: rotate(180deg) scale(1.02);
            box-shadow: 0 4px 10px #e6b80080;
        }

        /* ===== USER BADGE — minimal, elegant, same palette ===== */
        .user-badge {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 245, 230, 0.7);
            border-radius: 80px;
            padding: 8px 18px 8px 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(230, 184, 0, 0.25);
            box-shadow: 0 6px 12px rgba(184, 134, 11, 0.06);
            font-weight: 500;
            color: #74592d;
        }

        #userDisplay {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1rem;
            flex-wrap: wrap;
        }

        .user-name {
            color: #8b6913;
            font-weight: 600;
            background: #ffffffd9;
            padding: 4px 16px;
            border-radius: 60px;
            border: 1px solid #f8d4a5;
            box-shadow: 0 2px 6px #f8d4a580;
        }

        .user-level {
            font-size: 0.85rem;
            padding: 4px 16px;
            border-radius: 60px;
            background: #e6f0da;
            color: #2d6e2d;
            border: 1px solid #b8d9a6;
            font-weight: 600;
            box-shadow: 0 2px 4px #b8d9a680;
        }

        .user-level.supervisor {
            background: #fff0d4;
            color: #b87c1b;
            border-color: #f5cb8b;
        }

        .user-rcno {
            font-size: 0.8rem;
            color: #ad8e4f;
            background: #ffffffb3;
            padding: 2px 14px;
            border-radius: 40px;
            border: 1px dashed #eac476;
        }

        .user-badge button {
            background: #f7e3c0;
            border: none;
            border-radius: 60px;
            padding: 7px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 4px 8px #e2bc8480;
            color: #533f1f;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid #edc690;
        }
        .user-badge button:hover { background: #fceed0; transform: scale(1.02); }
        .user-badge button:active { transform: scale(0.98); box-shadow: 0 2px 4px #e2bc84; }

        /* ===== MESSAGE TOAST ===== */
        #message {
            margin: 16px 0 28px;
            padding: 16px 24px;
            border-radius: 80px;
            text-align: center;
            font-weight: 500;
            display: none;
            border: 1px solid;
            backdrop-filter: blur(5px);
            font-size: 1rem;
            animation: slideIn 0.3s ease;
        }
        .success { background: #f1f9e8; color: #476b36; border-color: #bcdb9c; box-shadow: 0 4px 12px #bcdb9c60; }
        .error { background: #ffedea; color: #9f4d4d; border-color: #feb3af; box-shadow: 0 4px 12px #feb3af60; }
        @keyframes slideIn { 0% { opacity:0; transform:translateY(-10px); } 100% { opacity:1; transform:translateY(0); } }

        /* ===== SHIFT CARDS — same theme, cleaner lines ===== */
        .shift {
            background: rgba(255, 245, 225, 0.6);
            border-radius: 40px;
            padding: 28px 30px;
            margin-bottom: 28px;
            border: 1px solid rgba(248, 217, 168, 0.8);
            box-shadow: 0 12px 28px -12px rgba(179, 139, 81, 0.3), 0 4px 0 #f8d9a8 inset;
            backdrop-filter: blur(5px);
            transition: all 0.25s;
        }
        .shift.active-shift {
            border: 2px solid #ffd966;
            box-shadow: 0 12px 28px -8px rgba(255, 200, 50, 0.4), 0 4px 0 #ffe6b3 inset;
        }

        .shift-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 24px;
        }
        .shift-header span {
            font-size: 2.5rem;
            filter: drop-shadow(0 2px 6px rgba(184, 134, 11, 0.2));
            background: rgba(255, 245, 225, 0.7);
            width: 64px; height: 64px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 32px;
            border: 1px solid #ffd89c;
        }
        .shift-header h3 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #8b6913, #b4843c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        /* status badges — same colors, new pill & glow */
        .status {
            padding: 14px 24px;
            border-radius: 80px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 26px;
            background: #faf1dd;
            border: 1px solid #eeddbb;
            box-shadow: 0 6px 14px #eeddbb80, inset 0 2px 6px #fff8e7;
            color: #4a3a1f;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .status.open {
            background: #ebf7e4;
            border-color: #b8d9a6;
            box-shadow: 0 6px 14px #b8d9a680, inset 0 2px 6px #ffffff;
            color: #2b6e2b;
        }
        .status.closed {
            background: #ffe8e8;
            border-color: #fbbdbd;
            box-shadow: 0 6px 14px #fbbdbd80, inset 0 2px 6px #ffffff;
            color: #ac3a3a;
        }
        .status.pending {
            background: #fff2cf;
            border-color: #f5d797;
            box-shadow: 0 6px 14px #f5d79780, inset 0 2px 6px #ffffff;
            color: #8f6327;
        }

        /* ===== BUTTON GROUP — COMPLETELY NEW STYLE (pill, soft, modern) ===== */
        .btn-group {
            display: flex;
            gap: 20px;
        }

        /* base button — modern minimal */
        button {
            flex: 1;
            padding: 16px 12px;
            border: none;
            border-radius: 60px;           /* extra pill */
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            background: #ffffff;
            color: #6b4e2a;
            border: 1px solid #f7cf9a;
            box-shadow: 0 8px 18px -8px rgba(184, 135, 65, 0.3), 0 2px 0 #f7cf9a inset;
            letter-spacing: 0.2px;
            backdrop-filter: blur(2px);
        }
        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 16px 24px -10px #b68841b3, 0 2px 0 #f7cf9a inset;
            background: #fffcf5;
        }
        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 6px 12px -6px #b68841, 0 1px 0 #f7cf9a inset;
        }
        button:disabled {
            opacity: 0.4;
            background: #f5e5d1;
            border-color: #dbbc8b;
            color: #7b623e;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        /* open & close variants — same base, only color hint */
        .btn-open {
            background: #f4fce8;
            border-color: #b8d9a6;
            color: #2b6e2b;
            box-shadow: 0 8px 18px -8px #7b9e5e, 0 2px 0 #b8d9a6 inset;
        }
        .btn-open:hover:not(:disabled) { background: #f8ffee; }

        .btn-close {
            background: #ffeee8;
            border-color: #fbb5b5;
            color: #b13e3e;
            box-shadow: 0 8px 18px -8px #d47b7b, 0 2px 0 #fbb5b5 inset;
        }
        .btn-close:hover:not(:disabled) { background: #fff4f0; }

        /* action row buttons — unified new style */
        .action-row {
            display: flex;
            gap: 18px;
            margin-top: 20px;
        }
        .action-row button {
            flex: 1;
            padding: 18px 12px;
            background: #faedd9;
            border: 1px solid #fad19e;
            box-shadow: 0 10px 20px -10px #cb9f62, 0 2px 0 #fad19e inset;
            font-size: 1.2rem;
            gap: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .action-row button:hover:not(:disabled) {
            background: #fef5e6;
            transform: translateY(-3px);
            box-shadow: 0 18px 28px -12px #b67f42;
        }

        /* reset button — same fresh style */
        .reset-btn {
            width: 100%;
            margin-top: 20px;
            padding: 18px;
            background: #fae6c5;
            border-color: #f5c58c;
            box-shadow: 0 10px 20px -10px #b88744, 0 2px 0 #f5c58c inset;
            font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .reset-btn:hover:not(:disabled) {
            background: #fff0da;
            transform: translateY(-3px);
            box-shadow: 0 20px 28px -12px #aa7733;
        }

        /* last updated */
        .last-updated {
            font-size: 0.8rem;
            color: #ad8e4f;
            text-align: center;
            margin-top: 22px;
            padding-top: 14px;
            border-top: 1px dashed #eac476;
        }

        /* scrollbar (same) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f5e7d3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #e6b800; border-radius: 10px; border: 2px solid #f5e7d3; }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="fireshift.js"></script>
</head>
<body>
<div class="container">
    <div class="gold-bar"></div>

    <!-- Shift info -->
    <div class="shift-info" id="shiftInfo">
        <div class="date">DATE: <span id="currentDate">Loading...</span></div>
        <div class="shift">SHIFT: <span id="currentShift">Loading...</span> <span id="shiftStatus" class="status-badge"></span></div>
        <button id="refreshShiftBtn" class="refresh-btn">↻</button>
    </div>

    <!-- User badge -->
    <div class="user-badge" id="userBadge">
        <div id="userDisplay">
            <span class="user-name" id="userNameDisplay">👤 loading...</span>
            <span class="user-level" id="userLevelDisplay">operator</span>
            <span class="user-rcno" id="userRcnoDisplay"></span>
        </div>
        <button id="logoutBtn" onclick="logout()">logout</button>
    </div>

    <div id="message"></div>

    <!-- Morning shift -->
    <div class="shift" id="morningShift">
        <div class="shift-header"><span>🌅</span><h3>morning shift</h3></div>
        <div class="status" id="morningStatus">pending</div>
        <div class="btn-group">
            <button class="btn-open" id="openMorning" onclick="handleShift('morning', 'open')">open</button>
            <button class="btn-close" id="closeMorning" onclick="handleShift('morning', 'close')">close</button>
        </div>
    </div>

    <!-- Evening shift -->
    <div class="shift" id="eveningShift">
        <div class="shift-header"><span>🌆</span><h3>evening shift</h3></div>
        <div class="status" id="eveningStatus">pending</div>
        <div class="btn-group">
            <button class="btn-open" id="openEvening" onclick="handleShift('evening', 'open')">open</button>
            <button class="btn-close" id="closeEvening" onclick="handleShift('evening', 'close')">close</button>
        </div>
    </div>

    <!-- Action row: refresh + dashboard (pill style) -->
    <div class="action-row">
        <button onclick="loadTodayData()"><span>⟳</span> refresh</button>
        <button id="dashboardBtn" onclick="goToDashboard()"><span>📋</span> dashboard</button>
    </div>

    <!-- Reset (supervisor) -->
    <button class="reset-btn" id="resetBtn" onclick="supervisorReset()"><span>✨</span> new day reset</button>

    <div class="last-updated" id="lastUpdated">last updated: —</div>
</div>

<script>
    // ========== USER ==========
    let currentUser = { name: 'operator', level: 'operator', rcno: '', isSupervisor: false };
    let currentShiftData = { date: '', shift: '', status: '', openTime: '' };

    function loadUserFromLogin() {
        try {
            const username = localStorage.getItem('username');
            const level = localStorage.getItem('level');
            const rcno = localStorage.getItem('rcno');
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                try {
                    const parsed = JSON.parse(loggedInUser);
                    currentUser.name = parsed.username || parsed.name || username || 'operator';
                    currentUser.level = parsed.level || level || 'operator';
                    currentUser.rcno = parsed.rcno || rcno || '';
                } catch (e) {}
            }
            if (username) currentUser.name = username;
            if (level) currentUser.level = level;
            if (rcno) currentUser.rcno = rcno;
            const levelStr = (currentUser.level || '').toString().toUpperCase();
            currentUser.isSupervisor = levelStr === 'SUPERVISOR' || levelStr === 'ADMIN' || levelStr === 'MANAGER';
            if (!currentUser.name) currentUser.name = 'operator';
            if (!currentUser.level) currentUser.level = 'operator';
            if (!currentUser.rcno) currentUser.rcno = 'N/A';
        } catch (error) {
            currentUser = { name: 'operator', level: 'operator', rcno: 'N/A', isSupervisor: false };
        }
        updateUserDisplay();
    }

    function updateUserDisplay() {
        const userNameSpan = document.getElementById('userNameDisplay');
        const userLevelSpan = document.getElementById('userLevelDisplay');
        const userRcnoSpan = document.getElementById('userRcnoDisplay');
        const resetBtn = document.getElementById('resetBtn');
        if (userNameSpan) userNameSpan.innerHTML = `👤 ${currentUser.name}`;
        if (userLevelSpan) {
            userLevelSpan.textContent = currentUser.level;
            if (currentUser.isSupervisor) userLevelSpan.classList.add('supervisor');
            else userLevelSpan.classList.remove('supervisor');
        }
        if (userRcnoSpan) userRcnoSpan.textContent = `RC: ${currentUser.rcno}`;
        if (resetBtn) {
            resetBtn.disabled = !currentUser.isSupervisor;
            resetBtn.title = currentUser.isSupervisor ? 'Reset both shifts' : 'Supervisor only';
        }
    }

    window.logout = function() {
        localStorage.removeItem('username'); localStorage.removeItem('level'); localStorage.removeItem('rcno'); localStorage.removeItem('loggedInUser');
        showMessage('logging out...', false);
        setTimeout(() => window.location.href = 'login.html', 1000);
    };
    window.goToDashboard = function() { window.location.href = 'dashboard.html'; };

    function formatDateForDisplay(dateStr) {
        if (!dateStr) return 'NO DATE';
        try { if (dateStr.includes('-')) { const [y,m,d]=dateStr.split('-'); return `${d}/${m}/${y}`; } return dateStr; } catch { return dateStr; }
    }
    function showMessage(text, isError = false) {
        const msg = document.getElementById('message');
        msg.style.display = 'block'; msg.textContent = text; msg.className = isError ? 'error' : 'success';
        setTimeout(() => msg.style.display = 'none', 3000);
    }
    function updateShiftDisplay() {
        const dateEl = document.getElementById('currentDate'), shiftEl = document.getElementById('currentShift'), badge = document.getElementById('shiftStatus'), info = document.getElementById('shiftInfo');
        const morningShift = document.getElementById('morningShift'), eveningShift = document.getElementById('eveningShift');
        if (!dateEl || !shiftEl || !badge) return;
        dateEl.textContent = currentShiftData.date ? formatDateForDisplay(currentShiftData.date) : 'NO DATE';
        morningShift.classList.remove('active-shift'); eveningShift.classList.remove('active-shift');
        if (currentShiftData.shift === 'MORNING') { shiftEl.textContent = 'MORNING'; badge.textContent = currentShiftData.status; badge.style.backgroundColor = '#6b8e23'; morningShift.classList.add('active-shift'); }
        else if (currentShiftData.shift === 'EVENING') { shiftEl.textContent = 'EVENING'; badge.textContent = currentShiftData.status; badge.style.backgroundColor = '#6b8e23'; eveningShift.classList.add('active-shift'); }
        else { shiftEl.textContent = currentShiftData.shift || '--'; badge.textContent = currentShiftData.status || '--'; badge.style.backgroundColor = '#c68b5e'; }
        info.classList.remove('loading','error');
        document.getElementById('lastUpdated').textContent = currentShiftData.openTime ? `last updated: ${currentShiftData.openTime}` : 'last updated: —';
    }

    // === FETCH SHIFT ===
    async function loadTodayData() {
        try {
            const info = document.getElementById('shiftInfo'), dateEl = document.getElementById('currentDate'), shiftEl = document.getElementById('currentShift'), badge = document.getElementById('shiftStatus');
            if (!info || !dateEl || !shiftEl || !badge) return;
            dateEl.textContent = 'Loading...'; shiftEl.textContent = 'Loading...'; info.classList.add('loading');
            if (typeof passengerDb === 'undefined') { dateEl.textContent = 'DB ERROR'; shiftEl.textContent = 'NOT INIT'; info.classList.remove('loading'); info.classList.add('error'); return; }
            let shiftDoc = null;
            try { shiftDoc = await passengerDb.collection('shifts').doc('currentshift').get(); } catch (e) { console.log(e); }
            if (shiftDoc && shiftDoc.exists) {
                const data = shiftDoc.data();
                const mornStat = document.getElementById('morningStatus');
                if (mornStat) { const m = data.morning||'pending'; mornStat.textContent = m==='open'?'🟢 shift open': m==='closed'?'🔴 shift closed':'🟡 pending'; mornStat.className = `status ${m}`; }
                const eveStat = document.getElementById('eveningStatus');
                if (eveStat) { const e = data.evening||'pending'; eveStat.textContent = e==='open'?'🟢 shift open': e==='closed'?'🔴 shift closed':'🟡 pending'; eveStat.className = `status ${e}`; }
                updateButtonStates(data);
                currentShiftData.date = data.date||'';
                if (data.morning === 'open') { currentShiftData.shift='MORNING'; currentShiftData.status='OPEN'; currentShiftData.openTime=data.updated||''; }
                else if (data.evening === 'open') { currentShiftData.shift='EVENING'; currentShiftData.status='OPEN'; currentShiftData.openTime=data.updated||''; }
                else { currentShiftData.shift='NO OPEN SHIFT'; currentShiftData.status='CLOSED'; currentShiftData.openTime=data.updated||''; }
            } else {
                document.getElementById('morningStatus').textContent='🟡 pending'; document.getElementById('morningStatus').className='status pending';
                document.getElementById('eveningStatus').textContent='🟡 pending'; document.getElementById('eveningStatus').className='status pending';
                currentShiftData={date:'',shift:'NO SHIFT DATA',status:'NOT FOUND',openTime:''};
            }
            updateShiftDisplay();
        } catch (error) { console.error('fetch error',error); const info=document.getElementById('shiftInfo'); if(info){ info.classList.remove('loading'); info.classList.add('error'); } }
    }

    function updateButtonStates(data) {
        const oM=document.getElementById('openMorning'), cM=document.getElementById('closeMorning'), oE=document.getElementById('openEvening'), cE=document.getElementById('closeEvening');
        const morn=data.morning||'pending', eve=data.evening||'pending';
        if (morn==='pending') { oM.disabled=false; cM.disabled=true; oE.disabled=true; cE.disabled=true; }
        else if (morn==='open') { oM.disabled=true; cM.disabled=false; oE.disabled=true; cE.disabled=true; }
        else if (morn==='closed') { oM.disabled=true; cM.disabled=true;
            if (eve==='pending') { oE.disabled=false; cE.disabled=true; }
            else if (eve==='open') { oE.disabled=true; cE.disabled=false; }
            else if (eve==='closed') { oE.disabled=true; cE.disabled=true; }
        }
    }

    async function handleShift(shift, action) {
        try {
            const doc = await passengerDb.collection('shifts').doc('currentshift').get();
            const currentData = doc.exists ? doc.data() : {};
            const existingDate = currentData.date;
            const todayStr = new Date().toISOString().split('T')[0];
            if (shift==='morning') {
                if (action==='open' && currentData.morning==='open') { showMessage('morning already open!',true); return; }
                if (action==='close' && currentData.morning!=='open') { showMessage('open morning first!',true); return; }
            }
            if (shift==='evening') {
                if (currentData.morning!=='closed') { showMessage('close morning first!',true); return; }
                if (action==='open' && currentData.evening==='open') { showMessage('evening already open!',true); return; }
                if (action==='close' && currentData.evening!=='open') { showMessage('open evening first!',true); return; }
            }
            const newStatus = action==='open' ? 'open' : 'closed';
            const now = new Date().toLocaleString();
            const updateData = { [shift]: newStatus, updated: now, updatedBy: currentUser.name, updatedByLevel: currentUser.level, updatedByRC: currentUser.rcno };
            if (!existingDate) updateData.date = todayStr; else updateData.date = existingDate;
            await passengerDb.collection('shifts').doc('currentshift').set(updateData, { merge: true });
            showMessage(`✅ ${shift} ${newStatus} by ${currentUser.name}`);
            setTimeout(() => window.location.href = 'dashboard.html', 800);
        } catch (error) { console.error(error); showMessage('Error saving shift', true); }
    }

    async function supervisorReset() {
        if (!currentUser.isSupervisor) { showMessage('⚠️ supervisors only', true); return; }
        if (!confirm('Reset both shifts for new day?')) return;
        const today = new Date().toISOString().split('T')[0];
        const now = new Date().toLocaleString();
        try {
            await passengerDb.collection('shifts').doc('currentshift').set({
                morning:'pending', evening:'pending', date:today, updated:now,
                updatedBy:currentUser.name, updatedByLevel:currentUser.level, updatedByRC:currentUser.rcno,
                resetBy:currentUser.name, resetAt:now
            });
            showMessage('✅ new day started'); await loadTodayData();
        } catch (error) { showMessage('Reset error', true); }
    }

    function checkLogin() { if (!localStorage.getItem('username')) { window.location.href='login.html'; return false; } return true; }

    window.onload = () => {
        if (!checkLogin()) return;
        loadUserFromLogin();
        setTimeout(loadTodayData,200);
        setInterval(loadTodayData,30000);
        document.getElementById('refreshShiftBtn').addEventListener('click', loadTodayData);
    };
</script>
