<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli Lounge · Shift Commander ✦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 30% 40%, #fcf3e0 0%, #f3dbc1 100%);
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* refined golden glow — more ethereal */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255, 215, 140, 0.3) 0%, transparent 60%),
                        radial-gradient(circle at 90% 70%, rgba(230, 170, 70, 0.25) 0%, transparent 70%),
                        radial-gradient(circle at 40% 80%, rgba(255, 235, 170, 0.2) 0%, transparent 60%);
            pointer-events: none;
        }

        /* soft linen texture overlay */
        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(200, 160, 100, 0.02) 0px, rgba(200, 160, 100, 0.02) 2px, transparent 2px, transparent 6px),
                repeating-linear-gradient(135deg, rgba(160, 120, 60, 0.02) 0px, rgba(160, 120, 60, 0.02) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
        }

        /* ===== MAIN CONTAINER — LUXURIOUS, WIDE, ELEGANT ===== */
        .container {
            width: 860px;
            max-width: 96vw;
            background: rgba(255, 250, 242, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 64px;
            padding: 46px 44px;
            box-shadow: 
                0 40px 70px -25px rgba(120, 80, 30, 0.35),
                0 0 0 1px rgba(255, 215, 140, 0.7) inset,
                0 0 0 3px rgba(255, 242, 215, 0.6) inset,
                0 25px 40px -20px rgba(0,0,0,0.1);
            border: 1px solid #ffddb0;
            position: relative;
            z-index: 2;
        }

        /* decorative corner accents */
        .container::before {
            content: '✦';
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 24px;
            color: #e6b800;
            opacity: 0.4;
            transform: rotate(-15deg);
        }
        .container::after {
            content: '✦';
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 32px;
            color: #e6b800;
            opacity: 0.3;
            transform: rotate(20deg);
        }

        .gold-bar {
            height: 10px;
            width: 180px;
            background: linear-gradient(90deg, #e6b800, #f8de9d, #e6b800, #fce6b3, #e6b800);
            border-radius: 20px;
            margin: 0 auto 30px auto;
            border: 1px solid #fff3cf;
            box-shadow: 0 2px 8px #ffd58c;
            animation: softGlow 3s infinite alternate;
        }
        @keyframes softGlow {
            0% { opacity: 0.9; box-shadow: 0 2px 8px #e6b800; }
            100% { opacity: 1; box-shadow: 0 4px 18px #ffb347; }
        }

        /* ===== SHIFT INFO BAR — ELEGANT GLASS ===== */
        .shift-info {
            display: flex;
            gap: 26px;
            align-items: center;
            background: rgba(255, 250, 235, 0.6);
            padding: 16px 32px;
            border-radius: 120px;
            border: 1px solid rgba(230, 184, 0, 0.3);
            box-shadow: 0 12px 28px -12px rgba(150, 110, 30, 0.2), inset 0 1px 4px #fffbe6;
            margin-bottom: 30px;
            justify-content: space-between;
            backdrop-filter: blur(8px);
        }
        
        .shift-info div {
            color: #5a461b;
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        
        .shift-info .date {
            color: #8b6913;
            padding-left: 32px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="%238b6913" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>') left center no-repeat;
            background-size: 22px;
        }
        
        .shift-info .shift {
            color: #5f8230;
            padding-left: 34px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="%235f8230" stroke-width="1.8"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>') left center no-repeat;
            background-size: 22px;
        }
        
        .status-badge {
            background: linear-gradient(145deg, #6b8e23, #4f6d1a);
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            box-shadow: 0 4px 10px #6b8e2360;
            border: 1px solid #fbefa0;
        }
        
        .refresh-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e6b800;
            color: #8b6913;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            box-shadow: 0 6px 16px rgba(184, 134, 11, 0.2);
            backdrop-filter: blur(4px);
        }
        .refresh-btn:hover {
            background: #e6b800;
            color: white;
            transform: rotate(360deg) scale(1.08);
            box-shadow: 0 12px 28px #e6b800cc;
            border-color: white;
        }

        /* ===== USER BADGE — LUXE ===== */
        .user-badge {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 245, 230, 0.6);
            border-radius: 100px;
            padding: 10px 24px 10px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(230, 184, 0, 0.25);
            box-shadow: 0 12px 28px -10px rgba(140, 100, 30, 0.15), inset 0 1px 5px #fffae9;
            backdrop-filter: blur(6px);
            font-weight: 500;
            color: #74592d;
        }

        #userDisplay {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1.15rem;
            flex-wrap: wrap;
        }

        .user-name {
            color: #8b6913;
            font-weight: 600;
            background: #ffffffd9;
            padding: 6px 24px;
            border-radius: 60px;
            border: 1px solid #f8d4a5;
            box-shadow: 0 6px 16px #f8d4a5b3;
            backdrop-filter: blur(2px);
        }

        .user-level {
            font-size: 1rem;
            padding: 6px 22px;
            border-radius: 60px;
            background: #eaf3dc;
            color: #2d6e2d;
            border: 1px solid #b8d9a6;
            font-weight: 600;
            box-shadow: 0 6px 14px #b8d9a680;
        }

        .user-level.supervisor {
            background: #ffefd2;
            color: #b87c1b;
            border-color: #f5cb8b;
        }

        .user-rcno {
            font-size: 0.95rem;
            color: #ad8e4f;
            background: #ffffffb3;
            padding: 4px 20px;
            border-radius: 40px;
            border: 1px dashed #eac476;
        }

        .user-badge button {
            background: #faeacb;
            border: none;
            border-radius: 80px;
            padding: 8px 32px;
            font-size: 1.05rem;
            font-weight: 600;
            box-shadow: 0 10px 22px -8px #b88744, 0 2px 0 #ffe4b5 inset;
            color: #533f1f;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #edc690;
        }
        .user-badge button:hover { background: #fff3dd; transform: scale(1.03); box-shadow: 0 14px 26px -8px #aa6d2e; }
        .user-badge button:active { transform: scale(0.97); }

        /* ===== TOAST MESSAGE ===== */
        #message {
            margin: 20px 0 36px;
            padding: 18px 32px;
            border-radius: 100px;
            text-align: center;
            font-weight: 500;
            display: none;
            border: 1px solid;
            backdrop-filter: blur(8px);
            font-size: 1.1rem;
            animation: slideUp 0.4s ease;
            box-shadow: 0 12px 28px -10px #0000001a;
        }
        .success { background: rgba(231, 250, 210, 0.8); color: #2a622a; border-color: #b8d99e; }
        .error { background: rgba(255, 225, 220, 0.8); color: #a13e3e; border-color: #ffb3aa; }
        @keyframes slideUp { 0% { opacity:0; transform:translateY(15px); } 100% { opacity:1; transform:translateY(0); } }

        /* ===== SHIFT CARDS — DREAMY, SOFT, REFINED ===== */
        .shift {
            background: rgba(255, 245, 225, 0.55);
            border-radius: 54px;
            padding: 36px 38px;
            margin-bottom: 36px;
            border: 1px solid rgba(255, 210, 140, 0.7);
            box-shadow: 0 25px 40px -20px rgba(150, 110, 50, 0.3), 0 6px 0 #fbddb5 inset, 0 -2px 10px rgba(255, 255, 240, 0.6) inset;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        .shift.active-shift {
            border: 2px solid #ffd966;
            box-shadow: 0 25px 45px -18px #ffc107, 0 6px 0 #ffeab3 inset;
            background: rgba(255, 245, 215, 0.65);
        }

        .shift-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .shift-header span {
            font-size: 3.2rem;
            filter: drop-shadow(0 6px 14px rgba(200, 140, 30, 0.3));
            background: rgba(255, 245, 220, 0.9);
            width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 40px;
            border: 1px solid #ffd89c;
            box-shadow: 0 10px 20px -5px #c29a4b;
        }
        .shift-header h3 {
            font-size: 2.4rem;
            font-weight: 600;
            background: linear-gradient(145deg, #7a5f26, #b4873a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            text-shadow: 2px 2px 10px #ffd58c80;
        }

        /* status badges — luminous */
        .status {
            padding: 18px 32px;
            border-radius: 100px;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 34px;
            background: rgba(255, 250, 210, 0.7);
            border: 1px solid #eeddbb;
            box-shadow: 0 12px 28px -10px #cbae7a, inset 0 2px 10px #fffff0;
            color: #4a3a1f;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }
        .status.open {
            background: rgba(225, 245, 210, 0.75);
            border-color: #b8d9a6;
            box-shadow: 0 12px 30px -8px #7fa864, inset 0 2px 12px #ffffff;
            color: #266226;
        }
        .status.closed {
            background: rgba(255, 225, 220, 0.75);
            border-color: #fbbdbd;
            box-shadow: 0 12px 30px -8px #d67777, inset 0 2px 12px #ffffff;
            color: #ac3a3a;
        }
        .status.pending {
            background: rgba(255, 240, 200, 0.75);
            border-color: #f5d797;
            box-shadow: 0 12px 30px -8px #dba959, inset 0 2px 12px #ffffe0;
            color: #7a571f;
        }

        /* ===== BUTTON GROUP — SCULPTED, MODERN, INVITING ===== */
        .btn-group {
            display: flex;
            gap: 28px;
        }

        button {
            flex: 1;
            padding: 20px 16px;
            border: none;
            border-radius: 100px;
            font-size: 1.4rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease-out;
            background: rgba(255, 255, 255, 0.9);
            color: #6b4e2a;
            border: 1px solid #f7cf9a;
            box-shadow: 0 16px 28px -14px #a07d48, 0 4px 0 #fbddb5 inset, 0 -2px 8px #fff8e7 inset;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            transform: translateY(0);
        }
        button:hover:not(:disabled) {
            transform: translateY(-6px);
            box-shadow: 0 28px 40px -16px #b68841, 0 4px 0 #ffd89c inset;
            background: white;
        }
        button:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 10px 22px -10px #9e7a45, 0 1px 0 #fbddb5 inset;
        }
        button:disabled {
            opacity: 0.4;
            background: #f0e0ce;
            border-color: #cfa97a;
            color: #7b623e;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        .btn-open {
            background: linear-gradient(145deg, #f0fce4, #fafff0);
            border-color: #b8d9a6;
            color: #2b6e2b;
            box-shadow: 0 16px 28px -14px #5f8245, 0 4px 0 #c0e0a8 inset;
        }
        .btn-open:hover:not(:disabled) { background: #f8ffee; }

        .btn-close {
            background: linear-gradient(145deg, #fff1ea, #fffaf5);
            border-color: #fbb5b5;
            color: #b13e3e;
            box-shadow: 0 16px 28px -14px #c06969, 0 4px 0 #ffcec0 inset;
        }
        .btn-close:hover:not(:disabled) { background: #fff9f5; }

        /* action row — pill buttons with icons */
        .action-row {
            display: flex;
            gap: 26px;
            margin-top: 28px;
        }
        .action-row button {
            flex: 1;
            padding: 20px 16px;
            background: rgba(255, 245, 215, 0.8);
            border: 1px solid #fad19e;
            box-shadow: 0 20px 32px -18px #b87e3d, 0 4px 0 #fcd2a5 inset;
            font-size: 1.4rem;
            gap: 12px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .action-row button:hover:not(:disabled) {
            background: #fff6e3;
            transform: translateY(-6px);
            box-shadow: 0 32px 44px -20px #a56928;
        }

        /* reset button — supervisor, elegant */
        .reset-btn {
            width: 100%;
            margin-top: 28px;
            padding: 20px;
            background: linear-gradient(145deg, #fbebd1, #fae3c0);
            border-color: #f5c58c;
            box-shadow: 0 20px 32px -18px #a97134, 0 4px 0 #fcd2a5 inset;
            font-size: 1.4rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .reset-btn:hover:not(:disabled) {
            background: #fff2de;
            transform: translateY(-6px);
            box-shadow: 0 34px 44px -20px #9b621f;
        }

        .last-updated {
            font-size: 0.9rem;
            color: #ad8e4f;
            text-align: center;
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px dashed #eac476;
            font-style: italic;
        }

        /* scrollbar luxury */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f5e7d3; border-radius: 20px; }
        ::-webkit-scrollbar-thumb { background: #e6b800; border-radius: 20px; border: 2px solid #faebc8; }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="fireshift.js"></script>
</head>
<body>
<div class="container">
    <div class="gold-bar"></div>

    <div class="shift-info" id="shiftInfo">
        <div class="date">DATE: <span id="currentDate">Loading...</span></div>
        <div class="shift">SHIFT: <span id="currentShift">Loading...</span> <span id="shiftStatus" class="status-badge"></span></div>
        <button id="refreshShiftBtn" class="refresh-btn">↻</button>
    </div>

    <div class="user-badge" id="userBadge">
        <div id="userDisplay">
            <span class="user-name" id="userNameDisplay">👤 loading...</span>
            <span class="user-level" id="userLevelDisplay">operator</span>
            <span class="user-rcno" id="userRcnoDisplay"></span>
        </div>
        <button id="logoutBtn" onclick="logout()">logout</button>
    </div>

    <div id="message"></div>

    <!-- Morning shift -->
    <div class="shift" id="morningShift">
        <div class="shift-header"><span>🌅</span><h3>morning shift</h3></div>
        <div class="status" id="morningStatus">pending</div>
        <div class="btn-group">
            <button class="btn-open" id="openMorning" onclick="handleShift('morning', 'open')">open</button>
            <button class="btn-close" id="closeMorning" onclick="handleShift('morning', 'close')">close</button>
        </div>
    </div>

    <!-- Evening shift -->
    <div class="shift" id="eveningShift">
        <div class="shift-header"><span>🌆</span><h3>evening shift</h3></div>
        <div class="status" id="eveningStatus">pending</div>
        <div class="btn-group">
            <button class="btn-open" id="openEvening" onclick="handleShift('evening', 'open')">open</button>
            <button class="btn-close" id="closeEvening" onclick="handleShift('evening', 'close')">close</button>
        </div>
    </div>

    <!-- Action row: refresh + dashboard -->
    <div class="action-row">
        <button onclick="loadTodayData()"><span>⟳</span> refresh</button>
        <button id="dashboardBtn" onclick="goToDashboard()"><span>📋</span> dashboard</button>
    </div>

    <!-- Reset (supervisor only) -->
    <button class="reset-btn" id="resetBtn" onclick="supervisorReset()"><span>✨</span> new day reset</button>

    <div class="last-updated" id="lastUpdated">last updated: —</div>
</div>

<script>
    // ========== USER & SHIFT LOGIC (unchanged, but enhanced presentation) ==========
    let currentUser = { name: 'operator', level: 'operator', rcno: '', isSupervisor: false };
    let currentShiftData = { date: '', shift: '', status: '', openTime: '' };

    function loadUserFromLogin() {
        try {
            const username = localStorage.getItem('username');
            const level = localStorage.getItem('level');
            const rcno = localStorage.getItem('rcno');
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                try {
                    const parsed = JSON.parse(loggedInUser);
                    currentUser.name = parsed.username || parsed.name || username || 'operator';
                    currentUser.level = parsed.level || level || 'operator';
                    currentUser.rcno = parsed.rcno || rcno || '';
                } catch (e) {}
            }
            if (username) currentUser.name = username;
            if (level) currentUser.level = level;
            if (rcno) currentUser.rcno = rcno;
            const levelStr = (currentUser.level || '').toString().toUpperCase();
            currentUser.isSupervisor = levelStr === 'SUPERVISOR' || levelStr === 'ADMIN' || levelStr === 'MANAGER';
            if (!currentUser.name) currentUser.name = 'operator';
            if (!currentUser.level) currentUser.level = 'operator';
            if (!currentUser.rcno) currentUser.rcno = 'N/A';
        } catch (error) {
            currentUser = { name: 'operator', level: 'operator', rcno: 'N/A', isSupervisor: false };
        }
        updateUserDisplay();
    }

    function updateUserDisplay() {
        const userNameSpan = document.getElementById('userNameDisplay');
        const userLevelSpan = document.getElementById('userLevelDisplay');
        const userRcnoSpan = document.getElementById('userRcnoDisplay');
        const resetBtn = document.getElementById('resetBtn');
        if (userNameSpan) userNameSpan.innerHTML = `👤 ${currentUser.name}`;
        if (userLevelSpan) {
            userLevelSpan.textContent = currentUser.level;
            if (currentUser.isSupervisor) userLevelSpan.classList.add('supervisor');
            else userLevelSpan.classList.remove('supervisor');
        }
        if (userRcnoSpan) userRcnoSpan.textContent = `RC: ${currentUser.rcno}`;
        if (resetBtn) {
            resetBtn.disabled = !currentUser.isSupervisor;
            resetBtn.title = currentUser.isSupervisor ? 'Reset both shifts' : 'Supervisor only';
        }
    }

    window.logout = function() {
        localStorage.removeItem('username'); localStorage.removeItem('level'); localStorage.removeItem('rcno'); localStorage.removeItem('loggedInUser');
        showMessage('logging out...', false);
        setTimeout(() => window.location.href = 'login.html', 1000);
    };
    window.goToDashboard = function() { window.location.href = 'dashboard.html'; };

    function formatDateForDisplay(dateStr) {
        if (!dateStr) return 'NO DATE';
        try { if (dateStr.includes('-')) { const [y,m,d]=dateStr.split('-'); return `${d}/${m}/${y}`; } return dateStr; } catch { return dateStr; }
    }
    function showMessage(text, isError = false) {
        const msg = document.getElementById('message');
        msg.style.display = 'block'; msg.textContent = text; msg.className = isError ? 'error' : 'success';
        setTimeout(() => msg.style.display = 'none', 3000);
    }
    function updateShiftDisplay() {
        const dateEl = document.getElementById('currentDate'), shiftEl = document.getElementById('currentShift'), badge = document.getElementById('shiftStatus'), info = document.getElementById('shiftInfo');
        const morningShift = document.getElementById('morningShift'), eveningShift = document.getElementById('eveningShift');
        if (!dateEl || !shiftEl || !badge) return;
        dateEl.textContent = currentShiftData.date ? formatDateForDisplay(currentShiftData.date) : 'NO DATE';
        morningShift.classList.remove('active-shift'); eveningShift.classList.remove('active-shift');
        if (currentShiftData.shift === 'MORNING') { shiftEl.textContent = 'MORNING'; badge.textContent = currentShiftData.status; badge.style.backgroundColor = '#6b8e23'; morningShift.classList.add('active-shift'); }
        else if (currentShiftData.shift === 'EVENING') { shiftEl.textContent = 'EVENING'; badge.textContent = currentShiftData.status; badge.style.backgroundColor = '#6b8e23'; eveningShift.classList.add('active-shift'); }
        else { shiftEl.textContent = currentShiftData.shift || '--'; badge.textContent = currentShiftData.status || '--'; badge.style.backgroundColor = '#c68b5e'; }
        info.classList.remove('loading','error');
        document.getElementById('lastUpdated').textContent = currentShiftData.openTime ? `last updated: ${currentShiftData.openTime}` : 'last updated: —';
    }

    async function loadTodayData() {
        try {
            const info = document.getElementById('shiftInfo'), dateEl = document.getElementById('currentDate'), shiftEl = document.getElementById('currentShift'), badge = document.getElementById('shiftStatus');
            if (!info || !dateEl || !shiftEl || !badge) return;
            dateEl.textContent = 'Loading...'; shiftEl.textContent = 'Loading...'; info.classList.add('loading');
            if (typeof passengerDb === 'undefined') { dateEl.textContent = 'DB ERROR'; shiftEl.textContent = 'NOT INIT'; info.classList.remove('loading'); info.classList.add('error'); return; }
            let shiftDoc = null;
            try { shiftDoc = await passengerDb.collection('shifts').doc('currentshift').get(); } catch (e) { console.log(e); }
            if (shiftDoc && shiftDoc.exists) {
                const data = shiftDoc.data();
                const mornStat = document.getElementById('morningStatus');
                if (mornStat) { const m = data.morning||'pending'; mornStat.textContent = m==='open'?'🟢 shift open': m==='closed'?'🔴 shift closed':'🟡 pending'; mornStat.className = `status ${m}`; }
                const eveStat = document.getElementById('eveningStatus');
                if (eveStat) { const e = data.evening||'pending'; eveStat.textContent = e==='open'?'🟢 shift open': e==='closed'?'🔴 shift closed':'🟡 pending'; eveStat.className = `status ${e}`; }
                updateButtonStates(data);
                currentShiftData.date = data.date||'';
                if (data.morning === 'open') { currentShiftData.shift='MORNING'; currentShiftData.status='OPEN'; currentShiftData.openTime=data.updated||''; }
                else if (data.evening === 'open') { currentShiftData.shift='EVENING'; currentShiftData.status='OPEN'; currentShiftData.openTime=data.updated||''; }
                else { currentShiftData.shift='NO OPEN SHIFT'; currentShiftData.status='CLOSED'; currentShiftData.openTime=data.updated||''; }
            } else {
                document.getElementById('morningStatus').textContent='🟡 pending'; document.getElementById('morningStatus').className='status pending';
                document.getElementById('eveningStatus').textContent='🟡 pending'; document.getElementById('eveningStatus').className='status pending';
                currentShiftData={date:'',shift:'NO SHIFT DATA',status:'NOT FOUND',openTime:''};
            }
            updateShiftDisplay();
        } catch (error) { console.error('fetch error',error); const info=document.getElementById('shiftInfo'); if(info){ info.classList.remove('loading'); info.classList.add('error'); } }
    }

    function updateButtonStates(data) {
        const oM=document.getElementById('openMorning'), cM=document.getElementById('closeMorning'), oE=document.getElementById('openEvening'), cE=document.getElementById('closeEvening');
        const morn=data.morning||'pending', eve=data.evening||'pending';
        if (morn==='pending') { oM.disabled=false; cM.disabled=true; oE.disabled=true; cE.disabled=true; }
        else if (morn==='open') { oM.disabled=true; cM.disabled=false; oE.disabled=true; cE.disabled=true; }
        else if (morn==='closed') { oM.disabled=true; cM.disabled=true;
            if (eve==='pending') { oE.disabled=false; cE.disabled=true; }
            else if (eve==='open') { oE.disabled=true; cE.disabled=false; }
            else if (eve==='closed') { oE.disabled=true; cE.disabled=true; }
        }
    }

    async function handleShift(shift, action) {
        try {
            const doc = await passengerDb.collection('shifts').doc('currentshift').get();
            const currentData = doc.exists ? doc.data() : {};
            const existingDate = currentData.date;
            const todayStr = new Date().toISOString().split('T')[0];
            if (shift==='morning') {
                if (action==='open' && currentData.morning==='open') { showMessage('morning already open!',true); return; }
                if (action==='close' && currentData.morning!=='open') { showMessage('open morning first!',true); return; }
            }
            if (shift==='evening') {
                if (currentData.morning!=='closed') { showMessage('close morning first!',true); return; }
                if (action==='open' && currentData.evening==='open') { showMessage('evening already open!',true); return; }
                if (action==='close' && currentData.evening!=='open') { showMessage('open evening first!',true); return; }
            }
            const newStatus = action==='open' ? 'open' : 'closed';
            const now = new Date().toLocaleString();
            const updateData = { [shift]: newStatus, updated: now, updatedBy: currentUser.name, updatedByLevel: currentUser.level, updatedByRC: currentUser.rcno };
            if (!existingDate) updateData.date = todayStr; else updateData.date = existingDate;
            await passengerDb.collection('shifts').doc('currentshift').set(updateData, { merge: true });
            showMessage(`✅ ${shift} ${newStatus} by ${currentUser.name}`);
            setTimeout(() => window.location.href = 'dashboard.html', 800);
        } catch (error) { console.error(error); showMessage('Error saving shift', true); }
    }

    async function supervisorReset() {
        if (!currentUser.isSupervisor) { showMessage('⚠️ supervisors only', true); return; }
        if (!confirm('Reset both shifts for new day?')) return;
        const today = new Date().toISOString().split('T')[0];
        const now = new Date().toLocaleString();
        try {
            await passengerDb.collection('shifts').doc('currentshift').set({
                morning:'pending', evening:'pending', date:today, updated:now,
                updatedBy:currentUser.name, updatedByLevel:currentUser.level, updatedByRC:currentUser.rcno,
                resetBy:currentUser.name, resetAt:now
            });
            showMessage('✅ new day started'); await loadTodayData();
        } catch (error) { showMessage('Reset error', true); }
    }

    function checkLogin() { if (!localStorage.getItem('username')) { window.location.href='login.html'; return false; } return true; }

    window.onload = () => {
        if (!checkLogin()) return;
        loadUserFromLogin();
        setTimeout(loadTodayData,200);
        setInterval(loadTodayData,30000);
        document.getElementById('refreshShiftBtn').addEventListener('click', loadTodayData);
    };
</script>
</body>
