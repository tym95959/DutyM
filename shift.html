<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koveli Lounge · Apex Shift</title>
    <!-- ===== MODERN GEOMETRIC + WARM MINIMALISM (same golden palette, completely fresh architecture) ===== -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8efe2;  /* warm base */
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* abstract golden shapes — new visual identity */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(230, 180, 70, 0.12) 0%, transparent 30%),
                radial-gradient(circle at 95% 75%, rgba(200, 150, 40, 0.1) 0%, transparent 40%),
                linear-gradient(125deg, rgba(255, 215, 120, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        /* subtle diagonal grid */
        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(160, 120, 60, 0.02) 0px, rgba(160, 120, 60, 0.02) 2px, transparent 2px, transparent 12px);
            pointer-events: none;
        }

        /* ===== CONTAINER — BOLD, CLEAN, ARCHITECTURAL ===== */
        .container {
            width: 1000px;
            max-width: 96vw;
            background: #ffffffd6;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px 45px;
            box-shadow: 
                0 40px 70px -30px #7a5f3a,
                0 0 0 1px rgba(230, 184, 0, 0.25) inset,
                0 10px 30px -15px #0000001a;
            border: 1px solid #ffddbb;
            position: relative;
            z-index: 5;
        }

        /* header brand new */
        .brand-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo span {
            font-size: 32px;
            background: #e6b80020;
            width: 54px; height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: #b37b2e;
            border: 1px solid #e6b80060;
        }
        .brand-logo h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #4f3e22;
        }
        .brand-logo h1 strong {
            font-weight: 700;
            background: linear-gradient(145deg, #ac8026, #7b5e29);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .date-chip {
            background: #f3e9d9;
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            color: #7b622e;
            border: 1px solid #e6b800;
            box-shadow: 0 4px 12px #e6b80030;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .date-chip:hover {
            background: #f0e2cc;
            box-shadow: 0 6px 14px #e6b80050;
        }
        .date-chip.supervisor {
            border: 2px solid #b8860b;
            background: #f5e5cc;
        }

        /* ===== USER PANEL — COMPLETELY RESTYLED ===== */
        .user-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f7f1e4;
            border-radius: 80px;
            padding: 6px 6px 6px 22px;
            margin-bottom: 40px;
            border: 1px solid #efdbb0;
            box-shadow: 0 8px 18px -10px #bb9a60;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .user-name {
            background: white;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 600;
            color: #8b6913;
            box-shadow: inset 0 2px 6px #fde9cc;
            border: 1px solid #f7cf9a;
        }
        .user-level {
            background: #e6f0da;
            padding: 6px 20px;
            border-radius: 60px;
            color: #2d6e2d;
            font-weight: 600;
            border: 1px solid #c0daa6;
        }
        .user-level.supervisor { background: #ffefd2; color: #b87c1b; border-color: #f5cb8b; }
        .user-rcno {
            background: #ffffffb3;
            border: 1px dashed #cfa668;
            padding: 6px 18px;
            border-radius: 60px;
            color: #8f6f3a;
        }
        .logout-btn {
            background: #eddbc0;
            border: none;
            border-radius: 60px;
            padding: 12px 32px;
            font-weight: 600;
            color: #5e451f;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #dbb78b;
            box-shadow: 0 6px 0 #b78f5b;
        }
        .logout-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b78f5b; }

        /* ===== SHIFT CARDS — MINIMAL, ELEGANT, NEW ===== */
        .shift-grid {
            display: flex;
            gap: 28px;
            margin-bottom: 30px;
        }
        .shift-card {
            flex: 1;
            background: #fcf6eb;
            border-radius: 32px;
            padding: 30px 28px;
            border: 1px solid #fad6a8;
            box-shadow: 0 20px 30px -20px #ac8b57, 0 -2px 0 #ffffff inset, 0 4px 0 #f5dbb5 inset;
            transition: 0.25s ease;
        }
        .shift-card.active {
            border: 2px solid #e6b800;
            box-shadow: 0 25px 35px -20px #b68d40, 0 -2px 0 #fff9e6 inset;
            background: #fff8eb;
        }
        .shift-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .shift-header .icon {
            font-size: 42px;
            background: #fff1db;
            width: 70px; height: 70px;
            display: flex;
            align-items: center; justify-content: center;
            border-radius: 30px;
            border: 1px solid #f8cf9c;
            box-shadow: 0 10px 16px -12px #bb8b4c;
        }
        .shift-header h2 {
            font-size: 28px;
            font-weight: 500;
            color: #6b4e2a;
        }
        .shift-header h2 strong { font-weight: 700; color: #8b6913; }

        /* status — clean badge */
        .shift-status {
            font-size: 18px;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            margin-bottom: 28px;
            background: #f5ebd7;
            border: 1px solid #eed6b0;
            color: #604e28;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset 0 3px 8px #fff1da;
        }
        .shift-status.open { background: #e6f2da; color: #2d702d; border-color: #b1d18b; }
        .shift-status.closed { background: #ffe1dc; color: #b64545; border-color: #f7b2a8; }
        .shift-status.pending { background: #fcefd2; color: #9e721d; border-color: #efcb8b; }

        /* button group — fresh geometric */
        .action-group {
            display: flex;
            gap: 18px;
        }
        .action-group button {
            flex: 1;
            padding: 16px 10px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid;
            background: white;
            box-shadow: 0 8px 0 #bfa27b, 0 10px 20px -10px #7d613b;
        }
        .action-group button:active { transform: translateY(5px); box-shadow: 0 3px 0 #bfa27b; }
        .btn-open { background: #f2fbe9; border-color: #b8d9a6; color: #2b6e2b; }
        .btn-close { background: #ffeee8; border-color: #fbb5b5; color: #b13e3e; }
        .action-group button:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #bfa27b;
            cursor: not-allowed;
        }

        /* bottom bar — new */
        .bottom-dock {
            display: flex;
            gap: 20px;
            margin-top: 28px;
            align-items: center;
            flex-wrap: wrap;
        }
        .refresh-large {
            flex: 2;
            padding: 18px;
            background: #ede0ce;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            color: #6b4e2a;
            cursor: pointer;
            border: 1px solid #f7cf9a;
            box-shadow: 0 8px 0 #b9915f, 0 10px 20px -8px #a5713a;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .dashboard-btn {
            flex: 3;
            padding: 18px;
            background: #f7e9d2;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            color: #7b592b;
            cursor: pointer;
            border: 1px solid #fad19e;
            box-shadow: 0 8px 0 #cb9f62, 0 10px 20px -8px #a5713a;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .reset-btn {
            flex: 1;
            min-width: 120px;
            padding: 18px;
            background: #fbe7c4;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            color: #7b4f1f;
            cursor: pointer;
            border: 1px solid #f5c58c;
            box-shadow: 0 8px 0 #b88744, 0 10px 20px -8px #8b621f;
            display: flex; align-items: center; justify-content: center;
            transition: 0.15s;
        }
        .reset-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #b88744; }

        /* message — sleek */
        #message {
            margin: 20px 0 0;
            padding: 16px 28px;
            border-radius: 70px;
            text-align: center;
            font-weight: 500;
            display: none;
            border: 1px solid;
            font-size: 1rem;
            animation: fadeSlide 0.3s;
        }
        @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .success { background: #e1f3d3; color: #2d6e2d; border-color: #b1d18b; }
        .error { background: #ffe4df; color: #ac3a3a; border-color: #fbb5b5; }

        .footer-note {
            text-align: right;
            margin-top: 22px;
            font-size: 14px;
            color: #ad8e4f;
            font-style: italic;
            border-top: 1px dashed #eac476;
            padding-top: 14px;
        }

        /* Date picker modal */
        .date-picker-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .date-picker-content {
            background: #fff8eb;
            border-radius: 40px;
            padding: 30px;
            border: 2px solid #e6b800;
            box-shadow: 0 30px 50px -20px #7a5f3a;
            max-width: 400px;
            width: 90%;
        }
        .date-picker-content h3 {
            color: #7b5e2b;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .date-picker-content input {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: 2px solid #e6b800;
            font-size: 18px;
            margin-bottom: 20px;
            background: white;
        }
        .date-picker-actions {
            display: flex;
            gap: 15px;
        }
        .date-picker-actions button {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 16px;
        }
        .btn-confirm {
            background: #e6b800;
            color: #4f3e22;
            box-shadow: 0 5px 0 #b38600;
        }
        .btn-cancel {
            background: #eddbc0;
            color: #5e451f;
            box-shadow: 0 5px 0 #b78f5b;
        }
        .btn-confirm:active, .btn-cancel:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="fireshift.js"></script>
</head>
<body>
<div class="container">
    <!-- brand new header -->
    <div class="brand-head">
        <div class="brand-logo">
            <span>✦</span>
            <h1><strong>Koveli</strong> Lounge · apex</h1>
        </div>
        <div class="date-chip" id="liveDateChip" onclick="openDatePicker()">
            <span>📅</span> <span id="currentDateHeader">loading...</span>
            <span id="supervisorEditIcon" style="display: none;"> ✎</span>
        </div>
    </div>

    <!-- user panel (new) -->
    <div class="user-panel">
        <div class="user-badge">
            <span class="user-name" id="userNameDisplay">👤 operator</span>
            <span class="user-level" id="userLevelDisplay">operator</span>
            <span class="user-rcno" id="userRcnoDisplay">RC: ---</span>
        </div>
        <button class="logout-btn" onclick="logout()">sign out</button>
    </div>

    <!-- message area -->
    <div id="message"></div>

    <!-- shift cards in grid (fresh layout) -->
    <div class="shift-grid">
        <!-- morning card -->
        <div class="shift-card" id="morningCard">
            <div class="shift-header">
                <span class="icon">🌅</span>
                <h2><strong>morning</strong> shift</h2>
            </div>
            <div class="shift-status" id="morningStatusDisplay">pending</div>
            <div class="action-group">
                <button class="btn-open" id="openMorningBtn" onclick="handleShift('morning', 'open')">open</button>
                <button class="btn-close" id="closeMorningBtn" onclick="handleShift('morning', 'close')">close</button>
            </div>
        </div>

        <!-- evening card -->
        <div class="shift-card" id="eveningCard">
            <div class="shift-header">
                <span class="icon">🌆</span>
                <h2><strong>evening</strong> shift</h2>
            </div>
            <div class="shift-status" id="eveningStatusDisplay">pending</div>
            <div class="action-group">
                <button class="btn-open" id="openEveningBtn" onclick="handleShift('evening', 'open')">open</button>
                <button class="btn-close" id="closeEveningBtn" onclick="handleShift('evening', 'close')">close</button>
            </div>
        </div>
    </div>

    <!-- bottom dock with new buttons + dashboard -->
    <div class="bottom-dock">
        <button class="refresh-large" onclick="loadTodayData()"><span>⟳</span> refresh status</button>
        <button class="dashboard-btn" onclick="goToDashboard()"><span>📋</span> back to dashboard</button>
        <button class="reset-btn" onclick="resetShifts()"><span>✨</span> reset day</button>
    </div>

    <div class="footer-note" id="lastUpdatedInfo">synced: —</div>
</div>

<!-- Date Picker Modal (hidden by default) -->
<div id="datePickerModal" class="date-picker-modal" style="display: none;">
    <div class="date-picker-content">
        <h3>📅 Set Shift Date</h3>
        <input type="date" id="datePickerInput">
        <div class="date-picker-actions">
            <button class="btn-confirm" onclick="confirmDateChange()">Confirm</button>
            <button class="btn-cancel" onclick="closeDatePicker()">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ===== fresh new logic (same core, adapted to new IDs) =====
    let currentUser = { name: 'operator', level: 'operator', rcno: '', isSupervisor: false };
    let currentShiftData = { date: '', shift: '', status: '', openTime: '' };
    let currentFirebaseData = {}; // Store the full Firebase data

    // Helper function to get today's date in YYYY-MM-DD format using system date
    function getSystemDateString() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // Format date for display (DD/MM/YYYY)
    function formatDateForDisplay(dateStr) {
        if (!dateStr) return 'no date';
        try { 
            if (dateStr.includes('-')) { 
                const [y, m, d] = dateStr.split('-'); 
                return `${d}/${m}/${y}`; 
            } 
            return dateStr; 
        } catch { 
            return dateStr; 
        }
    }

    function loadUserFromLogin() {
        try {
            const username = localStorage.getItem('username');
            const level = localStorage.getItem('level');
            const rcno = localStorage.getItem('rcno');
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                try {
                    const parsed = JSON.parse(loggedInUser);
                    currentUser.name = parsed.username || parsed.name || username || 'operator';
                    currentUser.level = parsed.level || level || 'operator';
                    currentUser.rcno = parsed.rcno || rcno || '';
                } catch (e) {}
            }
            if (username) currentUser.name = username;
            if (level) currentUser.level = level;
            if (rcno) currentUser.rcno = rcno;
            const levelStr = (currentUser.level || '').toString().toUpperCase();
            currentUser.isSupervisor = levelStr === 'SUPERVISOR' || levelStr === 'ADMIN' || levelStr === 'MANAGER';
            if (!currentUser.name) currentUser.name = 'operator';
            if (!currentUser.level) currentUser.level = 'operator';
            if (!currentUser.rcno) currentUser.rcno = 'N/A';
        } catch (error) {
            currentUser = { name: 'operator', level: 'operator', rcno: 'N/A', isSupervisor: false };
        }
        updateUserDisplay();
    }

    function updateUserDisplay() {
        document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.name}`;
        const levelSpan = document.getElementById('userLevelDisplay');
        levelSpan.textContent = currentUser.level;
        if (currentUser.isSupervisor) {
            levelSpan.classList.add('supervisor');
            document.getElementById('supervisorEditIcon').style.display = 'inline';
            document.getElementById('liveDateChip').classList.add('supervisor');
        } else {
            levelSpan.classList.remove('supervisor');
            document.getElementById('supervisorEditIcon').style.display = 'none';
            document.getElementById('liveDateChip').classList.remove('supervisor');
        }
        document.getElementById('userRcnoDisplay').textContent = `RC: ${currentUser.rcno}`;
    }

    window.logout = function() {
        localStorage.removeItem('username'); localStorage.removeItem('level'); localStorage.removeItem('rcno'); localStorage.removeItem('loggedInUser');
        showMessage('signing out...', false);
        setTimeout(() => window.location.href = 'login.html', 1000);
    };
    window.goToDashboard = function() { window.location.href = 'dashboard.html'; };

    function showMessage(text, isError = false) {
        const msg = document.getElementById('message');
        msg.style.display = 'block'; msg.textContent = text; msg.className = isError ? 'error' : 'success';
        setTimeout(() => msg.style.display = 'none', 3000);
    }

    function updateShiftUI(data) {
        // morning
        const mornDiv = document.getElementById('morningStatusDisplay');
        const eveDiv = document.getElementById('eveningStatusDisplay');
        const morningCard = document.getElementById('morningCard');
        const eveningCard = document.getElementById('eveningCard');
        if (!data) return;

        const m = data.morning || 'pending';
        const e = data.evening || 'pending';

        mornDiv.textContent = m === 'open' ? '🟢 shift open' : m === 'closed' ? '🔴 shift closed' : '🟡 pending';
        mornDiv.className = `shift-status ${m}`;
        eveDiv.textContent = e === 'open' ? '🟢 shift open' : e === 'closed' ? '🔴 shift closed' : '🟡 pending';
        eveDiv.className = `shift-status ${e}`;

        // active highlight
        morningCard.classList.remove('active');
        eveningCard.classList.remove('active');
        if (m === 'open') morningCard.classList.add('active');
        if (e === 'open') eveningCard.classList.add('active');

        // button states
        document.getElementById('openMorningBtn').disabled = !(m === 'pending');
        document.getElementById('closeMorningBtn').disabled = !(m === 'open');
        document.getElementById('openEveningBtn').disabled = !(m === 'closed' && e === 'pending');
        document.getElementById('closeEveningBtn').disabled = !(e === 'open');

        // SHOW THE CURRENT SHIFT DATE FROM FIREBASE (not system date)
        const shiftDate = data.date || getSystemDateString();
        document.getElementById('currentDateHeader').innerText = formatDateForDisplay(shiftDate);

        // last updated
        if (data.updated) document.getElementById('lastUpdatedInfo').innerText = `synced: ${data.updated}`;
        else document.getElementById('lastUpdatedInfo').innerText = 'synced: —';
    }

    async function loadTodayData() {
        try {
            if (typeof passengerDb === 'undefined') { showMessage('firebase not ready', true); return; }
            const shiftDoc = await passengerDb.collection('shifts').doc('currentshift').get();
            
            if (shiftDoc.exists) {
                const data = shiftDoc.data();
                currentFirebaseData = data; // Store for reference
                
                // Store the Firebase date
                currentShiftData = { 
                    date: data.date, // Keep for reference
                    shift: data.morning==='open'?'MORNING':data.evening==='open'?'EVENING':'none', 
                    status: data.morning==='open'?'OPEN':data.evening==='open'?'OPEN':'CLOSED', 
                    openTime: data.updated 
                };
                
                // Update UI with shift data and show the Firebase date
                updateShiftUI(data);
            } else {
                // fallback empty with system date
                currentFirebaseData = {};
                updateShiftUI({ 
                    morning:'pending', 
                    evening:'pending',
                    date: getSystemDateString()
                });
            }
        } catch (error) { 
            console.error(error); 
            showMessage('error loading', true); 
        }
    }

    // ===== ENHANCED HANDLE SHIFT WITH AUTO RESET ON DATE MISMATCH =====
    async function handleShift(shift, action) {
        try {
            const doc = await passengerDb.collection('shifts').doc('currentshift').get();
            const currentData = doc.exists ? doc.data() : {};
            const existingDate = currentData.date;
            
            // Use the shift date from Firebase for comparison, not system date
            const shiftDate = existingDate || getSystemDateString();

            // validations
            if (shift === 'morning') {
                if (action === 'open' && currentData.morning === 'open') { showMessage('morning already open!', true); return; }
                if (action === 'close' && currentData.morning !== 'open') { showMessage('open morning first!', true); return; }
            }
            if (shift === 'evening') {
                if (currentData.morning !== 'closed') { showMessage('close morning first!', true); return; }
                if (action === 'open' && currentData.evening === 'open') { showMessage('evening already open!', true); return; }
                if (action === 'close' && currentData.evening !== 'open') { showMessage('open evening first!', true); return; }
            }

            const newStatus = action === 'open' ? 'open' : 'closed';
            const now = new Date().toLocaleString();
            const updateData = {
                [shift]: newStatus,
                updated: now,
                updatedBy: currentUser.name,
                updatedByLevel: currentUser.level,
                updatedByRC: currentUser.rcno
            };
            
            // Preserve the existing date
            if (existingDate) {
                updateData.date = existingDate;
            } else {
                updateData.date = getSystemDateString();
            }

            await passengerDb.collection('shifts').doc('currentshift').set(updateData, { merge: true });
            
            // ===== REDIRECT LOGIC - ONLY FOR OPEN ACTIONS =====
            if (action === 'open') {
                showMessage(`✓ ${shift} ${newStatus} · redirecting to dashboard...`);
                setTimeout(() => window.location.href = 'dashboard.html', 900);
            } else {
                // For close actions, just show success message and refresh
                showMessage(`✓ ${shift} ${newStatus}`);
                await loadTodayData(); // Refresh the current page data
            }
        } catch (error) { 
            console.error(error); 
            showMessage('error', true); 
        }
    }

    // ===== ENHANCED RESET FUNCTION =====
    async function resetShifts() {
        try {
            // Check current shift status
            const doc = await passengerDb.collection('shifts').doc('currentshift').get();
            const currentData = doc.exists ? doc.data() : {};
            
            const morningOpen = currentData.morning === 'open';
            const eveningOpen = currentData.evening === 'open';
            
            // If any shift is open, ask to close first
            if (morningOpen || eveningOpen) {
                let message = '⚠️ Cannot reset while shifts are open!\n\n';
                if (morningOpen) message += '• Morning shift is OPEN\n';
                if (eveningOpen) message += '• Evening shift is OPEN\n\n';
                message += 'Please close all open shifts before resetting.';
                
                alert(message);
                return;
            }
            
            // Determine target date based on user role
            let targetDate;
            let resetMessage;
            
            if (currentUser.isSupervisor) {
                // For supervisors: use the current shift date (preserve whatever date is set)
                targetDate = currentData.date || getSystemDateString();
                resetMessage = `Reset shifts while keeping date: ${formatDateForDisplay(targetDate)}`;
            } else {
                // For non-supervisors: always reset to system date
                targetDate = getSystemDateString();
                resetMessage = `Reset to current system date: ${formatDateForDisplay(targetDate)}`;
            }
            
            if (!confirm(`⚠️ Reset shifts?\n\n${resetMessage}\n\nThis will set both shifts to pending.`)) return;
            
            const now = new Date().toLocaleString();
            const resetData = {
                morning: 'pending', 
                evening: 'pending', 
                date: targetDate,
                updated: now,
                updatedBy: currentUser.name, 
                updatedByLevel: currentUser.level, 
                updatedByRC: currentUser.rcno,
                resetBy: currentUser.name, 
                resetAt: now,
                resetReason: currentUser.isSupervisor ? 'supervisor_reset_keep_date' : 'user_reset_to_system_date'
            };
            
            // Add date change tracking if supervisor and date changed
            if (currentUser.isSupervisor && currentData.date && currentData.date !== targetDate) {
                resetData.previousDate = currentData.date;
                resetData.dateChangedBy = currentUser.name;
                resetData.dateChangedAt = now;
            }
            
            await passengerDb.collection('shifts').doc('currentshift').set(resetData, { merge: true });
            showMessage(`✅ Shifts reset. Date: ${formatDateForDisplay(targetDate)}`); 
            await loadTodayData();
        } catch (error) { 
            console.error(error);
            showMessage('reset error', true); 
        }
    }

    // ===== SUPERVISOR DATE OVERRIDE FUNCTIONS =====
    function openDatePicker() {
        if (!currentUser.isSupervisor) {
            showMessage('Only supervisors can change the date', true);
            return;
        }
        
        // Get current date from Firebase or use system date
        const currentDate = currentFirebaseData.date || getSystemDateString();
        document.getElementById('datePickerInput').value = currentDate;
        document.getElementById('datePickerModal').style.display = 'flex';
    }

    function closeDatePicker() {
        document.getElementById('datePickerModal').style.display = 'none';
    }

    async function confirmDateChange() {
        const newDate = document.getElementById('datePickerInput').value;
        if (!newDate) {
            showMessage('Please select a date', true);
            return;
        }

        try {
            // Check if any shifts are open
            const doc = await passengerDb.collection('shifts').doc('currentshift').get();
            const currentData = doc.exists ? doc.data() : {};
            
            const morningOpen = currentData.morning === 'open';
            const eveningOpen = currentData.evening === 'open';
            
            if (morningOpen || eveningOpen) {
                let message = '⚠️ Cannot change date while shifts are open!\n\n';
                if (morningOpen) message += '• Morning shift is OPEN\n';
                if (eveningOpen) message += '• Evening shift is OPEN\n\n';
                message += 'Please close all open shifts first.';
                
                alert(message);
                closeDatePicker();
                return;
            }

            if (!confirm(`⚠️ Change shift date to ${formatDateForDisplay(newDate)}?\n\nThis will affect all users.`)) {
                closeDatePicker();
                return;
            }

            const now = new Date().toLocaleString();
            await passengerDb.collection('shifts').doc('currentshift').set({
                morning: currentData.morning || 'pending',
                evening: currentData.evening || 'pending',
                date: newDate,
                updated: now,
                updatedBy: currentUser.name,
                updatedByLevel: currentUser.level,
                updatedByRC: currentUser.rcno,
                dateChangedBy: currentUser.name,
                dateChangedAt: now,
                dateChangedReason: 'supervisor_override',
                previousDate: currentData.date || null
            }, { merge: true });

            showMessage(`✅ Date updated to ${formatDateForDisplay(newDate)}`);
            closeDatePicker();
            await loadTodayData();
        } catch (error) {
            console.error(error);
            showMessage('Error updating date', true);
            closeDatePicker();
        }
    }

    function checkLogin() { if (!localStorage.getItem('username')) { window.location.href='login.html'; return false; } return true; }

    window.onload = () => {
        if (!checkLogin()) return;
        loadUserFromLogin();
        setTimeout(loadTodayData, 150);
        setInterval(loadTodayData, 30000);
    };

    // Close modal if clicked outside
    window.onclick = function(event) {
        const modal = document.getElementById('datePickerModal');
        if (event.target === modal) {
            closeDatePicker();
        }
    };
</script>
