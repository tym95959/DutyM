<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Management - Koveli Lounge</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Your config files -->
    <script src="fireshift.js"></script>
    <script src="Co.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fff5e6 0%, #faf0d7 100%);
            min-height: 100vh;
        }

        /* Top Navigation Bar - Same as dashboard */
        .top-nav {
            background: white;
            padding: 8px 25px;
            box-shadow: 0 2px 15px rgba(230, 184, 0, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 3px solid #e6b800;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #8b6913, #e6b800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shift-btn {
            background: linear-gradient(135deg, #e6b800, #8b6913);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(230, 184, 0, 0.3);
            border: 1px solid #ffd966;
        }

        .shift-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(230, 184, 0, 0.4);
        }

        .shift-indicator {
            background: linear-gradient(135deg, #fff9e6, #fff2d7);
            padding: 6px 15px;
            border-radius: 30px;
            border-left: 4px solid #e6b800;
            font-weight: 500;
            font-size: 13px;
        }

        .shift-badge {
            color: #8b6913;
            margin-right: 8px;
        }

        .shift-date {
            color: #2c3e50;
            background: rgba(230, 184, 0, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: #f8f9fa;
            border-radius: 30px;
            cursor: pointer;
            position: relative;
        }

        .user-info:hover {
            background: #fff2d7;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #e6b800, #8b6913);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            color: #2c3e50;
            font-weight: 600;
            font-size: 13px;
        }

        .user-badge {
            color: #8b6913;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logout-btn {
            background: #c68b5e;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #a67244;
            transform: translateY(-2px);
        }

        /* Main Container */
        .main-container {
            max-width: 1000px;
            margin: 90px auto 30px;
            padding: 0 20px;
        }

        /* Page Header */
        .page-header {
            background: white;
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 25px rgba(230, 184, 0, 0.15);
            border-left: 5px solid #e6b800;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .header-title p {
            color: #8b6913;
            font-size: 14px;
        }

        .shift-info-header {
            display: flex;
            gap: 15px;
            background: #fff9e6;
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid #e6b80030;
        }

        .shift-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shift-info-label {
            color: #8b6913;
            font-size: 12px;
        }

        .shift-info-value {
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }

        .shift-status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-open {
            background: #d4edda;
            color: #155724;
        }

        .status-closed {
            background: #f8d7da;
            color: #721c24;
        }

        /* Cashier Container */
        .cashier-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(230, 184, 0, 0.2);
        }

        .sales-section {
            background: #fff9e6;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .section-title {
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e6b800;
        }

        .sales-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .sales-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(230, 184, 0, 0.1);
            border: 1px solid rgba(230, 184, 0, 0.2);
        }

        .currency-label {
            color: #8b6913;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .sales-amount {
            font-size: 42px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .currency-sub {
            color: #8b6913;
            font-size: 12px;
        }

        .count-section {
            background: #fff9e6;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .count-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .count-input-group {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(230, 184, 0, 0.2);
        }

        .count-input-group label {
            display: block;
            color: #8b6913;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 15px;
            color: #8b6913;
            font-weight: 600;
            font-size: 16px;
        }

        .count-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s;
            background: #fff9e6;
        }

        .count-input:focus {
            outline: none;
            border-color: #e6b800;
            box-shadow: 0 0 0 3px rgba(230, 184, 0, 0.1);
        }

        .comparison-result {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .comparison-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }

        .comparison-item:last-child {
            border-bottom: none;
        }

        .comparison-label {
            font-weight: 500;
            color: #2c3e50;
        }

        .comparison-value {
            font-weight: 600;
        }

        .match-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-matched {
            background: #d4edda;
            color: #155724;
        }

        .status-mismatched {
            background: #f8d7da;
            color: #721c24;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-open {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-open:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }

        .btn-close {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }

        .btn-close:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b6913;
        }

        .loading-spinner {
            border: 4px solid rgba(230, 184, 0, 0.1);
            border-top: 4px solid #e6b800;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .sales-grid,
            .count-grid,
            .action-buttons {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .page-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Top Navigation - Same as dashboard -->
    <div class="top-nav">
        <div class="nav-left">
            <div class="logo" onclick="navigateTo('dashboard.html')">✈ Koveli Lounge</div>
            <div class="nav-buttons">
                <button class="shift-btn" onclick="navigateTo('shift.html')">
                    <span>⏰</span> SHIFT MANAGEMENT
                </button>
                <div class="shift-indicator">
                    <span class="shift-badge" id="shiftType">LOADING...</span>
                    <span class="shift-date" id="shiftDate">--</span>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-details">
                    <span class="user-name" id="userName">Loading...</span>
                    <span class="user-badge" id="userBadge">
                        <span id="userLevel">-</span> • <span id="userRcno">---</span>
                    </span>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                <span>🚪</span> LOGOUT
            </button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Page Header with Shift Info -->
        <div class="page-header">
            <div class="header-title">
                <h1>💰 Cashier Management</h1>
                <p>Count cash and verify against sales</p>
            </div>
            <div class="shift-info-header">
                <div class="shift-info-item">
                    <span class="shift-info-label">Date:</span>
                    <span class="shift-info-value" id="headerShiftDate">--</span>
                </div>
                <div class="shift-info-item">
                    <span class="shift-info-label">Shift:</span>
                    <span class="shift-info-value" id="headerShiftType">--</span>
                </div>
                <span class="shift-status-badge" id="headerShiftStatus">LOADING</span>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading cashier data...</p>
        </div>

        <!-- Cashier Content -->
        <div id="mainContent" style="display: none;">
            <div class="cashier-container">
                <!-- Sales Data Section -->
                <div class="sales-section">
                    <div class="section-title">
                        <span>📊</span> Today's Sales from Kovelipay
                    </div>
                    <div class="sales-grid">
                        <div class="sales-card">
                            <div class="currency-label">MVR Sales</div>
                            <div class="sales-amount" id="mvrSales">0.00</div>
                            <div class="currency-sub">Maldives Rufiyaa</div>
                        </div>
                        <div class="sales-card">
                            <div class="currency-label">USD Sales</div>
                            <div class="sales-amount" id="usdSales">0.00</div>
                            <div class="currency-sub">US Dollars</div>
                        </div>
                    </div>
                </div>

                <!-- Cash Counting Section -->
                <div class="count-section">
                    <div class="section-title">
                        <span>🧮</span> Count Your Cash
                    </div>
                    
                    <div class="count-grid">
                        <div class="count-input-group">
                            <label>Counted MVR Amount</label>
                            <div class="input-wrapper">
                                <span class="currency-symbol">MVR</span>
                                <input type="number" id="countedMVR" class="count-input" placeholder="0.00" step="0.01" min="0">
                            </div>
                        </div>

                        <div class="count-input-group">
                            <label>Counted USD Amount</label>
                            <div class="input-wrapper">
                                <span class="currency-symbol">$</span>
                                <input type="number" id="countedUSD" class="count-input" placeholder="0.00" step="0.01" min="0">
                            </div>
                        </div>
                    </div>

                    <!-- Comparison Results -->
                    <div id="comparisonSection" class="comparison-result" style="display: none;">
                        <div class="comparison-item">
                            <span class="comparison-label">MVR:</span>
                            <span>
                                <span class="comparison-value" id="mvrComparison"></span>
                                <span id="mvrStatus" class="match-status status-matched"></span>
                            </span>
                        </div>
                        <div class="comparison-item">
                            <span class="comparison-label">USD:</span>
                            <span>
                                <span class="comparison-value" id="usdComparison"></span>
                                <span id="usdStatus" class="match-status status-matched"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Message Area -->
                <div id="messageArea" class="alert" style="display: none;"></div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button id="openCashierBtn" class="btn btn-open" disabled>Open Cashier</button>
                    <button id="closeCashierBtn" class="btn btn-close" disabled>Close Cashier</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== GLOBAL VARIABLES ==========
        let currentShift = null;
        let currentUser = null;
        let salesData = { mvr: 0, usd: 0 };
        let countedData = { mvr: 0, usd: 0 };
        let refreshInterval;

        // ========== USER FUNCTIONS - Same as dashboard ==========
        function loadUserFromStorage() {
            try {
                const username = localStorage.getItem('username');
                const level = localStorage.getItem('level');
                const rcno = localStorage.getItem('rcno');
                
                if (!username) {
                    redirectToLogin('No user session');
                    return false;
                }
                
                currentUser = {
                    username: username,
                    level: level || 'operator',
                    rcno: rcno || 'N/A'
                };
                
                updateUserUI();
                return true;
                
            } catch (error) {
                console.error('Error loading user:', error);
                redirectToLogin('Error loading user');
                return false;
            }
        }

        function updateUserUI() {
            document.getElementById('userName').textContent = currentUser.username;
            document.getElementById('userLevel').textContent = 
                currentUser.level.charAt(0).toUpperCase() + currentUser.level.slice(1);
            document.getElementById('userRcno').textContent = currentUser.rcno;
            document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
        }

        // ========== SHIFT FUNCTIONS - EXACTLY like dashboard ==========
        async function fetchShiftData() {
            try {
                if (typeof passengerDb === 'undefined') {
                    console.error('passengerDb not initialized');
                    return;
                }

                console.log('Fetching shift from: shifts/currentshift');
                const shiftDoc = await passengerDb.collection('shifts').doc('currentshift').get();
                
                if (shiftDoc.exists) {
                    const data = shiftDoc.data();
                    currentShift = data;
                    
                    console.log('Shift data received:', data);
                    
                    const date = data.date || 'No date';
                    const morning = data.morning || 'closed';
                    const evening = data.evening || 'closed';
                    
                    // Update top navigation shift indicator
                    const shiftType = document.getElementById('shiftType');
                    const shiftDate = document.getElementById('shiftDate');
                    
                    // Update header shift info
                    const headerShiftDate = document.getElementById('headerShiftDate');
                    const headerShiftType = document.getElementById('headerShiftType');
                    const headerShiftStatus = document.getElementById('headerShiftStatus');
                    
                    let activeShift = '';
                    let shiftTypeText = '';
                    let shiftStatus = '';
                    
                    if (morning === 'open') {
                        activeShift = 'MORNING SHIFT';
                        shiftTypeText = 'Morning';
                        shiftStatus = 'OPEN';
                        headerShiftStatus.className = 'shift-status-badge status-open';
                    } else if (evening === 'open') {
                        activeShift = 'EVENING SHIFT';
                        shiftTypeText = 'Evening';
                        shiftStatus = 'OPEN';
                        headerShiftStatus.className = 'shift-status-badge status-open';
                    } else {
                        activeShift = 'NO OPEN SHIFT';
                        shiftTypeText = 'None';
                        shiftStatus = 'CLOSED';
                        headerShiftStatus.className = 'shift-status-badge status-closed';
                    }
                    
                    shiftType.textContent = activeShift;
                    shiftDate.textContent = date;
                    
                    headerShiftDate.textContent = date;
                    headerShiftType.textContent = shiftTypeText;
                    headerShiftStatus.textContent = shiftStatus;
                    
                    // Return shift status for button logic
                    return {
                        isOpen: (morning === 'open' || evening === 'open'),
                        shiftType: shiftTypeText,
                        date: date
                    };
                    
                } else {
                    console.warn('No currentshift document found');
                    document.getElementById('shiftType').textContent = 'NO SHIFT';
                    document.getElementById('shiftDate').textContent = '--';
                    document.getElementById('headerShiftDate').textContent = '--';
                    document.getElementById('headerShiftType').textContent = 'None';
                    document.getElementById('headerShiftStatus').textContent = 'NO DATA';
                    
                    return { isOpen: false, shiftType: 'None', date: '--' };
                }
                
            } catch (error) {
                console.error('Error fetching shift:', error);
                document.getElementById('shiftType').textContent = 'ERROR';
                document.getElementById('shiftDate').textContent = '--';
                return { isOpen: false, shiftType: 'Error', date: '--' };
            }
        }

        // ========== SALES FUNCTIONS ==========
        async function fetchSalesData() {
            try {
                if (typeof db === 'undefined') {
                    console.error('Database not initialized');
                    return;
                }

                // Get today's date
                const today = new Date().toISOString().split('T')[0];
                
                // Fetch from Kovelipay collection for today
                const kovelipaySnapshot = await db.collection('Kovelipay')
                    .where('date', '==', today)
                    .get();
                
                let totalMVR = 0;
                let totalUSD = 0;
                
                kovelipaySnapshot.forEach(doc => {
                    const data = doc.data();
                    // Add amounts based on your data structure
                    // Adjust these field names based on your actual Kovelipay structure
                    totalMVR += parseFloat(data.mvrAmount) || 0;
                    totalUSD += parseFloat(data.usdAmount) || 0;
                });
                
                salesData = {
                    mvr: totalMVR,
                    usd: totalUSD
                };
                
                document.getElementById('mvrSales').textContent = totalMVR.toFixed(2);
                document.getElementById('usdSales').textContent = totalUSD.toFixed(2);
                
            } catch (error) {
                console.error('Error fetching sales:', error);
                // Fallback to demo data if error
                salesData = { mvr: 12500.50, usd: 450.75 };
                document.getElementById('mvrSales').textContent = '12500.50';
                document.getElementById('usdSales').textContent = '450.75';
            }
        }

        // ========== COMPARISON FUNCTIONS ==========
        function handleCountedInput() {
            countedData.mvr = parseFloat(document.getElementById('countedMVR').value) || 0;
            countedData.usd = parseFloat(document.getElementById('countedUSD').value) || 0;
            compareAmounts();
        }

        function compareAmounts() {
            const mvrMatch = Math.abs(countedData.mvr - salesData.mvr) < 0.01;
            const usdMatch = Math.abs(countedData.usd - salesData.usd) < 0.01;
            const bothMatch = mvrMatch && usdMatch;
            
            document.getElementById('comparisonSection').style.display = 'block';
            
            // Update MVR comparison
            document.getElementById('mvrComparison').textContent = 
                `${countedData.mvr.toFixed(2)} MVR / ${salesData.mvr.toFixed(2)} MVR`;
            
            const mvrStatus = document.getElementById('mvrStatus');
            mvrStatus.textContent = mvrMatch ? '✓ MATCHED' : '✗ MISMATCH';
            mvrStatus.className = `match-status ${mvrMatch ? 'status-matched' : 'status-mismatched'}`;
            
            // Update USD comparison
            document.getElementById('usdComparison').textContent = 
                `${countedData.usd.toFixed(2)} USD / ${salesData.usd.toFixed(2)} USD`;
            
            const usdStatus = document.getElementById('usdStatus');
            usdStatus.textContent = usdMatch ? '✓ MATCHED' : '✗ MISMATCH';
            usdStatus.className = `match-status ${usdMatch ? 'status-matched' : 'status-mismatched'}`;
            
            // Update button states based on shift status
            updateButtonStates(bothMatch);
            
            if (!bothMatch) {
                showMessage('Amounts do not match sales records. Please recount.', 'danger');
            } else {
                hideMessage();
            }
        }

        // ========== BUTTON STATE MANAGEMENT ==========
        function updateButtonStates(bothMatch = false) {
            const isShiftOpen = currentShift && 
                (currentShift.morning === 'open' || currentShift.evening === 'open');
            
            if (!isShiftOpen) {
                // Shift is closed - enable Open button if amounts match
                document.getElementById('openCashierBtn').disabled = !bothMatch;
                document.getElementById('closeCashierBtn').disabled = true;
            } else {
                // Shift is open - enable Close button if amounts match
                document.getElementById('openCashierBtn').disabled = true;
                document.getElementById('closeCashierBtn').disabled = !bothMatch;
            }
        }

        // ========== CASHIER ACTIONS ==========
        async function handleOpenCashier() {
            try {
                showMessage('Opening cashier...', 'success');
                
                if (typeof passengerDb !== 'undefined') {
                    const shiftRef = passengerDb.collection('shifts').doc('currentshift');
                    
                    const now = new Date();
                    const dateStr = now.toISOString().split('T')[0];
                    const hours = now.getHours();
                    const shiftToOpen = hours < 12 ? 'morning' : 'evening';
                    
                    await shiftRef.set({
                        [shiftToOpen]: 'open',
                        date: dateStr,
                        openTime: now.toISOString(),
                        updated: now.toISOString()
                    }, { merge: true });
                    
                    // Refresh shift data
                    await fetchShiftData();
                }
                
                showMessage('Cashier opened successfully!', 'success');
                
                // Clear inputs
                document.getElementById('countedMVR').value = '';
                document.getElementById('countedUSD').value = '';
                document.getElementById('comparisonSection').style.display = 'none';
                
            } catch (error) {
                showMessage('Failed to open cashier. Please try again.', 'danger');
            }
        }

        async function handleCloseCashier() {
            try {
                showMessage('Closing cashier...', 'success');
                
                if (typeof passengerDb !== 'undefined' && currentShift) {
                    const shiftRef = passengerDb.collection('shifts').doc('currentshift');
                    
                    // Determine which shift to close
                    const shiftToClose = currentShift.morning === 'open' ? 'morning' : 'evening';
                    
                    await shiftRef.set({
                        [shiftToClose]: 'closed',
                        updated: new Date().toISOString()
                    }, { merge: true });
                    
                    // Refresh shift data
                    await fetchShiftData();
                }
                
                showMessage('Cashier closed successfully!', 'success');
                
                // Clear inputs
                document.getElementById('countedMVR').value = '';
                document.getElementById('countedUSD').value = '';
                document.getElementById('comparisonSection').style.display = 'none';
                
            } catch (error) {
                showMessage('Failed to close cashier. Please try again.', 'danger');
            }
        }

        // ========== UTILITY FUNCTIONS ==========
        function showMessage(text, type) {
            const msgArea = document.getElementById('messageArea');
            msgArea.style.display = 'block';
            msgArea.className = `alert alert-${type}`;
            msgArea.textContent = text;
            
            if (type === 'success') {
                setTimeout(hideMessage, 3000);
            }
        }

        function hideMessage() {
            document.getElementById('messageArea').style.display = 'none';
        }

        function navigateTo(page) {
            window.location.href = page;
        }

        async function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }

        function redirectToLogin(reason) {
            console.log('Redirecting to login:', reason);
            window.location.href = 'login.html';
        }

        // ========== INITIALIZATION ==========
        async function initializePage() {
            try {
                // Load user first
                if (!loadUserFromStorage()) return;
                
                // Fetch shift data (exactly like dashboard)
                await fetchShiftData();
                
                // Fetch sales data
                await fetchSalesData();
                
                // Hide loading, show content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                // Setup event listeners
                document.getElementById('countedMVR').addEventListener('input', handleCountedInput);
                document.getElementById('countedUSD').addEventListener('input', handleCountedInput);
                document.getElementById('openCashierBtn').addEventListener('click', handleOpenCashier);
                document.getElementById('closeCashierBtn').addEventListener('click', handleCloseCashier);
                
                // Auto-refresh every 30 seconds
                refreshInterval = setInterval(async () => {
                    await fetchShiftData();
                    await fetchSalesData();
                }, 30000);
                
            } catch (error) {
                console.error('Initialization error:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="alert alert-danger">
                        Failed to load data. Please refresh the page.
                    </div>
                `;
            }
        }

        // Start everything when page loads
        document.addEventListener('DOMContentLoaded', initializePage);

        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });

        // Make functions globally available
        window.navigateTo = navigateTo;
        window.logout = logout;
    </script>
</body>
</html>
