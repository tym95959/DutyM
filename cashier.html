<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .sales-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .sales-title {
            color: #495057;
            font-size: 1.3em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sales-title i {
            color: #667eea;
        }

        .sales-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .sales-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .currency-label {
            font-size: 1.2em;
            color: #6c757d;
            margin-bottom: 10px;
        }

        .sales-amount {
            font-size: 2.5em;
            font-weight: bold;
            color: #28a745;
        }

        .currency-mvr .sales-amount {
            color: #007bff;
        }

        .currency-usd .sales-amount {
            color: #28a745;
        }

        .count-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 500;
            font-size: 1.1em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 15px;
            color: #6c757d;
            font-weight: 500;
            font-size: 1.2em;
        }

        .form-control {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .comparison-result {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .comparison-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
        }

        .comparison-item:last-child {
            border-bottom: none;
        }

        .comparison-label {
            font-weight: 500;
            color: #495057;
        }

        .comparison-value {
            font-weight: 600;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-matched {
            background: #d4edda;
            color: #155724;
        }

        .status-mismatched {
            background: #f8d7da;
            color: #721c24;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-open {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-open:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }

        .btn-close {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }

        .btn-close:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Cashier Management</h1>
            <p>Count your cash and verify against sales records</p>
        </div>

        <div class="content">
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>Loading sales data...</p>
            </div>

            <div id="mainContent" style="display: none;">
                <div class="sales-section">
                    <div class="sales-title">
                        <i>📊</i> Today's Sales Summary
                    </div>
                    <div class="sales-grid">
                        <div class="sales-card currency-mvr">
                            <div class="currency-label">MVR Sales</div>
                            <div class="sales-amount" id="mvrSales">0.00</div>
                            <div style="color: #6c757d; margin-top: 5px;">Maldives Rufiyaa</div>
                        </div>
                        <div class="sales-card currency-usd">
                            <div class="currency-label">USD Sales</div>
                            <div class="sales-amount" id="usdSales">0.00</div>
                            <div style="color: #6c757d; margin-top: 5px;">US Dollars</div>
                        </div>
                    </div>
                </div>

                <div class="count-section">
                    <div class="sales-title">
                        <i>🧮</i> Count Your Cash
                    </div>
                    
                    <div class="form-group">
                        <label for="countedMVR">Counted MVR Amount</label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">MVR</span>
                            <input type="number" id="countedMVR" class="form-control" placeholder="Enter counted MVR" step="0.01" min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="countedUSD">Counted USD Amount</label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="countedUSD" class="form-control" placeholder="Enter counted USD" step="0.01" min="0">
                        </div>
                    </div>

                    <div id="comparisonSection" class="comparison-result" style="display: none;">
                        <div class="comparison-item">
                            <span class="comparison-label">MVR Comparison:</span>
                            <span>
                                <span class="comparison-value" id="mvrComparison"></span>
                                <span id="mvrStatus" class="status-badge"></span>
                            </span>
                        </div>
                        <div class="comparison-item">
                            <span class="comparison-label">USD Comparison:</span>
                            <span>
                                <span class="comparison-value" id="usdComparison"></span>
                                <span id="usdStatus" class="status-badge"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <div id="messageArea" class="alert" style="display: none;"></div>

                <div class="actions">
                    <button id="openCashierBtn" class="btn btn-open" disabled>Open Cashier</button>
                    <button id="closeCashierBtn" class="btn btn-close" disabled>Close Cashier</button>
                </div>

                <div class="footer-note">
                    <p>Count your cash carefully before opening or closing the cashier</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const config = {
            cashierStatus: 'closed', // 'open' or 'closed'
        };

        // DOM Elements
        const loadingEl = document.getElementById('loading');
        const mainContentEl = document.getElementById('mainContent');
        const mvrSalesEl = document.getElementById('mvrSales');
        const usdSalesEl = document.getElementById('usdSales');
        const countedMVRInput = document.getElementById('countedMVR');
        const countedUSDInput = document.getElementById('countedUSD');
        const comparisonSection = document.getElementById('comparisonSection');
        const mvrComparisonEl = document.getElementById('mvrComparison');
        const usdComparisonEl = document.getElementById('usdComparison');
        const mvrStatusEl = document.getElementById('mvrStatus');
        const usdStatusEl = document.getElementById('usdStatus');
        const messageArea = document.getElementById('messageArea');
        const openCashierBtn = document.getElementById('openCashierBtn');
        const closeCashierBtn = document.getElementById('closeCashierBtn');

        // Sales data
        let salesData = {
            mvr: 0,
            usd: 0
        };

        // Counted data
        let countedData = {
            mvr: 0,
            usd: 0
        };

        // Initialize the page
        async function initializePage() {
            try {
                // Fetch sales data from Firebase
                await fetchSalesData();
                
                // Hide loading, show main content
                loadingEl.style.display = 'none';
                mainContentEl.style.display = 'block';
                
                // Setup event listeners
                setupEventListeners();
                
                // Update button states based on cashier status
                updateButtonStates();
            } catch (error) {
                console.error('Error initializing page:', error);
                loadingEl.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Error!</strong> Failed to load sales data. Please refresh the page.
                        <br><small>${error.message}</small>
                    </div>
                `;
            }
        }

        // Fetch sales data from Firebase
        async function fetchSalesData() {
            try {
                // Simulating Firebase fetch (replace with actual Firebase code)
                // const kovelipayRef = passengerDb.collection('Kovelipay');
                // const snapshot = await kovelipayRef.get();
                
                // Simulated data for demonstration
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Simulate fetching from Firebase
                salesData = {
                    mvr: 12500.50,  // Example MVR sales
                    usd: 450.75      // Example USD sales
                };
                
                // Update display
                updateSalesDisplay();
                
            } catch (error) {
                console.error('Error fetching sales data:', error);
                throw error;
            }
        }

        // Update sales display
        function updateSalesDisplay() {
            mvrSalesEl.textContent = salesData.mvr.toFixed(2);
            usdSalesEl.textContent = salesData.usd.toFixed(2);
        }

        // Setup event listeners
        function setupEventListeners() {
            countedMVRInput.addEventListener('input', handleCountedInput);
            countedUSDInput.addEventListener('input', handleCountedInput);
            openCashierBtn.addEventListener('click', handleOpenCashier);
            closeCashierBtn.addEventListener('click', handleCloseCashier);
        }

        // Handle counted input changes
        function handleCountedInput() {
            // Get counted values
            countedData.mvr = parseFloat(countedMVRInput.value) || 0;
            countedData.usd = parseFloat(countedUSDInput.value) || 0;
            
            // Compare with sales data
            compareAmounts();
        }

        // Compare counted amounts with sales data
        function compareAmounts() {
            const mvrMatch = Math.abs(countedData.mvr - salesData.mvr) < 0.01;
            const usdMatch = Math.abs(countedData.usd - salesData.usd) < 0.01;
            
            // Show comparison section
            comparisonSection.style.display = 'block';
            
            // Update MVR comparison
            mvrComparisonEl.textContent = `${countedData.mvr.toFixed(2)} MVR / ${salesData.mvr.toFixed(2)} MVR`;
            mvrStatusEl.textContent = mvrMatch ? '✓ Matched' : '✗ Mismatch';
            mvrStatusEl.className = `status-badge ${mvrMatch ? 'status-matched' : 'status-mismatched'}`;
            
            // Update USD comparison
            usdComparisonEl.textContent = `${countedData.usd.toFixed(2)} USD / ${salesData.usd.toFixed(2)} USD`;
            usdStatusEl.textContent = usdMatch ? '✓ Matched' : '✗ Mismatch';
            usdStatusEl.className = `status-badge ${usdMatch ? 'status-matched' : 'status-mismatched'}`;
            
            // Check if both match
            const bothMatch = mvrMatch && usdMatch;
            
            // Update button states based on match status and cashier status
            updateButtonStates(bothMatch);
            
            // Show message if mismatch
            if (!bothMatch) {
                showMessage('Counted amounts do not match sales records. Please recount.', 'danger');
            } else {
                hideMessage();
            }
        }

        // Update button states
        function updateButtonStates(bothMatch = false) {
            if (config.cashierStatus === 'closed') {
                openCashierBtn.disabled = !bothMatch;
                closeCashierBtn.disabled = true;
            } else {
                openCashierBtn.disabled = true;
                closeCashierBtn.disabled = !bothMatch;
            }
        }

        // Handle open cashier
        async function handleOpenCashier() {
            try {
                showMessage('Opening cashier...', 'success');
                
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                config.cashierStatus = 'open';
                updateButtonStates(true);
                showMessage('Cashier opened successfully!', 'success');
                
                // Clear inputs
                countedMVRInput.value = '';
                countedUSDInput.value = '';
                comparisonSection.style.display = 'none';
                
            } catch (error) {
                showMessage('Failed to open cashier. Please try again.', 'danger');
            }
        }

        // Handle close cashier
        async function handleCloseCashier() {
            try {
                showMessage('Closing cashier...', 'success');
                
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                config.cashierStatus = 'closed';
                updateButtonStates(true);
                showMessage('Cashier closed successfully!', 'success');
                
                // Clear inputs
                countedMVRInput.value = '';
                countedUSDInput.value = '';
                comparisonSection.style.display = 'none';
                
            } catch (error) {
                showMessage('Failed to close cashier. Please try again.', 'danger');
            }
        }

        // Show message
        function showMessage(text, type) {
            messageArea.style.display = 'block';
            messageArea.className = `alert alert-${type}`;
            messageArea.innerHTML = `<strong>${type === 'success' ? 'Success!' : 'Error!'}</strong> ${text}`;
            
            // Auto hide after 3 seconds for success messages
            if (type === 'success') {
                setTimeout(hideMessage, 3000);
            }
        }

        // Hide message
        function hideMessage() {
            messageArea.style.display = 'none';
        }

        // Initialize the page when DOM is loaded
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
